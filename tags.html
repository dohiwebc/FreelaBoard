<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タグ管理 | FreelaBoard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Noto Sans JP", Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      width: 220px;
      height: 100vh;
      padding: 24px 16px;
      background: #0f2a4a;
      color: #ffffff;
    }

    .logo {
      margin: 0 0 28px;
      font-size: 20px;
      font-weight: 700;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 8px;
      color: #dbeafe;
      font-size: 14px;
      font-weight: 700;
    }

    .nav-link:hover,
    .nav-link.active {
      background: #163b68;
      color: #ffffff;
    }

    .nav-icon {
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      font-size: 15px;
    }

    .nav-icon-image {
      width: 16px;
      height: 16px;
      object-fit: contain;
    }

    .logout {
      color: #dbeafe;
      font-size: 14px;
      font-weight: 700;
    }

    .sidebar-account {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: auto;
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
    }

    .sidebar-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .main {
      width: 100%;
      margin-left: 220px;
      padding: 40px;
    }

    .content {
      max-width: 980px;
      margin: 0 auto;
    }

    .page-header {
      margin-bottom: 24px;
    }

    .page-title {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .page-lead {
      margin: 8px 0 0;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.7;
    }

    .form-card,
    .table-card {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
    }

    .form-card {
      padding: 24px;
      margin-bottom: 24px;
    }

    .form-title {
      margin: 0 0 16px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .add-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 8px;
      color: #374151;
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 44px;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      color: #111827;
      font: inherit;
      font-size: 14px;
    }

    input:focus {
      border-color: #2563eb;
      outline: none;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border: none;
      border-radius: 8px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .primary-button {
      background: #123a74;
      color: #ffffff;
    }

    .edit-button {
      background: #eef2ff;
      color: #2563eb;
    }

    .delete-button {
      background: #fee2e2;
      color: #dc2626;
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .table-card {
      overflow: hidden;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 720px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 16px 18px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      background: #f9fafb;
      color: #374151;
      font-size: 13px;
      font-weight: 700;
    }

    tbody tr:hover {
      background: #f9fafb;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .tag-name {
      font-weight: 700;
    }

    .tag-pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: #dbeafe;
      color: #2563eb;
      font-size: 12px;
      font-weight: 700;
    }

    .actions {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      justify-content: flex-start;
      white-space: nowrap;
    }

    .actions .button {
      width: auto !important;
      min-width: 54px;
      min-height: 32px !important;
      padding: 0 10px !important;
      font-size: 12px !important;
    }

    .tag-actions {
      display: inline-flex !important;
      flex-direction: row !important;
    }

    .message,
    .loading,
    .empty {
      padding: 34px 20px;
      color: #6b7280;
      text-align: center;
      font-size: 14px;
    }

    .empty {
      display: none;
    }

    .message.error {
      color: #dc2626;
      font-weight: 700;
    }

    @media (max-width: 820px) {
      .layout {

      .sidebar {
        position: static;
        width: 100%;
        height: auto;
        padding: 18px 16px;

      .logo {
        margin-bottom: 16px;
      }

      .nav {
        grid-template-columns: repeat(10, minmax(0, 1fr));
      }

      .nav-link {
        justify-content: center;
        padding: 10px;
      }

      .nav-icon,
      .logout {
        display: none;
      }

      .main {
        margin-left: 0;
        padding: 24px 16px;
      }

      .add-form {
        grid-template-columns: 1fr;
      }

      .button {
        width: 100%;
      }
    }

    /* Responsive layout */
    .mobile-header,
    .sidebar-overlay,
    .sidebar-close {
      display: none;
    }

    @media (min-width: 768px) and (max-width: 1023px) {
      .sidebar {
        width: 190px !important;

      }

      table {
        min-width: 820px;

      .main {

      .content {

      }

      .page-header,
      .calendar-controls,
      .toolbar,
      .filter-bar,
      .actions,
      .detail-actions,
      .invoice-actions {
        align-items: stretch !important;

        gap: 12px !important;
      }

      .page-title {
        font-size: 24px !important;
      }

      .page-lead {

      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid,
      .form-grid,
      .filters,
      .toolbar,
      .workspace,
      .invoice-grid,
      .invoice-header,
      .invoice-footer {
        grid-template-columns: 1fr !important;
      }

      .summary-card,
      .table-card,
      .form-card,
      .detail-card,
      .profile-card,
      .settings-card,
      .toolbar-card,
      .calendar-card,
      .week-card,
      .detail-panel,
      .auth-card {
        border-radius: 8px !important;
      }

      input,
      select,
      textarea,
      .button,
      .new-button,
      .primary-button,
      .secondary-button,
      .ghost-button,
      .danger-button,
      .filter-button,
      .clear-button,
      .detail-button,
      .preview-button {
        width: 100%;
        min-height: 44px;
      }

      .table-wrap,
      .invoice-scroll,
      .calendar-scroll {
        width: 100%;
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }

      table {
        min-width: 760px;
      }

      th,
      td {
        white-space: nowrap;
      }

      .item-row,
      .items-row {
        grid-template-columns: 1fr !important;
      }

      .drag-handle {
        width: 100% !important;
        min-height: 34px;
      }

      .calendar-grid {
        min-width: 680px !important;
      }

      .day-cell {
        min-height: 104px !important;
        padding: 8px !important;
      }

      .event-title {
        max-width: 100%;
      }

      .week-row {
        min-width: 720px;
      }

      .invoice-card,
      .invoice-paper {
        min-width: 720px;
      }

      @media print {
        .mobile-header,
        .sidebar-overlay,
        .sidebar-close {
          display: none !important;
        }
      }
    }

    /* Responsive print and scroll safeguards */
    @media print {
      .mobile-header,
      .sidebar-overlay,
      .sidebar-close {
        display: none !important;
      }
    }

        border-radius: 999px;
        background: #0f2a4a;
        transition: transform 0.2s ease, opacity 0.2s ease, width 0.2s ease;
      }

      .hamburger-button span:nth-child(2) {
        width: 13px;
      }

      .hamburger-button:hover span:nth-child(2) {
        width: 17px;
      }

      body.sidebar-open .hamburger-button span:nth-child(1) {
        transform: translateY(6px) rotate(45deg);
      }

      body.sidebar-open .hamburger-button span:nth-child(2) {
        opacity: 0;
      }

      body.sidebar-open .hamburger-button span:nth-child(3) {
        transform: translateY(-6px) rotate(-45deg);
      }
    }

    /* Polished opened mobile menu */
    @media (max-width: 767px) {
      .sidebar {
        width: min(84vw, 292px) !important;
        padding: 20px 14px 18px !important;
        background: linear-gradient(180deg, #0f2a4a 0%, #123a64 55%, #0b1f38 100%) !important;
        border-radius: 0 18px 18px 0;
        box-shadow: 18px 0 42px rgba(15, 23, 42, 0.28);
      }

      .sidebar .logo {
        display: flex;
        align-items: center;
        min-height: 40px;
        margin: 0 46px 18px 2px !important;
        color: #ffffff;
        font-size: 18px !important;
        letter-spacing: 0.01em;
      }

      .sidebar-close {
        top: 18px !important;
        right: 14px !important;
        width: 34px !important;
        height: 34px !important;
        border: 1px solid rgba(255, 255, 255, 0.16) !important;
        border-radius: 999px !important;
        background: rgba(255, 255, 255, 0.10) !important;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
        font-size: 20px !important;
        line-height: 1;
      }

      .sidebar .nav {
        gap: 6px !important;
        padding: 8px 0 14px;
      }

      .sidebar .nav-link {
        min-height: 42px !important;
        padding: 10px 12px !important;
        border: 1px solid transparent;
        border-radius: 10px !important;
        color: #dbeafe !important;
        background: transparent;
        transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
      }

      .sidebar .nav-link:hover,
      .sidebar .nav-link.active {
        background: rgba(255, 255, 255, 0.12) !important;
        border-color: rgba(255, 255, 255, 0.12);
        color: #ffffff !important;
        transform: translateX(2px);
      }

      .sidebar .nav-icon {
        width: 26px !important;
        height: 26px !important;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.10);
        color: #ffffff;
        font-size: 13px !important;
      }

      .sidebar .nav-link.active .nav-icon {
        background: #ffffff;
        color: #123a64;
      }

      .sidebar-account {
        margin-top: auto !important;
        margin-bottom: 10px !important;
        padding: 10px !important;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 12px !important;
        background: rgba(255, 255, 255, 0.10) !important;
        backdrop-filter: blur(8px);
      }

      .logout {
        justify-content: center;
        min-height: 40px !important;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.08);
        color: #dbeafe !important;
        font-size: 12px !important;
        font-weight: 700;
      }

      .sidebar-overlay {
        background: rgba(2, 6, 23, 0.54) !important;
        backdrop-filter: blur(2px);
      }
    }

    /* Cleaner selected state in mobile menu */
    @media (max-width: 767px) {
      .sidebar .nav-link {
        position: relative;
        border-color: transparent !important;
        box-shadow: none !important;
      }

      .sidebar .nav-link.active {
        background: rgba(255, 255, 255, 0.13) !important;
        border-color: transparent !important;
        box-shadow: inset 3px 0 0 #93c5fd !important;
      }

      .sidebar .nav-link:hover {
        border-color: transparent !important;
        box-shadow: none !important;
      }

      .sidebar .nav-link.active:hover {
        box-shadow: inset 3px 0 0 #93c5fd !important;
      }

      .sidebar .nav-link.active .nav-icon {
        background: rgba(147, 197, 253, 0.22) !important;
        color: #ffffff !important;
      }
    }

    /* Plain mobile menu icons */
    @media (max-width: 767px) {
      .sidebar .nav-icon,
      .sidebar .nav-link.active .nav-icon {
        background: transparent !important;
        border-radius: 0 !important;
        color: currentColor !important;
      }
    }

    /* Motion effects */
    @keyframes fbFadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fbPopIn {
      0% {
        opacity: 0;
        transform: scale(0.88);
      }
      70% {
        transform: scale(1.06);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fbPulseSoft {
      0%, 100% {
        transform: scale(1);
        box-shadow: none;
      }
      50% {
        transform: scale(1.03);
        box-shadow: 0 8px 18px rgba(245, 158, 11, 0.18);
      }
    }

    .summary-card,
    .chart-card,
    .recent-card,
    .table-card,
    .form-card,
    .detail-card,
    .profile-card,
    .settings-card,
    .toolbar-card,
    .calendar-card,
    .week-card,
    .detail-panel,
    .auth-card {
      animation: fbFadeUp 0.85s ease both;
    }

    .summary-card:nth-child(2),
    .chart-card:nth-child(2),
    .form-card + .table-card {
      animation-delay: 0.06s;
    }

    .summary-card:nth-child(3) {
      animation-delay: 0.12s;
    }

    .summary-card:nth-child(4) {
      animation-delay: 0.18s;
    }

    .summary-card:nth-child(5) {
      animation-delay: 0.24s;
    }

    .summary-card:nth-child(6) {
      animation-delay: 0.30s;
    }

    .summary-card:nth-child(7) {
      animation-delay: 0.36s;
    }

    tbody tr,
    .alert-item,
    .week-row,
    .event-card {
      animation: fbFadeUp 0.65s ease both;
    }

    tbody tr:hover,
    .alert-item:hover,
    .event-card:hover,
    .summary-card:hover,
    .chart-card:hover,
    .recent-card:hover {
      transform: translateY(-2px);
      transition: transform 0.32s ease, box-shadow 0.32s ease, background 0.32s ease;
    }

    .status,
    .status-badge,
    .tag-badge {
      transition: transform 0.32s ease, box-shadow 0.32s ease, filter 0.32s ease;
    }

    .status:hover,
    .status-badge:hover,
    .tag-badge:hover {
      transform: translateY(-1px) scale(1.02);
      filter: saturate(1.08);
    }

    .status-waiting,
    .status-overdue,
    .event-card.status-overdue,
    .event-card.status-payment {
      animation: fbPulseSoft 4.2s ease-in-out infinite;
    }

    @media (max-width: 767px) {
      body.sidebar-open .sidebar .nav-link {
        animation: fbFadeUp 0.55s ease both;
      }

      body.sidebar-open .sidebar .nav-link:nth-child(1) { animation-delay: 0.03s; }
      body.sidebar-open .sidebar .nav-link:nth-child(2) { animation-delay: 0.06s; }
      body.sidebar-open .sidebar .nav-link:nth-child(3) { animation-delay: 0.09s; }
      body.sidebar-open .sidebar .nav-link:nth-child(4) { animation-delay: 0.12s; }
      body.sidebar-open .sidebar .nav-link:nth-child(5) { animation-delay: 0.15s; }
      body.sidebar-open .sidebar .nav-link:nth-child(6) { animation-delay: 0.18s; }
      body.sidebar-open .sidebar .nav-link:nth-child(7) { animation-delay: 0.21s; }
      body.sidebar-open .sidebar .nav-link:nth-child(8) { animation-delay: 0.24s; }
      body.sidebar-open .sidebar .nav-link:nth-child(9) { animation-delay: 0.27s; }
      body.sidebar-open .sidebar .nav-link:nth-child(10) { animation-delay: 0.30s; }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }

  </style>
  <link rel="stylesheet" href="./assets/common.css">
</head>
<body>
  <header class="mobile-header">
    <button class="hamburger-button" type="button" aria-label="メニューを開く" aria-controls="appSidebar" aria-expanded="false"><span></span><span></span><span></span></button>
    <span class="mobile-logo">FreelaBoard</span>
  </header>
  <div class="sidebar-overlay" data-sidebar-overlay></div>
  <div class="layout">
    <aside class="sidebar" id="appSidebar">
      
      <button class="sidebar-close" type="button" aria-label="メニューを閉じる">×</button>
      <h1 class="logo">FreelaBoard</h1>

      <nav class="nav" aria-label="メインメニュー">
        <a class="nav-link" href="./dashboard.html">
          <span class="nav-icon">⌂</span>
          <span>ダッシュボード</span>
        </a>
        <a class="nav-link" href="./projects.html">
          <span class="nav-icon">☷</span>
          <span>案件一覧</span>
        </a>
        <a class="nav-link" href="./add-project.html">
          <span class="nav-icon">＋</span>
          <span>案件追加</span>
        </a>
        <a class="nav-link" href="./invoices.html">
          <span class="nav-icon">▤</span>
          <span>請求書一覧</span>
        </a>
        <a class="nav-link" href="./reports.html">
          <span class="nav-icon">↗</span>
          <span>レポート</span>
        </a>
        <a class="nav-link" href="./clients.html">
          <span class="nav-icon">◇</span>
          <span>クライアント管理</span>
        </a>
        <a class="nav-link active" href="./tags.html" aria-current="page">
          <span class="nav-icon">#</span>
          <span>タグ管理</span>
        </a>
        <a class="nav-link" href="./calendar.html">
          <span class="nav-icon">□</span>
          <span>カレンダー</span>
        </a>
        <a class="nav-link" href="./profile.html">
          <span class="nav-icon"><img class="nav-icon-image" src="./assets/profile-nav-icon.png" alt=""></span>
          <span>プロフィール</span>
        </a>
        <a class="nav-link" href="./settings.html">
          <span class="nav-icon">⚙</span>
          <span>設定</span>
        </a>
      </nav>
      <div class="sidebar-account">
        <img class="sidebar-avatar" src="./assets/iconfree.jpg" alt="プロフィール画像">
        <span id="topAccountName">user</span>
      </div>
      <a class="logout" href="./login.html">ログアウト</a>
    </aside>

    <main class="main">
      <div class="content">
        <header class="page-header">
          <h2 class="page-title">タグ管理</h2>
          <p class="page-lead">案件整理用の内部タグを追加・編集できます。タグは請求書には表示されません。</p>
        </header>

        <section class="form-card" aria-label="新しいタグを追加">
          <h3 class="form-title">新しいタグを追加</h3>
          <form class="add-form" id="tagForm">
            <label for="tagName">
              タグ名
              <input id="tagName" type="text" placeholder="例：LP制作">
            </label>
            <button class="button primary-button" id="addButton" type="submit">追加する</button>
          </form>
          <p class="message" id="message"></p>
        </section>

        <section class="table-card" aria-label="タグ一覧">
          <div class="loading" id="loading">Loading...</div>
          <p class="empty" id="emptyMessage">タグがありません</p>
          <div class="table-wrap" id="tableWrap">
            <table>
              <thead>
                <tr>
                  <th>タグ名</th>
                  <th>案件数</th>
                  <th>作成日</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="tagTableBody">
                <tr>
                  <td class="message" colspan="4">読み込み中...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script type="module">
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { addDoc, collection, deleteDoc, doc, getDoc, getDocs, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { auth, db } from "./firebase.js";

    const topAccountName = document.getElementById("topAccountName");
    const tagForm = document.getElementById("tagForm");
    const tagNameInput = document.getElementById("tagName");
    const addButton = document.getElementById("addButton");
    const message = document.getElementById("message");
    const loading = document.getElementById("loading");
    const emptyMessage = document.getElementById("emptyMessage");
    const tableWrap = document.getElementById("tableWrap");
    const tagTableBody = document.getElementById("tagTableBody");
    let currentUser = null;
    let projectTagCounts = {};

    function getTagsCollectionRef() {
      return collection(db, "users", currentUser.uid, "tags");
    }

    function getTagDocRef(tagId) {
      return doc(db, "users", currentUser.uid, "tags", tagId);
    }

    function formatDate(value) {
      if (!value) {
        return "-";
      }

      const date = typeof value.toDate === "function" ? value.toDate() : new Date(value);

      if (Number.isNaN(date.getTime())) {
        return "-";
      }

      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}/${month}/${day}`;
    }

    function showMessage(text, isError = false) {
      message.textContent = text;
      message.className = isError ? "message error" : "message";
    }

    async function loadAccountName() {
      try {
        const userSnapshot = await getDoc(doc(db, "users", currentUser.uid));
        topAccountName.textContent = userSnapshot.exists()
          ? userSnapshot.data().userId || currentUser.email
          : currentUser.email;
      } catch (error) {
        topAccountName.textContent = currentUser.email || "user";
      }
    }

    async function loadProjectTagCounts() {
      const snapshot = await getDocs(collection(db, "users", currentUser.uid, "projects"));
      const counts = {};

      snapshot.docs.forEach((projectDoc) => {
        const tags = projectDoc.data().tags;

        if (!Array.isArray(tags)) {
          return;
        }

        tags.forEach((tagName) => {
          counts[tagName] = (counts[tagName] || 0) + 1;
        });
      });

      projectTagCounts = counts;
    }

    function createTagRow(tag) {
      const row = document.createElement("tr");
      const nameCell = document.createElement("td");
      const countCell = document.createElement("td");
      const dateCell = document.createElement("td");
      const actionCell = document.createElement("td");
      const actions = document.createElement("div");
      const editButton = document.createElement("button");
      const deleteButton = document.createElement("button");
      const pill = document.createElement("span");

      pill.className = "tag-pill";
      pill.textContent = tag.name;
      nameCell.className = "tag-name";
      nameCell.appendChild(pill);
      countCell.textContent = (projectTagCounts[tag.name] || 0) + "件";
      dateCell.textContent = formatDate(tag.createdAt);
      actions.className = "actions tag-actions";

      editButton.className = "button edit-button";
      editButton.type = "button";
      editButton.textContent = "編集";
      editButton.addEventListener("click", () => {
        editTag(tag);
      });

      deleteButton.className = "button delete-button";
      deleteButton.type = "button";
      deleteButton.textContent = "削除";
      deleteButton.addEventListener("click", () => {
        deleteTag(tag);
      });

      actions.appendChild(editButton);
      actions.appendChild(deleteButton);
      actionCell.appendChild(actions);

      row.appendChild(nameCell);
      row.appendChild(countCell);
      row.appendChild(dateCell);
      row.appendChild(actionCell);

      return row;
    }

    async function loadTags() {
      loading.style.display = "block";
      tableWrap.style.display = "none";
      emptyMessage.style.display = "none";

      try {
        await loadProjectTagCounts();
        const snapshot = await getDocs(getTagsCollectionRef());
        const tags = snapshot.docs
          .map((tagDoc) => {
            return {
              id: tagDoc.id,
              ...tagDoc.data()
            };
          })
          .sort((tagA, tagB) => String(tagA.name || "").localeCompare(String(tagB.name || ""), "ja"));

        if (tags.length === 0) {
          emptyMessage.style.display = "block";
          return;
        }

        tagTableBody.innerHTML = "";
        tags.forEach((tag) => {
          tagTableBody.appendChild(createTagRow(tag));
        });
        tableWrap.style.display = "block";
      } catch (error) {
        console.error("タグの取得に失敗しました:", error);
        tagTableBody.innerHTML = '<tr><td class="message error" colspan="4">タグの取得に失敗しました</td></tr>';
        tableWrap.style.display = "block";
      } finally {
        loading.style.display = "none";
      }
    }

    async function editTag(tag) {
      const newName = prompt("タグ名を編集してください", tag.name);

      if (!newName || newName.trim() === "") {
        return;
      }

      try {
        await updateDoc(getTagDocRef(tag.id), {
          name: newName.trim(),
          updatedAt: serverTimestamp()
        });
        showMessage("タグを更新しました");
        await loadTags();
      } catch (error) {
        console.error("タグの更新に失敗しました:", error);
        showMessage("タグの更新に失敗しました", true);
      }
    }

    async function deleteTag(tag) {
      const shouldDelete = await window.FreelaBoard.showConfirmDialog({
        title: "タグを削除",
        message: `${tag.name} を削除します。案件に保存済みのタグ名はそのまま残ります。`,
        confirmText: "削除する",
        tone: "danger"
      });

      if (!shouldDelete) {
        return;
      }

      try {
        await deleteDoc(getTagDocRef(tag.id));
        showMessage("タグを削除しました");
        await loadTags();
      } catch (error) {
        console.error("タグの削除に失敗しました:", error);
        showMessage("タグの削除に失敗しました", true);
      }
    }

    tagForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const tagName = tagNameInput.value.trim();

      if (!tagName) {
        showMessage("タグ名を入力してください", true);
        return;
      }

      addButton.disabled = true;
      showMessage("");

      try {
        await addDoc(getTagsCollectionRef(), {
          name: tagName,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
        tagNameInput.value = "";
        showMessage("タグを追加しました");
        await loadTags();
      } catch (error) {
        console.error("タグの追加に失敗しました:", error);
        showMessage("タグの追加に失敗しました", true);
      } finally {
        addButton.disabled = false;
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "./login.html";
        return;
      }

      currentUser = user;
      await loadAccountName();
      await loadTags();
    });
  </script>
  <script src="./assets/common.js"></script>
</body>
</html>
