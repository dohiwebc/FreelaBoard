<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規登録 | FreelaBoard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "Noto Sans JP", Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    a {
      color: #4f46e5;
      font-weight: 700;
      text-decoration: none;
    }

    .auth-page {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 32px 20px;
    }

    .auth-card {
      width: min(520px, 100%);
      padding: 42px;
      border: 1px solid #dbe1ea;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 16px 40px rgba(17, 24, 39, 0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 22px;
      color: #0f1f45;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .brand-icon {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border: 3px solid #0f1f45;
      border-radius: 6px;
      font-size: 20px;
      line-height: 1;
    }

    .lead {
      margin: 0 0 34px;
      color: #4b5563;
      font-size: 17px;
      text-align: center;
    }

    .form {
      display: grid;
      gap: 22px;
    }

    .form-field {
      display: grid;
      gap: 9px;
    }

    label {
      color: #111827;
      font-size: 14px;
      font-weight: 700;
    }

    .help-text {
      margin: 0;
      color: #6b7280;
      font-size: 13px;
      line-height: 1.6;
    }

    input {
      width: 100%;
      min-height: 46px;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      color: #111827;
      font: inherit;
      font-size: 15px;
    }

    input:focus {
      border-color: #4f46e5;
      outline: none;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.14);
    }

    .password-wrap {
      position: relative;
    }

    .password-wrap input {
      padding-right: 54px;
    }

    .toggle-password {
      position: absolute;
      top: 50%;
      right: 10px;
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #4b5563;
      font-size: 18px;
      cursor: pointer;
      transform: translateY(-50%);
    }

    .toggle-password:hover {
      background: #f3f4f6;
    }

    .error-message {
      display: none;
      padding: 12px 14px;
      border-radius: 8px;
      background: #fee2e2;
      color: #b91c1c;
      font-size: 14px;
      line-height: 1.6;
    }

    .error-message.show {
      display: block;
    }

    .submit-button {
      min-height: 48px;
      border: none;
      border-radius: 8px;
      background: #6257e8;
      color: #ffffff;
      font: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(98, 87, 232, 0.24);
    }

    .submit-button:hover {
      background: #5548dd;
    }

    .submit-button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    .divider {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 18px;
      align-items: center;
      margin: 28px 0;
      color: #6b7280;
      font-size: 14px;
    }

    .divider::before,
    .divider::after {
      height: 1px;
      background: #e5e7eb;
      content: "";
    }

    .footer-text {
      margin: 0;
      color: #6b7280;
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 560px) {
      .auth-card {
        padding: 28px 22px;
      }

      .brand {
        font-size: 26px;
      }
    }

    /* Responsive layout */
    .mobile-header,
    .sidebar-overlay,
    .sidebar-close {
      display: none;
    }

    @media (min-width: 768px) and (max-width: 1023px) {
      .sidebar {
        width: 190px !important;
        padding: 22px 12px !important;
      }

      .main {
        margin-left: 190px !important;
        padding: 28px 22px !important;
      }

      .content {
        max-width: 100% !important;
      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }

      .form-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }

      .table-wrap,
      .invoice-scroll,
      .calendar-scroll {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }

      table {
        min-width: 820px;
      }
    }

    @media (max-width: 767px) {
      body {
        min-width: 0;
      }

      .mobile-header {
        position: sticky;
        top: 0;
        z-index: 80;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 58px;
        padding: 0 16px;
        border-bottom: 1px solid #e5e7eb;
        background: #ffffff;
        box-shadow: 0 8px 18px rgba(17, 24, 39, 0.08);
      }

      .mobile-logo {
        color: #0f2a4a;
        font-size: 17px;
        font-weight: 700;
      }

      .hamburger-button,
      .sidebar-close {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 42px;
        height: 42px;
        border: 0;
        border-radius: 8px;
        background: #eff6ff;
        color: #0f2a4a;
        cursor: pointer;
        font-size: 22px;
        font-weight: 700;
      }

      .sidebar-close {
        position: absolute;
        top: 14px;
        right: 14px;
        background: rgba(255, 255, 255, 0.12);
        color: #ffffff;
      }

      .sidebar-overlay {
        position: fixed;
        inset: 0;
        z-index: 90;
        display: block;
        visibility: hidden;
        background: rgba(15, 23, 42, 0.46);
        opacity: 0;
        transition: opacity 0.2s ease, visibility 0.2s ease;
      }

      body.sidebar-open .sidebar-overlay {
        visibility: visible;
        opacity: 1;
      }

      .layout {
        display: block !important;
        min-height: auto !important;
      }

      .sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        z-index: 100 !important;
        display: flex !important;
        flex-direction: column !important;
        width: min(82vw, 300px) !important;
        height: 100vh !important;
        padding: 24px 16px !important;
        transform: translateX(-105%);
        transition: transform 0.24s ease;
        overflow-y: auto;
      }

      body.sidebar-open .sidebar {
        transform: translateX(0);
      }

      .sidebar .logo {
        margin-right: 44px;
      }

      .nav {
        display: grid !important;
        grid-template-columns: 1fr !important;
        gap: 8px !important;
        overflow: visible !important;
      }

      .nav-link {
        justify-content: flex-start !important;
        min-width: 0 !important;
        min-height: 44px;
        padding: 12px 14px !important;
      }

      .nav-icon {
        display: grid !important;
      }

      .sidebar-account {
        margin-top: auto !important;
      }

      .logout {
        display: inline-flex !important;
        min-height: 44px;
        align-items: center;
      }

      .main {
        width: 100% !important;
        margin-left: 0 !important;
        padding: 22px 16px 32px !important;
      }

      .content {
        max-width: 100% !important;
      }

      .page-header,
      .calendar-controls,
      .toolbar,
      .filter-bar,
      .actions,
      .detail-actions,
      .invoice-actions {
        align-items: stretch !important;
        flex-direction: column !important;
        gap: 12px !important;
      }

      .page-title {
        font-size: 24px !important;
      }

      .page-lead {
        font-size: 14px !important;
      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid,
      .form-grid,
      .filters,
      .toolbar,
      .workspace,
      .invoice-grid,
      .invoice-header,
      .invoice-footer {
        grid-template-columns: 1fr !important;
      }

      .summary-card,
      .table-card,
      .form-card,
      .detail-card,
      .profile-card,
      .settings-card,
      .toolbar-card,
      .calendar-card,
      .week-card,
      .detail-panel,
      .auth-card {
        border-radius: 8px !important;
      }

      input,
      select,
      textarea,
      .button,
      .new-button,
      .primary-button,
      .secondary-button,
      .ghost-button,
      .danger-button,
      .filter-button,
      .clear-button,
      .detail-button,
      .preview-button {
        width: 100%;
        min-height: 44px;
      }

      .table-wrap,
      .invoice-scroll,
      .calendar-scroll {
        width: 100%;
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }

      table {
        min-width: 760px;
      }

      th,
      td {
        white-space: nowrap;
      }

      .item-row,
      .items-row {
        grid-template-columns: 1fr !important;
      }

      .drag-handle {
        width: 100% !important;
        min-height: 34px;
      }

      .calendar-grid {
        min-width: 680px !important;
      }

      .day-cell {
        min-height: 104px !important;
        padding: 8px !important;
      }

      .event-title {
        max-width: 100%;
      }

      .week-row {
        min-width: 720px;
      }

      .invoice-card,
      .invoice-paper {
        min-width: 720px;
      }

      @media print {
        .mobile-header,
        .sidebar-overlay,
        .sidebar-close {
          display: none !important;
        }
      }
    }

    /* Responsive print and scroll safeguards */
    @media print {
      .mobile-header,
      .sidebar-overlay,
      .sidebar-close {
        display: none !important;
      }
    }

    @media (max-width: 767px) {
      .week-card,
      .invoice-card,
      .invoice-paper {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }
    }

    /* Tablet keeps desktop-style sidebar */
    @media (min-width: 768px) and (max-width: 1023px) {
      .layout {
        display: flex !important;
        min-height: 100vh !important;
      }

      .sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        height: 100vh !important;
      }

      .nav {
        grid-template-columns: 1fr !important;
        overflow: visible !important;
      }

      .nav-link {
        justify-content: flex-start !important;
        min-width: 0 !important;
      }

      .nav-icon {
        display: grid !important;
      }

      .logout {
        display: inline-flex !important;
      }
    }

    /* Compact tablet and mobile density */
    @media (min-width: 768px) and (max-width: 1023px) {
      body {
        font-size: 13px;
      }

      .main {
        padding: 22px 18px !important;
      }

      .page-header {
        margin-bottom: 18px !important;
      }

      .page-title {
        font-size: 23px !important;
      }

      .page-lead {
        font-size: 12px !important;
        line-height: 1.55 !important;
      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid {
        gap: 12px !important;
      }

      .summary-card,
      .table-card,
      .form-card,
      .detail-card,
      .profile-card,
      .settings-card,
      .toolbar-card,
      .calendar-card,
      .week-card,
      .detail-panel,
      .auth-card {
        padding: 16px !important;
      }

      .summary-label,
      .card-note,
      .summary-note,
      .detail-label,
      th {
        font-size: 11px !important;
      }

      .summary-value {
        font-size: 20px !important;
      }

      th,
      td {
        padding: 11px 12px !important;
        font-size: 12px !important;
      }

      input,
      select,
      textarea,
      .button,
      .new-button,
      .primary-button,
      .secondary-button,
      .ghost-button,
      .danger-button,
      .filter-button,
      .clear-button,
      .detail-button,
      .preview-button {
        min-height: 38px !important;
        font-size: 12px !important;
      }

      .filter-bar,
      .toolbar,
      .card-header {
        padding: 14px 16px !important;
      }

      .nav-link {
        padding: 10px 12px !important;
        font-size: 12px !important;
      }
    }

    @media (max-width: 767px) {
      body {
        font-size: 12px;
      }

      .mobile-header {
        height: 50px !important;
        padding: 0 12px !important;
      }

      .mobile-logo {
        font-size: 15px !important;
      }

      .hamburger-button,
      .sidebar-close {
        width: 36px !important;
        height: 36px !important;
        font-size: 19px !important;
      }

      .sidebar {
        width: min(78vw, 260px) !important;
        padding: 18px 12px !important;
      }

      .logo {
        font-size: 18px !important;
        margin-bottom: 18px !important;
      }

      .nav-link {
        min-height: 39px !important;
        padding: 9px 11px !important;
        font-size: 12px !important;
        gap: 8px !important;
      }

      .nav-icon {
        width: 18px !important;
        height: 18px !important;
        font-size: 13px !important;
      }

      .sidebar-account {
        padding: 8px 10px !important;
        font-size: 12px !important;
      }

      .sidebar-avatar {
        width: 28px !important;
        height: 28px !important;
      }

      .main {
        padding: 16px 12px 24px !important;
      }

      .page-header {
        margin-bottom: 16px !important;
      }

      .page-title {
        font-size: 21px !important;
      }

      .page-lead {
        font-size: 12px !important;
        line-height: 1.5 !important;
      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid,
      .form-grid,
      .filters {
        gap: 10px !important;
      }

      .summary-card,
      .table-card,
      .form-card,
      .detail-card,
      .profile-card,
      .settings-card,
      .toolbar-card,
      .calendar-card,
      .week-card,
      .detail-panel,
      .auth-card {
        padding: 13px !important;
      }

      .summary-label,
      .summary-note,
      .card-note,
      .detail-label,
      .help-text,
      th {
        font-size: 10.5px !important;
      }

      .summary-value {
        font-size: 18px !important;
      }

      .card-title,
      .form-title,
      .section-title {
        font-size: 14px !important;
      }

      th,
      td {
        padding: 9px 10px !important;
        font-size: 11.5px !important;
      }

      input,
      select,
      textarea,
      .button,
      .new-button,
      .primary-button,
      .secondary-button,
      .ghost-button,
      .danger-button,
      .filter-button,
      .clear-button,
      .detail-button,
      .preview-button {
        min-height: 38px !important;
        padding: 8px 10px !important;
        font-size: 12px !important;
      }

      .filter-bar,
      .toolbar,
      .card-header,
      .calendar-controls {
        padding: 12px !important;
        gap: 9px !important;
      }

      .status,
      .status-badge,
      .tag-badge {
        padding: 4px 8px !important;
        font-size: 10.5px !important;
      }

      .day-cell {
        min-height: 86px !important;
        padding: 6px !important;
      }

      .event-card {
        padding: 6px !important;
      }

      .event-title,
      .event-id,
      .event-days {
        font-size: 10px !important;
      }

      .auth-card {
        width: min(420px, 100%) !important;
      }
    }

    /* Center mobile header logo */
    @media (max-width: 1023px) {
      .mobile-header {
        position: sticky;
        justify-content: center !important;
      }

      .hamburger-button {
        position: absolute;
        left: 12px;
      }

      .mobile-logo {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        white-space: nowrap;
      }
    }

    /* Polished hamburger menu */
    @media (max-width: 1023px) {
      .hamburger-button {
        display: inline-flex !important;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        border: 1px solid #dbeafe !important;
        background: linear-gradient(180deg, #ffffff 0%, #eff6ff 100%) !important;
        color: #0f2a4a !important;
        box-shadow: 0 8px 18px rgba(15, 42, 74, 0.14);
      }

      .hamburger-button span {
        display: block;
        width: 17px;
        height: 2px;
        border-radius: 999px;
        background: #0f2a4a;
        transition: transform 0.2s ease, opacity 0.2s ease, width 0.2s ease;
      }

      .hamburger-button span:nth-child(2) {
        width: 13px;
      }

      .hamburger-button:hover span:nth-child(2) {
        width: 17px;
      }

      body.sidebar-open .hamburger-button span:nth-child(1) {
        transform: translateY(6px) rotate(45deg);
      }

      body.sidebar-open .hamburger-button span:nth-child(2) {
        opacity: 0;
      }

      body.sidebar-open .hamburger-button span:nth-child(3) {
        transform: translateY(-6px) rotate(-45deg);
      }
    }

    /* Polished opened mobile menu */
    @media (max-width: 767px) {
      .sidebar {
        width: min(84vw, 292px) !important;
        padding: 20px 14px 18px !important;
        background: linear-gradient(180deg, #0f2a4a 0%, #123a64 55%, #0b1f38 100%) !important;
        border-radius: 0 18px 18px 0;
        box-shadow: 18px 0 42px rgba(15, 23, 42, 0.28);
      }

      .sidebar .logo {
        display: flex;
        align-items: center;
        min-height: 40px;
        margin: 0 46px 18px 2px !important;
        color: #ffffff;
        font-size: 18px !important;
        letter-spacing: 0.01em;
      }

      .sidebar-close {
        top: 18px !important;
        right: 14px !important;
        width: 34px !important;
        height: 34px !important;
        border: 1px solid rgba(255, 255, 255, 0.16) !important;
        border-radius: 999px !important;
        background: rgba(255, 255, 255, 0.10) !important;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
        font-size: 20px !important;
        line-height: 1;
      }

      .sidebar .nav {
        gap: 6px !important;
        padding: 8px 0 14px;
      }

      .sidebar .nav-link {
        min-height: 42px !important;
        padding: 10px 12px !important;
        border: 1px solid transparent;
        border-radius: 10px !important;
        color: #dbeafe !important;
        background: transparent;
        transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
      }

      .sidebar .nav-link:hover,
      .sidebar .nav-link.active {
        background: rgba(255, 255, 255, 0.12) !important;
        border-color: rgba(255, 255, 255, 0.12);
        color: #ffffff !important;
        transform: translateX(2px);
      }

      .sidebar .nav-icon {
        width: 26px !important;
        height: 26px !important;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.10);
        color: #ffffff;
        font-size: 13px !important;
      }

      .sidebar .nav-link.active .nav-icon {
        background: #ffffff;
        color: #123a64;
      }

      .sidebar-account {
        margin-top: auto !important;
        margin-bottom: 10px !important;
        padding: 10px !important;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 12px !important;
        background: rgba(255, 255, 255, 0.10) !important;
        backdrop-filter: blur(8px);
      }

      .logout {
        justify-content: center;
        min-height: 40px !important;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.08);
        color: #dbeafe !important;
        font-size: 12px !important;
        font-weight: 700;
      }

      .sidebar-overlay {
        background: rgba(2, 6, 23, 0.54) !important;
        backdrop-filter: blur(2px);
      }
    }

    /* Cleaner selected state in mobile menu */
    @media (max-width: 767px) {
      .sidebar .nav-link {
        position: relative;
        border-color: transparent !important;
        box-shadow: none !important;
      }

      .sidebar .nav-link.active {
        background: rgba(255, 255, 255, 0.13) !important;
        border-color: transparent !important;
        box-shadow: inset 3px 0 0 #93c5fd !important;
      }

      .sidebar .nav-link:hover {
        border-color: transparent !important;
        box-shadow: none !important;
      }

      .sidebar .nav-link.active:hover {
        box-shadow: inset 3px 0 0 #93c5fd !important;
      }

      .sidebar .nav-link.active .nav-icon {
        background: rgba(147, 197, 253, 0.22) !important;
        color: #ffffff !important;
      }
    }

    /* Plain mobile menu icons */
    @media (max-width: 767px) {
      .sidebar .nav-icon,
      .sidebar .nav-link.active .nav-icon {
        background: transparent !important;
        border-radius: 0 !important;
        color: currentColor !important;
      }
    }

    /* Motion effects */
    @keyframes fbFadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fbPopIn {
      0% {
        opacity: 0;
        transform: scale(0.88);
      }
      70% {
        transform: scale(1.06);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fbPulseSoft {
      0%, 100% {
        transform: scale(1);
        box-shadow: none;
      }
      50% {
        transform: scale(1.03);
        box-shadow: 0 8px 18px rgba(245, 158, 11, 0.18);
      }
    }

    .summary-card,
    .chart-card,
    .recent-card,
    .table-card,
    .form-card,
    .detail-card,
    .profile-card,
    .settings-card,
    .toolbar-card,
    .calendar-card,
    .week-card,
    .detail-panel,
    .auth-card {
      animation: fbFadeUp 0.85s ease both;
    }

    .summary-card:nth-child(2),
    .chart-card:nth-child(2),
    .form-card + .table-card {
      animation-delay: 0.06s;
    }

    .summary-card:nth-child(3) {
      animation-delay: 0.12s;
    }

    .summary-card:nth-child(4) {
      animation-delay: 0.18s;
    }

    .summary-card:nth-child(5) {
      animation-delay: 0.24s;
    }

    .summary-card:nth-child(6) {
      animation-delay: 0.30s;
    }

    .summary-card:nth-child(7) {
      animation-delay: 0.36s;
    }

    tbody tr,
    .alert-item,
    .week-row,
    .event-card {
      animation: fbFadeUp 0.65s ease both;
    }

    tbody tr:hover,
    .alert-item:hover,
    .event-card:hover,
    .summary-card:hover,
    .chart-card:hover,
    .recent-card:hover {
      transform: translateY(-2px);
      transition: transform 0.32s ease, box-shadow 0.32s ease, background 0.32s ease;
    }

    .status,
    .status-badge,
    .tag-badge {
      transition: transform 0.32s ease, box-shadow 0.32s ease, filter 0.32s ease;
    }

    .status:hover,
    .status-badge:hover,
    .tag-badge:hover {
      transform: translateY(-1px) scale(1.02);
      filter: saturate(1.08);
    }

    .status-waiting,
    .status-overdue,
    .event-card.status-overdue,
    .event-card.status-payment {
      animation: fbPulseSoft 4.2s ease-in-out infinite;
    }

    @media (max-width: 767px) {
      body.sidebar-open .sidebar .nav-link {
        animation: fbFadeUp 0.55s ease both;
      }

      body.sidebar-open .sidebar .nav-link:nth-child(1) { animation-delay: 0.03s; }
      body.sidebar-open .sidebar .nav-link:nth-child(2) { animation-delay: 0.06s; }
      body.sidebar-open .sidebar .nav-link:nth-child(3) { animation-delay: 0.09s; }
      body.sidebar-open .sidebar .nav-link:nth-child(4) { animation-delay: 0.12s; }
      body.sidebar-open .sidebar .nav-link:nth-child(5) { animation-delay: 0.15s; }
      body.sidebar-open .sidebar .nav-link:nth-child(6) { animation-delay: 0.18s; }
      body.sidebar-open .sidebar .nav-link:nth-child(7) { animation-delay: 0.21s; }
      body.sidebar-open .sidebar .nav-link:nth-child(8) { animation-delay: 0.24s; }
      body.sidebar-open .sidebar .nav-link:nth-child(9) { animation-delay: 0.27s; }
      body.sidebar-open .sidebar .nav-link:nth-child(10) { animation-delay: 0.30s; }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }

  </style>
  <link rel="stylesheet" href="./assets/common.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="brand">
        <span class="brand-icon">▣</span>
        <span>FreelaBoard</span>
      </div>
      <p class="lead">新しいアカウントを作成</p>

      <form class="form" id="registerForm">
        <div class="form-field">
          <label for="userId">ユーザーID</label>
          <input id="userId" name="userId" type="text" placeholder="例：freela_taro" minlength="3" maxlength="20" pattern="[A-Za-z0-9_]{3,20}" required>
          <p class="help-text">半角英数字とアンダースコアのみ、3文字以上20文字以内</p>
        </div>

        <div class="form-field">
          <label for="email">メールアドレス</label>
          <input id="email" name="email" type="email" placeholder="例：example@email.com" autocomplete="email" required>
        </div>

        <div class="form-field">
          <label for="password">パスワード</label>
          <div class="password-wrap">
            <input id="password" name="password" type="password" placeholder="パスワードを入力" autocomplete="new-password" minlength="6" required>
            <button class="toggle-password" type="button" data-target="password" aria-label="パスワードを表示">◉</button>
          </div>
          <p class="help-text">半角英数字を含む6文字以上推奨</p>
        </div>

        <div class="form-field">
          <label for="confirmPassword">パスワード（確認用）</label>
          <div class="password-wrap">
            <input id="confirmPassword" name="confirmPassword" type="password" placeholder="パスワードを再入力" autocomplete="new-password" minlength="6" required>
            <button class="toggle-password" type="button" data-target="confirmPassword" aria-label="確認用パスワードを表示">◉</button>
          </div>
        </div>

        <p class="error-message" id="errorMessage"></p>

        <button class="submit-button" id="submitButton" type="submit">新規登録</button>
      </form>

      <div class="divider">または</div>

      <p class="footer-text">
        すでにアカウントをお持ちですか？
        <a href="./login.html">ログインはこちら</a>
      </p>
    </section>
  </main>

  <script type="module">
    import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { doc, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { auth, db } from "./firebase.js";

    const registerForm = document.getElementById("registerForm");
    const userIdInput = document.getElementById("userId");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const errorMessage = document.getElementById("errorMessage");
    const submitButton = document.getElementById("submitButton");

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.classList.add("show");
    }

    function hideError() {
      errorMessage.textContent = "";
      errorMessage.classList.remove("show");
    }

    function getJapaneseErrorMessage(errorCode) {
      if (errorCode === "auth/email-already-in-use") {
        return "このメールアドレスはすでに登録されています。";
      }

      if (errorCode === "auth/invalid-email") {
        return "メールアドレスの形式が正しくありません。";
      }

      if (errorCode === "auth/weak-password") {
        return "パスワードは6文字以上で入力してください。";
      }

      if (errorCode === "auth/network-request-failed") {
        return "ネットワークエラーが発生しました。通信環境を確認してください。";
      }

      return "登録に失敗しました。入力内容を確認してください。";
    }

    function isValidUserId(userId) {
      return /^[A-Za-z0-9_]{3,20}$/.test(userId);
    }

    document.querySelectorAll(".toggle-password").forEach((button) => {
      button.addEventListener("click", () => {
        const input = document.getElementById(button.dataset.target);
        const isPassword = input.type === "password";

        input.type = isPassword ? "text" : "password";
        button.textContent = isPassword ? "○" : "◉";
        button.setAttribute("aria-label", isPassword ? "パスワードを非表示" : "パスワードを表示");
      });
    });

    // フォーム送信時にAuthenticationへ登録し、Firestoreへプロフィールを保存します。
    registerForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      hideError();

      const userId = userIdInput.value.trim();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (!isValidUserId(userId)) {
        showError("ユーザーIDは半角英数字とアンダースコアのみ、3文字以上20文字以内で入力してください。");
        return;
      }

      if (password !== confirmPassword) {
        showError("パスワードと確認用パスワードが一致しません。");
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = "登録中...";

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);

        await setDoc(doc(db, "users", userCredential.user.uid), {
          userId,
          email,
          createdAt: serverTimestamp()
        });

        window.location.href = "./dashboard.html";
      } catch (error) {
        showError(getJapaneseErrorMessage(error.code));
        submitButton.disabled = false;
        submitButton.textContent = "新規登録";
      }
    });
  </script>
  <script src="./assets/common.js"></script>
</body>
</html>
