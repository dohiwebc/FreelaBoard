<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案件詳細 | FreelaBoard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Noto Sans JP", Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      width: 220px;
      height: 100vh;
      padding: 24px 16px;
      background: #0f2a4a;
      color: #ffffff;
    }

    .logo {
      margin: 0 0 28px;
      font-size: 20px;
      font-weight: 700;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 8px;
      color: #dbeafe;
      font-size: 14px;
      font-weight: 700;
    }

    .nav-link:hover,
    .nav-link.active {
      background: #163b68;
      color: #ffffff;
    }

    .nav-icon {
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      font-size: 15px;
    }

    .nav-icon-image {
      width: 16px;
      height: 16px;
      object-fit: contain;
    }

    .logout {
      color: #dbeafe;
      font-size: 14px;
      font-weight: 700;
    }

    .sidebar-account {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: auto;
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
    }

    .sidebar-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .main {
      width: 100%;
      margin-left: 220px;
      padding: 40px;
    }

    .content {
      max-width: 760px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-flex;
      margin-bottom: 18px;
      color: #2563eb;
      font-size: 14px;
      font-weight: 700;
    }

    .detail-card {
      padding: 32px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
    }

    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
    }

    .page-title {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 78px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .status-consulting {
      background: #f3f4f6;
      color: #6b7280;
    }

    .status-progress {
      background: #dbeafe;
      color: #2563eb;
    }

    .status-delivered {
      background: #ede9fe;
      color: #7c3aed;
    }

    .status-waiting {
      background: #ffedd5;
      color: #f97316;
    }

    .status-done {
      background: #dcfce7;
      color: #16a34a;
    }

    .status-default {
      background: #f3f4f6;
      color: #6b7280;
    }

    .detail-list {
      display: grid;
      gap: 18px;
      margin: 0;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 18px;
      padding-bottom: 18px;
      border-bottom: 1px solid #e5e7eb;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: #6b7280;
      font-size: 14px;
      font-weight: 700;
    }

    .detail-value {
      margin: 0;
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .amount {
      font-weight: 700;
    }

    .item-list {
      display: grid;
      gap: 10px;
    }

    .item-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 120px 120px;
      gap: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      background: #f9fafb;
      font-size: 14px;
    }

    .item-name {
      color: #111827;
      font-weight: 700;
    }

    .item-price {
      color: #374151;
      font-weight: 700;
      white-space: nowrap;
      text-align: right;
    }

    .item-type {
      color: #6b7280;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag-badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: #dbeafe;
      color: #2563eb;
      font-size: 12px;
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    .primary-button {
      background: #123a74;
      color: #ffffff;
    }

    .danger-button {
      border: none;
      background: #fee2e2;
      color: #dc2626;
      cursor: pointer;
    }

    .danger-button:hover {
      background: #fecaca;
    }

    .secondary-button {
      background: #f3f4f6;
      color: #374151;
    }

    .success-button {
      border: none;
      background: #dcfce7;
      color: #15803d;
      cursor: pointer;
    }

    .success-button:hover {
      background: #bbf7d0;
    }

    .message {
      padding: 36px;
      color: #6b7280;
      text-align: center;
    }

    .loading {
      padding: 18px 0;
      color: #6b7280;
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 820px) {
      .layout {
        display: block;
      }

      .sidebar {
        position: static;
        width: 100%;
        height: auto;
        padding: 18px 16px;
      }

      .logo {
        margin-bottom: 16px;
      }

      .nav {
        grid-template-columns: repeat(10, minmax(0, 1fr));
      }

      .nav-link {
        justify-content: center;
        padding: 10px;
      }

      .nav-icon,
      .logout {
        display: none;
      }

      .main {
        margin-left: 0;
        padding: 24px 16px;
      }

      .detail-card {
        padding: 24px;
      }

      .detail-header,
      .actions {
        align-items: stretch;
        flex-direction: column;
      }

      .detail-row {
        grid-template-columns: 1fr;
        gap: 6px;
      }
    }

    /* Responsive layout */
    .mobile-header,
    .sidebar-overlay,
    .sidebar-close {
      display: none;
    }

    @media (min-width: 768px) and (max-width: 1023px) {
      .sidebar {
        width: 190px !important;
        padding: 22px 12px !important;
      }

      .main {
        margin-left: 190px !important;
        padding: 28px 22px !important;
      }

      .content {
        max-width: 100% !important;
      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }

      .form-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }

      .table-wrap,
      .invoice-scroll,
      .calendar-scroll {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }

      table {
        min-width: 820px;
      }
    }

    @media (max-width: 767px) {
      body {
        min-width: 0;
      }

      .mobile-header {
        position: sticky;
        top: 0;
        z-index: 80;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 58px;
        padding: 0 16px;
        border-bottom: 1px solid #e5e7eb;
        background: #ffffff;
        box-shadow: 0 8px 18px rgba(17, 24, 39, 0.08);
      }

      .mobile-logo {
        color: #0f2a4a;
        font-size: 17px;
        font-weight: 700;
      }

      .hamburger-button,
      .sidebar-close {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 42px;
        height: 42px;
        border: 0;
        border-radius: 8px;
        background: #eff6ff;
        color: #0f2a4a;
        cursor: pointer;
        font-size: 22px;
        font-weight: 700;
      }

      .sidebar-close {
        position: absolute;
        top: 14px;
        right: 14px;
        background: rgba(255, 255, 255, 0.12);
        color: #ffffff;
      }

      .sidebar-overlay {
        position: fixed;
        inset: 0;
        z-index: 90;
        display: block;
        visibility: hidden;
        background: rgba(15, 23, 42, 0.46);
        opacity: 0;
        transition: opacity 0.2s ease, visibility 0.2s ease;
      }

      body.sidebar-open .sidebar-overlay {
        visibility: visible;
        opacity: 1;
      }

      .layout {
        display: block !important;
        min-height: auto !important;
      }

      .sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        z-index: 100 !important;
        display: flex !important;
        flex-direction: column !important;
        width: min(82vw, 300px) !important;
        height: 100vh !important;
        padding: 24px 16px !important;
        transform: translateX(-105%);
        transition: transform 0.24s ease;
        overflow-y: auto;
      }

      body.sidebar-open .sidebar {
        transform: translateX(0);
      }

      .sidebar .logo {
        margin-right: 44px;
      }

      .nav {
        display: grid !important;
        grid-template-columns: 1fr !important;
        gap: 8px !important;
        overflow: visible !important;
      }

      .nav-link {
        justify-content: flex-start !important;
        min-width: 0 !important;
        min-height: 44px;
        padding: 12px 14px !important;
      }

      .nav-icon {
        display: grid !important;
      }

      .sidebar-account {
        margin-top: auto !important;
      }

      .logout {
        display: inline-flex !important;
        min-height: 44px;
        align-items: center;
      }

      .main {
        width: 100% !important;
        margin-left: 0 !important;
        padding: 22px 16px 32px !important;
      }

      .content {
        max-width: 100% !important;
      }

      .page-header,
      .calendar-controls,
      .toolbar,
      .filter-bar,
      .actions,
      .detail-actions,
      .invoice-actions {
        align-items: stretch !important;
        flex-direction: column !important;
        gap: 12px !important;
      }

      .page-title {
        font-size: 24px !important;
      }

      .page-lead {
        font-size: 14px !important;
      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid,
      .form-grid,
      .filters,
      .toolbar,
      .workspace,
      .invoice-grid,
      .invoice-header,
      .invoice-footer {
        grid-template-columns: 1fr !important;
      }

      .summary-card,
      .table-card,
      .form-card,
      .detail-card,
      .profile-card,
      .settings-card,
      .toolbar-card,
      .calendar-card,
      .week-card,
      .detail-panel,
      .auth-card {
        border-radius: 8px !important;
      }

      input,
      select,
      textarea,
      .button,
      .new-button,
      .primary-button,
      .secondary-button,
      .ghost-button,
      .danger-button,
      .filter-button,
      .clear-button,
      .detail-button,
      .preview-button {
        width: 100%;
        min-height: 44px;
      }

      .table-wrap,
      .invoice-scroll,
      .calendar-scroll {
        width: 100%;
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }

      table {
        min-width: 760px;
      }

      th,
      td {
        white-space: nowrap;
      }

      .item-row,
      .items-row {
        grid-template-columns: 1fr !important;
      }

      .drag-handle {
        width: 100% !important;
        min-height: 34px;
      }

      .calendar-grid {
        min-width: 680px !important;
      }

      .day-cell {
        min-height: 104px !important;
        padding: 8px !important;
      }

      .event-title {
        max-width: 100%;
      }

      .week-row {
        min-width: 720px;
      }

      .invoice-card,
      .invoice-paper {
        min-width: 720px;
      }

      @media print {
        .mobile-header,
        .sidebar-overlay,
        .sidebar-close {
          display: none !important;
        }
      }
    }

    /* Responsive print and scroll safeguards */
    @media print {
      .mobile-header,
      .sidebar-overlay,
      .sidebar-close {
        display: none !important;
      }
    }

    @media (max-width: 767px) {
      .week-card,
      .invoice-card,
      .invoice-paper {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }
    }

    /* Tablet keeps desktop-style sidebar */
    @media (min-width: 768px) and (max-width: 1023px) {
      .layout {
        display: flex !important;
        min-height: 100vh !important;
      }

      .sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        height: 100vh !important;
      }

      .nav {
        grid-template-columns: 1fr !important;
        overflow: visible !important;
      }

      .nav-link {
        justify-content: flex-start !important;
        min-width: 0 !important;
      }

      .nav-icon {
        display: grid !important;
      }

      .logout {
        display: inline-flex !important;
      }
    }

    /* Compact tablet and mobile density */
    @media (min-width: 768px) and (max-width: 1023px) {
      body {
        font-size: 13px;
      }

      .main {
        padding: 22px 18px !important;
      }

      .page-header {
        margin-bottom: 18px !important;
      }

      .page-title {
        font-size: 23px !important;
      }

      .page-lead {
        font-size: 12px !important;
        line-height: 1.55 !important;
      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid {
        gap: 12px !important;
      }

      .summary-card,
      .table-card,
      .form-card,
      .detail-card,
      .profile-card,
      .settings-card,
      .toolbar-card,
      .calendar-card,
      .week-card,
      .detail-panel,
      .auth-card {
        padding: 16px !important;
      }

      .summary-label,
      .card-note,
      .summary-note,
      .detail-label,
      th {
        font-size: 11px !important;
      }

      .summary-value {
        font-size: 20px !important;
      }

      th,
      td {
        padding: 11px 12px !important;
        font-size: 12px !important;
      }

      input,
      select,
      textarea,
      .button,
      .new-button,
      .primary-button,
      .secondary-button,
      .ghost-button,
      .danger-button,
      .filter-button,
      .clear-button,
      .detail-button,
      .preview-button {
        min-height: 38px !important;
        font-size: 12px !important;
      }

      .filter-bar,
      .toolbar,
      .card-header {
        padding: 14px 16px !important;
      }

      .nav-link {
        padding: 10px 12px !important;
        font-size: 12px !important;
      }
    }

    @media (max-width: 767px) {
      body {
        font-size: 12px;
      }

      .mobile-header {
        height: 50px !important;
        padding: 0 12px !important;
      }

      .mobile-logo {
        font-size: 15px !important;
      }

      .hamburger-button,
      .sidebar-close {
        width: 36px !important;
        height: 36px !important;
        font-size: 19px !important;
      }

      .sidebar {
        width: min(78vw, 260px) !important;
        padding: 18px 12px !important;
      }

      .logo {
        font-size: 18px !important;
        margin-bottom: 18px !important;
      }

      .nav-link {
        min-height: 39px !important;
        padding: 9px 11px !important;
        font-size: 12px !important;
        gap: 8px !important;
      }

      .nav-icon {
        width: 18px !important;
        height: 18px !important;
        font-size: 13px !important;
      }

      .sidebar-account {
        padding: 8px 10px !important;
        font-size: 12px !important;
      }

      .sidebar-avatar {
        width: 28px !important;
        height: 28px !important;
      }

      .main {
        padding: 16px 12px 24px !important;
      }

      .page-header {
        margin-bottom: 16px !important;
      }

      .page-title {
        font-size: 21px !important;
      }

      .page-lead {
        font-size: 12px !important;
        line-height: 1.5 !important;
      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid,
      .form-grid,
      .filters {
        gap: 10px !important;
      }

      .summary-card,
      .table-card,
      .form-card,
      .detail-card,
      .profile-card,
      .settings-card,
      .toolbar-card,
      .calendar-card,
      .week-card,
      .detail-panel,
      .auth-card {
        padding: 13px !important;
      }

      .summary-label,
      .summary-note,
      .card-note,
      .detail-label,
      .help-text,
      th {
        font-size: 10.5px !important;
      }

      .summary-value {
        font-size: 18px !important;
      }

      .card-title,
      .form-title,
      .section-title {
        font-size: 14px !important;
      }

      th,
      td {
        padding: 9px 10px !important;
        font-size: 11.5px !important;
      }

      input,
      select,
      textarea,
      .button,
      .new-button,

    /* Center mobile header logo */
    @media (max-width: 1023px) {
      .mobile-header {
        position: sticky;
        justify-content: center !important;
      }

      .hamburger-button {
        position: absolute;
        left: 12px;
      }

      .mobile-logo {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        white-space: nowrap;
      }
    }

    /* Polished hamburger menu */
    @media (max-width: 1023px) {
      .hamburger-button {
        display: inline-flex !important;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        border: 1px solid #dbeafe !important;
        background: linear-gradient(180deg, #ffffff 0%, #eff6ff 100%) !important;
        color: #0f2a4a !important;
        box-shadow: 0 8px 18px rgba(15, 42, 74, 0.14);
      }

      .hamburger-button span {
        display: block;
        width: 17px;
        height: 2px;
        border-radius: 999px;
        background: #0f2a4a;
        transition: transform 0.2s ease, opacity 0.2s ease, width 0.2s ease;
      }

      .hamburger-button span:nth-child(2) {
        width: 13px;
      }

      .hamburger-button:hover span:nth-child(2) {
        width: 17px;
      }

      body.sidebar-open .hamburger-button span:nth-child(1) {
        transform: translateY(6px) rotate(45deg);
      }

      body.sidebar-open .hamburger-button span:nth-child(2) {
        opacity: 0;
      }

      body.sidebar-open .hamburger-button span:nth-child(3) {
        transform: translateY(-6px) rotate(-45deg);
      }
    }

    /* Polished opened mobile menu */
    @media (max-width: 767px) {
      .sidebar {
        width: min(84vw, 292px) !important;
        padding: 20px 14px 18px !important;
        background: linear-gradient(180deg, #0f2a4a 0%, #123a64 55%, #0b1f38 100%) !important;
        border-radius: 0 18px 18px 0;
        box-shadow: 18px 0 42px rgba(15, 23, 42, 0.28);
      }

      .sidebar .logo {
        display: flex;
        align-items: center;
        min-height: 40px;
        margin: 0 46px 18px 2px !important;
        color: #ffffff;
        font-size: 18px !important;
        letter-spacing: 0.01em;
      }

      .sidebar-close {
        top: 18px !important;
        right: 14px !important;
        width: 34px !important;
        height: 34px !important;
        border: 1px solid rgba(255, 255, 255, 0.16) !important;

    <main class="main">

  <script type="module">
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { deleteDoc, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { auth, db } from "./firebase.js";

    const detailCard = document.getElementById("detailCard");
    const loading = document.getElementById("loading");
    const params = new URLSearchParams(window.location.search);
    const projectId = params.get("id");
    let currentUser = null;
    function getProjectDocRef() {
      return doc(db, "users", currentUser.uid, "projects", projectId);
    }

    // Firestoreのフィールド名が少し違っても表示できるようにします。
    function pickValue(project, keys, defaultValue = "-") {
      for (const key of keys) {
        if (project[key] !== undefined && project[key] !== null && project[key] !== "") {
          return project[key];
        }
      }

      return defaultValue;
    }

    function formatAmount(amount) {
      const numberAmount = Number(amount || 0);
      return "¥" + numberAmount.toLocaleString("ja-JP");
    }

    function getProjectItems(project) {
      if (Array.isArray(project.items) && project.items.length > 0) {
        return project.items.map((item) => {
          return {
            name: item.name || "品目名未設定",
            type: item.type || "main",
            price: Number(item.price || 0)
          };
        });
      }

      return [{
        name: pickValue(project, ["name", "title", "projectName"], "案件"),
        type: "main",
        price: Number(pickValue(project, ["amount", "price", "fee"], 0))
      }];
    }

    function getProjectTotal(project) {
      if (project.totalPrice !== undefined && project.totalPrice !== null) {
        return Number(project.totalPrice || 0);
      }

      return getProjectItems(project).reduce((sum, item) => {
        return sum + Number(item.price || 0);
      }, 0);
    }

    function formatDeadline(deadline) {
      if (!deadline) {
        return "-";
      }

      const date = typeof deadline.toDate === "function"
        ? deadline.toDate()
        : new Date(deadline);

      if (Number.isNaN(date.getTime())) {
        return String(deadline);
      }

      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}/${month}/${day}`;
    }

    function formatPaidAt(value) {
      if (!value) {
        return "-";
      }

      return formatDeadline(value);
    }

    function addOneMonth(dateText) {
      if (!dateText) {
        return "";
      }

      const [year, month, day] = String(dateText).split("-").map(Number);
      if (!year || !month || !day) {
        return "";
      }

      const date = new Date(year, month - 1, day);
      date.setMonth(date.getMonth() + 1);

      const nextYear = date.getFullYear();
      const nextMonth = String(date.getMonth() + 1).padStart(2, "0");
      const nextDay = String(date.getDate()).padStart(2, "0");
      return `${nextYear}-${nextMonth}-${nextDay}`;
    }

    function getEffectivePaidAt(project, deadline) {
      return pickValue(project, ["paidAt"], "") || addOneMonth(deadline);
    }

    function getTodayText() {
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, "0");
      const day = String(today.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function addDaysText(dateText, days) {
      const date = new Date(dateText);
      date.setDate(date.getDate() + days);

      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function getStatusClass(status) {
      if (status === "相談中") return "status-consulting";
      if (status === "進行中") return "status-progress";
      if (status === "納品済み") return "status-delivered";
      if (status === "入金待ち") return "status-waiting";
      if (status === "完了") return "status-done";
      return "status-default";
    }

    function createDetailRow(label, value, className = "") {
      const row = document.createElement("div");
      const labelElement = document.createElement("dt");
      const valueElement = document.createElement("dd");

      row.className = "detail-row";
      labelElement.className = "detail-label";
      valueElement.className = "detail-value " + className;

      labelElement.textContent = label;
      valueElement.textContent = value;

      row.appendChild(labelElement);
      row.appendChild(valueElement);

      return row;
    }

    function createStatusRow(status) {
      const row = document.createElement("div");
      const labelElement = document.createElement("dt");
      const valueElement = document.createElement("dd");
      const badge = document.createElement("span");

      row.className = "detail-row";
      labelElement.className = "detail-label";
      valueElement.className = "detail-value";
      badge.className = "status " + getStatusClass(status);
      badge.textContent = status;

      labelElement.textContent = "ステータス";
      valueElement.appendChild(badge);
      row.appendChild(labelElement);
      row.appendChild(valueElement);

      return row;
    }

    function createTagsRow(tags) {
      const row = document.createElement("div");
      const labelElement = document.createElement("dt");
      const valueElement = document.createElement("dd");
      const tagList = document.createElement("div");

      row.className = "detail-row";
      labelElement.className = "detail-label";
      valueElement.className = "detail-value";
      tagList.className = "tag-list";
      labelElement.textContent = "タグ";

      if (!Array.isArray(tags) || tags.length === 0) {
        valueElement.textContent = "タグなし";
      } else {
        tags.forEach((tagName) => {
          const badge = document.createElement("span");
          badge.className = "tag-badge";
          badge.textContent = tagName;
          tagList.appendChild(badge);
        });
        valueElement.appendChild(tagList);
      }

      row.appendChild(labelElement);
      row.appendChild(valueElement);
      return row;
    }

    function createItemsRow(items) {
      const row = document.createElement("div");
      const labelElement = document.createElement("dt");
      const valueElement = document.createElement("dd");
      const itemList = document.createElement("div");

      row.className = "detail-row";
      labelElement.className = "detail-label";
      valueElement.className = "detail-value";
      itemList.className = "item-list";

      labelElement.textContent = "内訳";

      items.forEach((item) => {
        const itemLine = document.createElement("div");
        const itemName = document.createElement("span");
        const itemType = document.createElement("span");
        const itemPrice = document.createElement("span");

        itemLine.className = "item-line";
        itemName.className = "item-name";
        itemType.className = "item-type";
        itemPrice.className = "item-price";

        itemName.textContent = item.name || "品目名未設定";
        itemType.textContent = item.type === "option" ? "オプション" : "メイン";
        itemPrice.textContent = formatAmount(item.price);

        itemLine.appendChild(itemName);
        itemLine.appendChild(itemType);
        itemLine.appendChild(itemPrice);
        itemList.appendChild(itemLine);
      });

      valueElement.appendChild(itemList);
      row.appendChild(labelElement);
      row.appendChild(valueElement);

      return row;
    }

    function showMessage(message) {
      detailCard.innerHTML = "";

      const messageElement = document.createElement("p");
      messageElement.className = "message";
      messageElement.textContent = message;
      detailCard.appendChild(messageElement);
    }

    function renderProject(project) {
      const displayId = pickValue(project, ["displayId"], "未設定");
      const name = pickValue(project, ["name", "title", "projectName"]);
      const client = pickValue(project, ["client", "clientName"]);
      const items = getProjectItems(project);
      const totalPrice = getProjectTotal(project);
      const status = pickValue(project, ["status"]);
      const deadline = pickValue(project, ["deadline", "dueDate", "endDate"], "");
      const paidAt = getEffectivePaidAt(project, deadline);
      const invoiceIssuedAt = pickValue(project, ["invoiceIssuedAt"], "");
      const invoiceId = pickValue(project, ["invoiceId"], "");
      const paymentDueDate = pickValue(project, ["paymentDueDate"], "");
      const tags = Array.isArray(project.tags) ? project.tags : [];
      const memo = pickValue(project, ["memo", "note", "description"], "メモはありません");

      detailCard.innerHTML = "";

      const header = document.createElement("div");
      const title = document.createElement("h2");
      const statusBadge = document.createElement("span");
      const detailList = document.createElement("dl");
      const actions = document.createElement("div");
      const invoiceButton = document.createElement("a");
      const editButton = document.createElement("a");
      const deleteButton = document.createElement("button");

      header.className = "detail-header";
      title.className = "page-title";
      title.textContent = name;
      statusBadge.className = "status " + getStatusClass(status);
      statusBadge.textContent = status;

      detailList.className = "detail-list";
      detailList.appendChild(createDetailRow("案件ID", displayId));
      detailList.appendChild(createDetailRow("クライアント", client));
      detailList.appendChild(createDetailRow("金額", formatAmount(totalPrice), "amount"));
      detailList.appendChild(createItemsRow(items));
      detailList.appendChild(createStatusRow(status));
      detailList.appendChild(createDetailRow("締切日", formatDeadline(deadline)));
      detailList.appendChild(createDetailRow("入金状況", status === "完了" ? "入金済み" : "未入金"));
      detailList.appendChild(createDetailRow(status === "完了" ? "入金日" : "入金予定日", formatPaidAt(paidAt)));
      detailList.appendChild(createDetailRow("請求書番号", invoiceId || "未発行"));
      detailList.appendChild(createDetailRow("請求書発行日", formatDeadline(invoiceIssuedAt)));
      detailList.appendChild(createDetailRow("支払期限", formatDeadline(paymentDueDate)));
      detailList.appendChild(createTagsRow(tags));
      detailList.appendChild(createDetailRow("メモ", memo));

      actions.className = "actions";

      if (invoiceIssuedAt) {
        invoiceButton.className = "button secondary-button";
        invoiceButton.href = "./invoice.html?id=" + encodeURIComponent(projectId);
        invoiceButton.textContent = "請求書を見る";
      } else {
        invoiceButton.className = "button primary-button";
        invoiceButton.href = "#";
        invoiceButton.textContent = "請求書を発行";
        invoiceButton.addEventListener("click", async (event) => {
          event.preventDefault();
          await issueInvoice(displayId);
        });
      }

      editButton.className = "button primary-button";
      editButton.href = "./edit-project.html?id=" + encodeURIComponent(projectId);
      editButton.textContent = "編集する";

      if (status !== "完了") {
        const paidButton = document.createElement("button");
        paidButton.className = "button success-button";
        paidButton.type = "button";
        paidButton.textContent = "入金済みにする";
        paidButton.addEventListener("click", async () => {
          await markAsPaid();
        });
        actions.appendChild(paidButton);
      }

      deleteButton.className = "button danger-button";
      deleteButton.type = "button";
      deleteButton.textContent = "削除する";
      deleteButton.addEventListener("click", () => {
        deleteProject(name);
      });

      header.appendChild(title);
      header.appendChild(statusBadge);
      actions.appendChild(invoiceButton);
      actions.appendChild(editButton);
      actions.appendChild(deleteButton);

      detailCard.appendChild(header);
      detailCard.appendChild(detailList);
      detailCard.appendChild(actions);
    }

    async function issueInvoice(displayId) {
      const issuedAt = getTodayText();
      const safeDisplayId = displayId && displayId !== "未設定" ? displayId : projectId;
      const invoiceId = `INV-${safeDisplayId}`;
      const paymentDueDate = addDaysText(issuedAt, 30);

      try {
        loading.style.display = "block";
        await updateDoc(getProjectDocRef(), {
          invoiceId,
          invoiceIssuedAt: issuedAt,
          paymentDueDate
        });
        window.location.href = "./invoice.html?id=" + encodeURIComponent(projectId);
      } catch (error) {
        console.error("請求書の発行に失敗しました:", error);
        alert("請求書の発行に失敗しました");
      } finally {
        loading.style.display = "none";
      }
    }

    async function markAsPaid() {
      const shouldUpdate = await window.FreelaBoard.showConfirmDialog({
        title: "入金済みに変更",
        message: "この案件のステータスを完了にし、入金日を今日の日付で保存します。",
        confirmText: "入金済みにする"
      });

      if (!shouldUpdate) {
        return;
      }

      try {
        loading.style.display = "block";
        await updateDoc(getProjectDocRef(), {
          paidAt: getTodayText(),
          status: "完了"
        });
        await loadProject();
      } catch (error) {
        console.error("入金状態の更新に失敗しました:", error);
        alert("入金状態の更新に失敗しました");
      } finally {
        loading.style.display = "none";
      }
    }

    async function deleteProject(projectName) {
      const shouldDelete = await window.FreelaBoard.showConfirmDialog({
        title: "案件を削除",
        message: `${projectName} を削除します。この操作は元に戻せません。`,
        confirmText: "削除する",
        tone: "danger"
      });

      if (!shouldDelete) {
        return;
      }

      try {
        await deleteDoc(getProjectDocRef());
        window.location.href = "./projects.html";
      } catch (error) {
        console.error("案件の削除に失敗しました:", error);
        alert("案件の削除に失敗しました");
      }
    }

    async function loadProject() {
      if (!projectId) {
        showMessage("案件IDが指定されていません");
        return;
      }

      try {
        loading.style.display = "block";
        const projectSnapshot = await getDoc(getProjectDocRef());

        if (!projectSnapshot.exists()) {
          showMessage("案件が見つかりません");
          return;
        }

        renderProject(projectSnapshot.data());
      } catch (error) {
        console.error("案件の取得に失敗しました:", error);
        showMessage("案件の取得に失敗しました");
      } finally {
        loading.style.display = "none";
      }
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "./login.html";
        return;
      }

      currentUser = user;
      loadProject();
    });
  </script>
  <script type="module" src="./assets/auth-common.js"></script>
  <script src="./assets/common.js"></script>
</body>
</html>
