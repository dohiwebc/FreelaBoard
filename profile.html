<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロフィール | FreelaBoard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    body {
      margin: 0;
      font-family: "Inter", "Noto Sans JP", Arial, sans-serif;
      background: #f4f6f8;
      color: #111827;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app {
      min-height: 100vh;
      background: #f4f6f8;
    }

    .sidebar {
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      width: 220px;
      padding: 24px 16px;
      background: #0f2a4a;
      color: #ffffff;
    }

    .logo {
      margin: 0 0 28px;
      font-size: 20px;
      font-weight: 700;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav-link,
    .logout-button {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #dbeafe;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
    }

    .nav-link:hover,
    .nav-link.active {
      background: #163b68;
      color: #ffffff;
    }

    .nav-icon {
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      font-size: 15px;
    }

    .nav-icon-image {
      width: 16px;
      height: 16px;
      object-fit: contain;
    }

    .logout-button {
      color: #dbeafe;
    }

    .logout-button:hover {
      background: #163b68;
      color: #ffffff;
    }

    .sidebar-account {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: auto;
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
    }

    .sidebar-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .main {
      margin-left: 220px;
      padding: 40px;
    }

    .content {
      max-width: 760px;
      margin: 0 auto;
    }

    .page-header {
      margin-bottom: 24px;
    }

    .page-title {
      margin: 0;
      font-size: 30px;
      letter-spacing: 0;
    }

    .page-lead {
      margin: 8px 0 0;
      color: #6b7280;
      font-size: 14px;
    }

    .card {
      padding: 26px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 12px 30px rgba(17, 24, 39, 0.06);
    }

    .card + .card {
      margin-top: 20px;
    }

    .card-title {
      margin: 0 0 24px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: 170px 1fr;
      gap: 32px;
      align-items: start;
    }

    .avatar-area {
      display: grid;
      justify-items: center;
      gap: 14px;
    }

    .avatar {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      object-fit: cover;
    }

    .profile-form {
      display: grid;
      gap: 18px;
    }

    .info-row {
      display: grid;
      grid-template-columns: 140px 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .info-label {
      color: #374151;
      font-size: 14px;
      font-weight: 700;
    }

    .info-value {
      min-width: 0;
      color: #111827;
      font-size: 15px;
      overflow-wrap: anywhere;
    }

    input {
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      color: #111827;
      font: inherit;
      font-size: 14px;
    }

    input:focus {
      border-color: #4f46e5;
      outline: none;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.14);
    }

    .icon-button {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #4f46e5;
      font-size: 16px;
      cursor: pointer;
    }

    .icon-button:hover {
      background: #eef2ff;
    }

    .save-row {
      display: none;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 2px;
    }

    .save-row.show {
      display: flex;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 16px;
      border: none;
      border-radius: 8px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary-button {
      background: #6257e8;
      color: #ffffff;
    }

    .secondary-button {
      background: #f3f4f6;
      color: #374151;
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .message {
      display: none;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.show {
      display: block;
    }

    .message.error {
      background: #fee2e2;
      color: #b91c1c;
    }

    .message.success {
      background: #dcfce7;
      color: #166534;
    }

    .accordion-card {
      padding: 0;
      overflow: hidden;
    }

    .accordion-button {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 18px 22px;
      border: none;
      background: #ffffff;
      color: #111827;
      font: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .accordion-button:hover {
      background: #f9fafb;
    }

    .accordion-icon {
      color: #6b7280;
      font-size: 16px;
    }

    .accordion-body {
      display: none;
      padding: 0 22px 22px;
      border-top: 1px solid #e5e7eb;
    }

    .accordion-card.open .accordion-body {
      display: block;
    }

    .accordion-card.open .accordion-icon {
      transform: rotate(180deg);
    }

    .password-form {
      display: grid;
      gap: 12px;
      padding-top: 18px;
    }

    .password-grid {
      display: grid;
      gap: 10px;
    }

    .field-label {
      color: #374151;
      font-size: 13px;
      font-weight: 700;
    }

    .notice-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .notice-title {
      margin: 0 0 6px;
      font-size: 15px;
      font-weight: 700;
    }

    .notice-text {
      margin: 0;
      color: #6b7280;
      font-size: 13px;
    }

    .toggle {
      position: relative;
      width: 46px;
      height: 26px;
      border: none;
      border-radius: 999px;
      background: #6257e8;
      cursor: pointer;
    }

    .toggle::after {
      position: absolute;
      top: 3px;
      right: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ffffff;
      content: "";
    }

    .footer {
      margin-top: 28px;
      color: #9ca3af;
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 820px) {
      .sidebar {
        position: static;
        width: 100%;
        height: auto;
        padding: 14px 16px;
      }

      .nav {
        grid-template-columns: repeat(10, minmax(0, 1fr));
      }

      .nav-link {
        justify-content: center;
        padding: 10px;
      }

      .nav-icon,
      .logout-button {
        display: none;
      }

      .main {
        margin-left: 0;
        padding: 24px 16px;
      }

      .profile-grid,
      .info-row {
        grid-template-columns: 1fr;
      }

      .icon-button {
        width: 100%;
        background: #eef2ff;
      }

      .save-row {
        flex-direction: column;
      }
    }

    /* Responsive layout */
    .mobile-header,
    .sidebar-overlay,
    .sidebar-close {
      display: none;
    }

    @media (min-width: 768px) and (max-width: 1023px) {
      .sidebar {
        width: 190px !important;
        padding: 22px 12px !important;
      }

      .main {
        margin-left: 190px !important;
        padding: 28px 22px !important;
      }

      .content {
        max-width: 100% !important;
      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }

      .form-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }

      .table-wrap,
      .invoice-scroll,
      .calendar-scroll {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }

      table {
        min-width: 820px;
      }
    }

    @media (max-width: 767px) {
      body {
        min-width: 0;
      }

      .mobile-header {
        position: sticky;
        top: 0;
        z-index: 80;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 58px;
        padding: 0 16px;
        border-bottom: 1px solid #e5e7eb;
        background: #ffffff;
        box-shadow: 0 8px 18px rgba(17, 24, 39, 0.08);
      }

      .mobile-logo {
        color: #0f2a4a;
        font-size: 17px;
        font-weight: 700;
      }

      .hamburger-button,
      .sidebar-close {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 42px;
        height: 42px;
        border: 0;
        border-radius: 8px;
        background: #eff6ff;
        color: #0f2a4a;
        cursor: pointer;
        font-size: 22px;
        font-weight: 700;
      }

      .sidebar-close {
        position: absolute;
        top: 14px;
        right: 14px;
        background: rgba(255, 255, 255, 0.12);
        color: #ffffff;
      }

      .sidebar-overlay {
        position: fixed;
        inset: 0;
        z-index: 90;
        display: block;
        visibility: hidden;
        background: rgba(15, 23, 42, 0.46);
        opacity: 0;
        transition: opacity 0.2s ease, visibility 0.2s ease;
      }

      body.sidebar-open .sidebar-overlay {
        visibility: visible;
        opacity: 1;
      }

      .layout {
        display: block !important;
        min-height: auto !important;
      }

      .sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        z-index: 100 !important;
        display: flex !important;
        flex-direction: column !important;
        width: min(82vw, 300px) !important;
        height: 100vh !important;
        padding: 24px 16px !important;
        transform: translateX(-105%);
        transition: transform 0.24s ease;
        overflow-y: auto;
      }

      body.sidebar-open .sidebar {
        transform: translateX(0);
      }

      .sidebar .logo {
        margin-right: 44px;
      }

      .nav {
        display: grid !important;
        grid-template-columns: 1fr !important;
        gap: 8px !important;
        overflow: visible !important;
      }

      .nav-link {
        justify-content: flex-start !important;
        min-width: 0 !important;
        min-height: 44px;
        padding: 12px 14px !important;
      }

      .nav-icon {
        display: grid !important;
      }

      .sidebar-account {
        margin-top: auto !important;
      }

      .logout {
        display: inline-flex !important;
        min-height: 44px;
        align-items: center;
      }

      .main {
        width: 100% !important;
        margin-left: 0 !important;
        padding: 22px 16px 32px !important;
      }

      .content {
        max-width: 100% !important;
      }

      .page-header,
      .calendar-controls,
      .toolbar,
      .filter-bar,
      .actions,
      .detail-actions,
      .invoice-actions {
        align-items: stretch !important;
        flex-direction: column !important;
        gap: 12px !important;
      }

      .page-title {
        font-size: 24px !important;
      }

      .page-lead {
        font-size: 14px !important;
      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid,
      .form-grid,
      .filters,
      .toolbar,
      .workspace,
      .invoice-grid,
      .invoice-header,
      .invoice-footer {
        grid-template-columns: 1fr !important;
      }

      .summary-card,
      .table-card,
      .form-card,
      .detail-card,
      .profile-card,
      .settings-card,
      .toolbar-card,
      .calendar-card,
      .week-card,
      .detail-panel,
      .auth-card {
        border-radius: 8px !important;
      }

      input,
      select,
      textarea,
      .button,
      .new-button,
      .primary-button,
      .secondary-button,
      .ghost-button,
      .danger-button,
      .filter-button,
      .clear-button,
      .detail-button,
      .preview-button {
        width: 100%;
        min-height: 44px;
      }

      .table-wrap,
      .invoice-scroll,
      .calendar-scroll {
        width: 100%;
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }

      table {
        min-width: 760px;
      }

      th,
      td {
        white-space: nowrap;
      }

      .item-row,
      .items-row {
        grid-template-columns: 1fr !important;
      }

      .drag-handle {
        width: 100% !important;
        min-height: 34px;
      }

      .calendar-grid {
        min-width: 680px !important;
      }

      .day-cell {
        min-height: 104px !important;
        padding: 8px !important;
      }

      .event-title {
        max-width: 100%;
      }

      .week-row {
        min-width: 720px;
      }

      .invoice-card,
      .invoice-paper {
        min-width: 720px;
      }

      @media print {
        .mobile-header,
        .sidebar-overlay,
        .sidebar-close {
          display: none !important;
        }
      }
    }

    /* Responsive print and scroll safeguards */
    @media print {
      .mobile-header,
      .sidebar-overlay,
      .sidebar-close {
        display: none !important;
      }
    }

    @media (max-width: 767px) {
      .week-card,
      .invoice-card,
      .invoice-paper {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }
    }

    /* Tablet keeps desktop-style sidebar */
    @media (min-width: 768px) and (max-width: 1023px) {
      .layout {
        display: flex !important;
        min-height: 100vh !important;
      }

      .sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        height: 100vh !important;
      }

      .nav {
        grid-template-columns: 1fr !important;
        overflow: visible !important;
      }

      .nav-link {
        justify-content: flex-start !important;
        min-width: 0 !important;
      }

      .nav-icon {
        display: grid !important;
      }

      .logout {
        display: inline-flex !important;
      }
    }

    /* Compact tablet and mobile density */
    @media (min-width: 768px) and (max-width: 1023px) {
      body {
        font-size: 13px;
      }

      .main {
        padding: 22px 18px !important;
      }

      .page-header {
        margin-bottom: 18px !important;
      }

      .page-title {
        font-size: 23px !important;
      }

      .page-lead {
        font-size: 12px !important;
        line-height: 1.55 !important;
      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid {
        gap: 12px !important;
      }

      .summary-card,
      .table-card,
      .form-card,
      .detail-card,
      .profile-card,
      .settings-card,
      .toolbar-card,
      .calendar-card,
      .week-card,
      .detail-panel,
      .auth-card {
        padding: 16px !important;
      }

      .summary-label,
      .card-note,
      .summary-note,
      .detail-label,
      th {
        font-size: 11px !important;
      }

      .summary-value {
        font-size: 20px !important;
      }

      th,
      td {
        padding: 11px 12px !important;
        font-size: 12px !important;
      }

      input,
      select,
      textarea,
      .button,
      .new-button,
      .primary-button,
      .secondary-button,
      .ghost-button,
      .danger-button,
      .filter-button,
      .clear-button,
      .detail-button,
      .preview-button {
        min-height: 38px !important;
        font-size: 12px !important;
      }

      .filter-bar,
      .toolbar,
      .card-header {
        padding: 14px 16px !important;
      }

      .nav-link {
        padding: 10px 12px !important;
        font-size: 12px !important;
      }
    }

    @media (max-width: 767px) {
      body {
        font-size: 12px;
      }

      .mobile-header {
        height: 50px !important;
        padding: 0 12px !important;
      }

      .mobile-logo {
        font-size: 15px !important;
      }

      .hamburger-button,
      .sidebar-close {
        width: 36px !important;
        height: 36px !important;
        font-size: 19px !important;
      }

      .sidebar {
        width: min(78vw, 260px) !important;
        padding: 18px 12px !important;
      }

      .logo {
        font-size: 18px !important;
        margin-bottom: 18px !important;
      }

      .nav-link {
        min-height: 39px !important;
        padding: 9px 11px !important;
        font-size: 12px !important;
        gap: 8px !important;
      }

      .nav-icon {
        width: 18px !important;
        height: 18px !important;
        font-size: 13px !important;
      }

      .sidebar-account {
        padding: 8px 10px !important;
        font-size: 12px !important;
      }

      .sidebar-avatar {
        width: 28px !important;
        height: 28px !important;
      }

      .main {
        padding: 16px 12px 24px !important;
      }

      .page-header {
        margin-bottom: 16px !important;
      }

      .page-title {
        font-size: 21px !important;
      }

      .page-lead {
        font-size: 12px !important;
        line-height: 1.5 !important;
      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid,
      .form-grid,
      .filters {
        gap: 10px !important;
      }

      .summary-card,
      .table-card,
      .form-card,
      .detail-card,
      .profile-card,
      .settings-card,
      .toolbar-card,
      .calendar-card,
      .week-card,
      .detail-panel,
      .auth-card {
        padding: 13px !important;
      }

      .summary-label,
      .summary-note,
      .card-note,
      .detail-label,
      .help-text,
      th {
        font-size: 10.5px !important;
      }

      .summary-value {
        font-size: 18px !important;
      }

      .card-title,
      .form-title,
      .section-title {
        font-size: 14px !important;
      }

      th,
      td {
        padding: 9px 10px !important;
        font-size: 11.5px !important;
      }

      input,
      select,
      textarea,
      .button,
      .new-button,
      .primary-button,
      .secondary-button,
      .ghost-button,
      .danger-button,
      .filter-button,
      .clear-button,
      .detail-button,
      .preview-button {
        min-height: 38px !important;
        padding: 8px 10px !important;
        font-size: 12px !important;
      }

      .filter-bar,
      .toolbar,
      .card-header,
      .calendar-controls {
        padding: 12px !important;
        gap: 9px !important;
      }

      .status,
      .status-badge,
      .tag-badge {
        padding: 4px 8px !important;
        font-size: 10.5px !important;
      }

      .day-cell {
        min-height: 86px !important;
        padding: 6px !important;
      }

      .event-card {
        padding: 6px !important;
      }

      .event-title,
      .event-id,
      .event-days {
        font-size: 10px !important;
      }

      .auth-card {
        width: min(420px, 100%) !important;
      }
    }

    /* Center mobile header logo */
    @media (max-width: 1023px) {
      .mobile-header {
        position: sticky;
        justify-content: center !important;
      }

      .hamburger-button {
        position: absolute;
        left: 12px;
      }

      .mobile-logo {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        white-space: nowrap;
      }
    }

    /* Polished hamburger menu */
    @media (max-width: 1023px) {
      .hamburger-button {
        display: inline-flex !important;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        border: 1px solid #dbeafe !important;
        background: linear-gradient(180deg, #ffffff 0%, #eff6ff 100%) !important;
        color: #0f2a4a !important;
        box-shadow: 0 8px 18px rgba(15, 42, 74, 0.14);
      }

      .hamburger-button span {
        display: block;
        width: 17px;
        height: 2px;
        border-radius: 999px;
        background: #0f2a4a;
        transition: transform 0.2s ease, opacity 0.2s ease, width 0.2s ease;
      }

      .hamburger-button span:nth-child(2) {
        width: 13px;
      }

      .hamburger-button:hover span:nth-child(2) {
        width: 17px;
      }

      body.sidebar-open .hamburger-button span:nth-child(1) {
        transform: translateY(6px) rotate(45deg);
      }

      body.sidebar-open .hamburger-button span:nth-child(2) {
        opacity: 0;
      }

      body.sidebar-open .hamburger-button span:nth-child(3) {
        transform: translateY(-6px) rotate(-45deg);
      }
    }

    /* Polished opened mobile menu */
    @media (max-width: 767px) {
      .sidebar {
        width: min(84vw, 292px) !important;
        padding: 20px 14px 18px !important;
        background: linear-gradient(180deg, #0f2a4a 0%, #123a64 55%, #0b1f38 100%) !important;
        border-radius: 0 18px 18px 0;
        box-shadow: 18px 0 42px rgba(15, 23, 42, 0.28);
      }

      .sidebar .logo {

        min-height: 40px;
        margin: 0 46px 18px 2px !important;

      }

      .sidebar-close {
        top: 18px !important;
        right: 14px !important;

        height: 34px !important;
        border: 1px solid rgba(255, 255, 255, 0.16) !important;
        border-radius: 999px !important;
        background: rgba(255, 255, 255, 0.10) !important;

        line-height: 1;
      }

      .sidebar .nav {

        padding: 8px 0 14px;
      }

      .sidebar .nav-link {
        min-height: 42px !important;
        padding: 10px 12px !important;

      .sidebar .nav-link:hover,

      }

      }

    /* Cleaner selected state in mobile menu */
    @media (max-width: 767px) {
      .sidebar .nav-link {
        position: relative;

        box-shadow: none !important;

    /* Plain mobile menu icons */
    @media (max-width: 767px) {
      .sidebar .nav-icon,
      .sidebar .nav-link.active .nav-icon {
        background: transparent !important;
        border-radius: 0 !important;

    /* Motion effects */
    @keyframes fbFadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fbPopIn {
      0% {
        opacity: 0;
        transform: scale(0.88);
      }
      70% {
        transform: scale(1.06);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fbPulseSoft {
      0%, 100% {
        transform: scale(1);
        box-shadow: none;
      }
      50% {
        transform: scale(1.03);
        box-shadow: 0 8px 18px rgba(245, 158, 11, 0.18);
      }
    }

    .summary-card,
    .chart-card,
    .recent-card,
    .table-card,
    .form-card,
    .detail-card,
    .profile-card,
    .settings-card,
    .toolbar-card,
    .calendar-card,
    .week-card,
    .detail-panel,
    .auth-card {
      animation: fbFadeUp 0.85s ease both;
    }

    .summary-card:nth-child(2),
    .chart-card:nth-child(2),
    .form-card + .table-card {
      animation-delay: 0.06s;
    }

    .summary-card:nth-child(3) {
      animation-delay: 0.12s;
    }

    .summary-card:nth-child(4) {
      animation-delay: 0.18s;
    }

    .summary-card:nth-child(5) {
      animation-delay: 0.24s;
    }

    .summary-card:nth-child(6) {
      animation-delay: 0.30s;
    }

    .summary-card:nth-child(7) {
      animation-delay: 0.36s;
    }

    tbody tr,
    .alert-item,
    .week-row,
    .event-card {
      animation: fbFadeUp 0.65s ease both;
    }

    tbody tr:hover,
    .alert-item:hover,
    .event-card:hover,
    .summary-card:hover,
    .chart-card:hover,
    .recent-card:hover {
      transform: translateY(-2px);
      transition: transform 0.32s ease, box-shadow 0.32s ease, background 0.32s ease;
    }

    .status,
    .status-badge,
    .tag-badge {
      transition: transform 0.32s ease, box-shadow 0.32s ease, filter 0.32s ease;

    .status:hover,
    .status-badge:hover,
    .tag-badge:hover {
      transform: translateY(-1px) scale(1.02);
      filter: saturate(1.08);
    }

    .status-waiting,
    .status-overdue,
    .event-card.status-overdue,
    .event-card.status-payment {
      animation: fbPulseSoft 4.2s ease-in-out infinite;
    }

    @media (max-width: 767px) {
      body.sidebar-open .sidebar .nav-link {
        animation: fbFadeUp 0.55s ease both;
      }

      body.sidebar-open .sidebar .nav-link:nth-child(1) { animation-delay: 0.03s; }
      body.sidebar-open .sidebar .nav-link:nth-child(2) { animation-delay: 0.06s; }
      body.sidebar-open .sidebar .nav-link:nth-child(3) { animation-delay: 0.09s; }
      body.sidebar-open .sidebar .nav-link:nth-child(4) { animation-delay: 0.12s; }
      body.sidebar-open .sidebar .nav-link:nth-child(5) { animation-delay: 0.15s; }
      body.sidebar-open .sidebar .nav-link:nth-child(6) { animation-delay: 0.18s; }
      body.sidebar-open .sidebar .nav-link:nth-child(7) { animation-delay: 0.21s; }
      body.sidebar-open .sidebar .nav-link:nth-child(8) { animation-delay: 0.24s; }
      body.sidebar-open .sidebar .nav-link:nth-child(9) { animation-delay: 0.27s; }
      body.sidebar-open .sidebar .nav-link:nth-child(10) { animation-delay: 0.30s; }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }

  <div class="app">

      <h1 class="logo">FreelaBoard</h1>

      <nav class="nav" aria-label="メインメニュー">

        <a class="nav-link" href="./settings.html">

    <main class="main">

        <section class="card">

            <form class="profile-form" id="profileForm">
              <div class="info-row" id="userIdViewRow">
                <div class="info-label">ユーザーID</div>
                <div class="info-value" id="userIdText">-</div>

              <div class="info-row" id="userIdEditRow" hidden>

                <input id="newPassword" type="password" placeholder="新しいパスワードを入力" disabled>
              </div>

                <label class="field-label" for="confirmPassword">新しいパスワード（確認用）</label>
                <input id="confirmPassword" type="password" placeholder="新しいパスワードを再入力" disabled>

  <script type="module">
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { doc, getDoc, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { auth, db } from "./firebase.js";

    const topUserId = document.getElementById("topUserId");
    const profileForm = document.getElementById("profileForm");
    const userIdViewRow = document.getElementById("userIdViewRow");
    const userIdEditRow = document.getElementById("userIdEditRow");
    const userIdText = document.getElementById("userIdText");
    const userIdInput = document.getElementById("userId");
    const emailText = document.getElementById("emailText");
    const createdAtText = document.getElementById("createdAtText");
    const editUserIdButton = document.getElementById("editUserIdButton");
    const cancelEditButton = document.getElementById("cancelEditButton");
    const saveRow = document.getElementById("saveRow");
    const message = document.getElementById("message");
    const saveButton = document.getElementById("saveButton");
    const logoutButton = document.getElementById("logoutButton");
    const passwordAccordion = document.getElementById("passwordAccordion");
    const passwordAccordionButton = document.getElementById("passwordAccordionButton");
    let currentUser = null;
    let currentUserId = "";

    function showMessage(text, type) {
      message.textContent = text;
      message.className = "message show " + type;
    }

    function hideMessage() {
      message.textContent = "";
      message.className = "message";
    }

    function isValidUserId(userId) {
      return /^[A-Za-z0-9_]{3,20}$/.test(userId);
    }

    function formatDate(value) {
      if (!value) {
        return "-";
      }

      const date = typeof value.toDate === "function" ? value.toDate() : new Date(value);

      if (Number.isNaN(date.getTime())) {
        return "-";
      }

      return date.toLocaleDateString("ja-JP");
    }

    function setUserId(userId) {
      currentUserId = userId || "";
      userIdText.textContent = currentUserId || "-";
      topUserId.textContent = currentUserId || "user";
      userIdInput.value = currentUserId;
    }

    function showEditMode() {
      hideMessage();
      userIdViewRow.hidden = true;
      userIdEditRow.hidden = false;
      saveRow.classList.add("show");
      userIdInput.focus();
    }

    function hideEditMode() {
      userIdViewRow.hidden = false;
      userIdEditRow.hidden = true;
      saveRow.classList.remove("show");
      userIdInput.value = currentUserId;
    }

    async function loadProfile(user) {
      currentUser = user;
      emailText.textContent = user.email || "-";

      try {
        const profileRef = doc(db, "users", user.uid);
        const profileSnapshot = await getDoc(profileRef);

        if (profileSnapshot.exists()) {
          const profile = profileSnapshot.data();
          setUserId(profile.userId || "");
          createdAtText.textContent = formatDate(profile.createdAt);
        } else {
          setUserId("");
          createdAtText.textContent = "-";
          showMessage("プロフィール情報がまだありません。ユーザーIDを編集して保存してください。", "error");
        }
      } catch (error) {
        console.error("プロフィールの取得に失敗しました:", error);
        showMessage("プロフィールの取得に失敗しました。", "error");
      }
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "./login.html";
        return;
      }

      loadProfile(user);
    });

    editUserIdButton.addEventListener("click", showEditMode);

    cancelEditButton.addEventListener("click", () => {
      hideMessage();
      hideEditMode();
    });

    profileForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      hideMessage();

      if (!currentUser) {
        window.location.href = "./login.html";
        return;
      }

      const userId = userIdInput.value.trim();

      if (!isValidUserId(userId)) {
        showMessage("ユーザーIDは半角英数字とアンダースコアのみ、3文字以上20文字以内で入力してください。", "error");
        return;
      }

      saveButton.disabled = true;
      saveButton.textContent = "保存中...";

      try {
        await setDoc(doc(db, "users", currentUser.uid), {
          userId,
          email: currentUser.email || "",
          updatedAt: serverTimestamp()
        }, { merge: true });

        setUserId(userId);
        hideEditMode();
        showMessage("プロフィールを保存しました。", "success");
      } catch (error) {
        console.error("プロフィールの保存に失敗しました:", error);
        showMessage("プロフィールの保存に失敗しました。", "error");
      } finally {
        saveButton.disabled = false;
        saveButton.textContent = "保存する";
      }
    });

    logoutButton.addEventListener("click", async () => {
      try {
        await signOut(auth);
        window.location.href = "./login.html";
      } catch (error) {
        console.error("ログアウトに失敗しました:", error);
        showMessage("ログアウトに失敗しました。", "error");
      }
    });

    passwordAccordionButton.addEventListener("click", () => {
      const isOpen = passwordAccordion.classList.toggle("open");
      passwordAccordionButton.setAttribute("aria-expanded", String(isOpen));
    });
  </script>
  <script src="./assets/common.js"></script>
</body>
