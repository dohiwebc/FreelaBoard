<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カレンダー | FreelaBoard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Noto Sans JP", Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      width: 220px;
      height: 100vh;
      padding: 24px 16px;
      background: #0f2a4a;
      color: #ffffff;
    }

    .logo {
      margin: 0 0 28px;
      font-size: 20px;
      font-weight: 700;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 8px;
      color: #dbeafe;
      font-size: 14px;
      font-weight: 700;
    }

    .nav-link:hover,
    .nav-link.active {
      background: #163b68;
      color: #ffffff;
    }

    .nav-icon {
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      font-size: 15px;
    }

    .nav-icon-image {
      width: 16px;
      height: 16px;
      object-fit: contain;
    }

    .sidebar-account {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: auto;
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
    }

    .sidebar-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .logout {
      color: #dbeafe;
      font-size: 14px;
      font-weight: 700;
    }

    .main {
      width: 100%;
      margin-left: 220px;
      padding: 40px;
    }

    .content {
      max-width: 1240px;
      margin: 0 auto;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .page-title {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .page-lead {
      margin: 8px 0 0;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.7;
    }

    .view-switch {
      display: inline-flex;
      padding: 4px;
      border: 1px solid #dbe3ef;
      border-radius: 10px;
      background: #ffffff;
    }

    .switch-button,
    .nav-button,
    .clear-button,
    .detail-button {
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
    }

    .switch-button {
      padding: 9px 14px;
      background: transparent;
      color: #64748b;
      font-size: 13px;
    }

    .switch-button.active {
      background: #2563eb;
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.18);
    }

    .toolbar-card,
    .calendar-card,
    .week-card,
    .detail-panel {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
    }

    .toolbar-card {
      margin-bottom: 18px;
      padding: 18px;
    }

    .calendar-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .current-period {
      min-width: 170px;
      margin: 0;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
    }

    .nav-button {
      min-width: 42px;
      height: 38px;
      padding: 0 12px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 14px;
    }

    .nav-button:hover {
      background: #dbeafe;
    }

    .filters {
      display: grid;
      grid-template-columns: 180px 220px 1fr auto;
      gap: 14px;
      align-items: start;
    }

    .filter-field {
      display: grid;
      gap: 8px;
    }

    .filter-label {
      color: #374151;
      font-size: 12px;
      font-weight: 700;
    }

    .filter-select {
      width: 100%;
      height: 42px;
      padding: 0 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
      color: #111827;
      font-size: 14px;
    }

    .filter-select:focus {
      border-color: #2563eb;
      outline: none;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    .tag-filter-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 42px;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
    }

    .tag-check {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 9px;
      border-radius: 999px;
      background: #f1f5f9;
      color: #334155;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .tag-check input {
      width: 14px;
      height: 14px;
      margin: 0;
      accent-color: #2563eb;
    }

    .clear-button {
      align-self: end;
      height: 42px;
      padding: 0 16px;
      background: #f8fafc;
      color: #334155;
      border: 1px solid #d1d5db;
    }

    .clear-button:hover {
      background: #eef2f7;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 18px;
      align-items: start;
    }

    .calendar-card,
    .week-card,
    .detail-panel {
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .card-title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
    }

    .card-note {
      margin: 0;
      color: #6b7280;
      font-size: 12px;
      font-weight: 600;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .weekday {
      padding: 12px 8px;
      border-right: 1px solid #e5e7eb;
      border-bottom: 1px solid #e5e7eb;
      background: #f8fafc;
      color: #64748b;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
    }

    .weekday:nth-child(7n) {
      border-right: 0;
    }

    .day-cell {
      min-height: 142px;
      padding: 10px;
      border-right: 1px solid #e5e7eb;
      border-bottom: 1px solid #e5e7eb;
      background: #ffffff;
    }

    .day-cell:nth-child(7n) {
      border-right: 0;
    }

    .day-cell.is-other-month {
      background: #f9fafb;
      color: #9ca3af;
    }

    .day-cell.is-today {
      background: #eff6ff;
      box-shadow: inset 0 0 0 2px #bfdbfe;
    }

    .day-number {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 700;
    }

    .day-count {
      color: #94a3b8;
      font-size: 11px;
      font-weight: 700;
    }

    .event-list {
      display: grid;
      gap: 6px;
    }

    .event-card {
      width: 100%;
      padding: 8px;
      border: 0;
      border-left: 4px solid #2563eb;
      border-radius: 7px;
      background: #eff6ff;
      color: #1e3a8a;
      text-align: left;
      cursor: pointer;
    }

    .event-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 14px rgba(15, 42, 74, 0.12);
    }

    .event-card.status-payment {
      border-left-color: #f97316;
      background: #fff7ed;
      color: #9a3412;
    }

    .event-card.status-done {
      border-left-color: #94a3b8;
      background: #f1f5f9;
      color: #475569;
    }

    .event-card.status-overdue {
      border-left-color: #ef4444;
      background: #fef2f2;
      color: #991b1b;
    }

    .event-id {
      display: block;
      font-size: 11px;
      font-weight: 700;
      opacity: 0.75;
    }

    .event-title {
      display: block;
      overflow: hidden;
      margin-top: 3px;
      font-size: 12px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .event-days {
      display: block;
      margin-top: 5px;
      font-size: 11px;
      font-weight: 700;
    }

    .week-card {
      display: none;
    }

    .week-card.active {
      display: block;
    }

    .calendar-card.hidden {
      display: none;
    }

    .week-list {
      display: grid;
    }

    .week-row {
      display: grid;
      grid-template-columns: 120px 110px minmax(180px, 1fr) 160px 120px 110px;
      gap: 12px;
      align-items: center;
      width: 100%;
      padding: 14px 20px;
      border: 0;
      border-bottom: 1px solid #e5e7eb;
      background: #ffffff;
      color: #111827;
      font-size: 13px;
      text-align: left;
    }

    button.week-row {
      cursor: pointer;
    }

    button.week-row:hover {
      background: #f8fafc;
    }

    .week-row:last-child {
      border-bottom: 0;
    }

    .week-head {
      background: #f8fafc;
      color: #64748b;
      font-size: 12px;
      font-weight: 700;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      min-width: 76px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #e0f2fe;
      color: #0369a1;
      font-size: 12px;
      font-weight: 700;
    }

    .status-badge.is-payment {
      background: #ffedd5;
      color: #c2410c;
    }

    .status-badge.is-done {
      background: #e5e7eb;
      color: #4b5563;
    }

    .status-badge.is-consult {
      background: #f1f5f9;
      color: #475569;
    }

    .status-badge.is-delivered {
      background: #ede9fe;
      color: #6d28d9;
    }

    .detail-panel {
      position: sticky;
      top: 24px;
    }

    .detail-body {
      padding: 20px;
    }

    .detail-empty {
      margin: 0;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.7;
    }

    .detail-list {
      display: grid;
      gap: 14px;
      margin: 0;
    }

    .detail-item {
      display: grid;
      gap: 5px;
    }

    .detail-label {
      color: #6b7280;
      font-size: 12px;
      font-weight: 700;
    }

    .detail-value {
      color: #111827;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.6;
      overflow-wrap: anywhere;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag-badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 12px;
      font-weight: 700;
    }

    .detail-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    .detail-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      background: #2563eb;
      color: #ffffff;
      font-size: 13px;
    }

    .detail-button.secondary {
      background: #f1f5f9;
      color: #334155;
    }

    .message {
      padding: 28px 20px;
      color: #6b7280;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
    }

    #loading {
      display: none;
      margin-bottom: 18px;
      padding: 14px 16px;
      border: 1px solid #dbeafe;
      border-radius: 8px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 14px;
      font-weight: 700;
    }

    @media (max-width: 1100px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .detail-panel {
        position: static;
      }

      .filters {
        grid-template-columns: 1fr 1fr;
      }

      .clear-button {
        align-self: auto;
      }

      .week-row {
        grid-template-columns: 110px 90px minmax(150px, 1fr);
      }

      .week-row span:nth-child(4),
      .week-row span:nth-child(5),
      .week-row span:nth-child(6) {
        display: none;
      }
    }

    @media (max-width: 760px) {
      .layout {
        display: block;
      }

      .sidebar {
        position: static;
        width: 100%;
        height: auto;
      }

      .nav {
        grid-template-columns: repeat(10, minmax(0, 1fr));
        overflow-x: auto;
      }

      .nav-link {
        justify-content: center;
        min-width: 136px;
      }

      .sidebar-account {
        margin-top: 18px;
      }

      .main {
        margin-left: 0;
        padding: 24px 16px;
      }

      .page-header,
      .calendar-controls {
        align-items: flex-start;
        flex-direction: column;
      }

      .filters {
        grid-template-columns: 1fr;
      }

      .calendar-grid {
        min-width: 760px;
      }

      .calendar-scroll {
        overflow-x: auto;
      }
    }

    /* Responsive layout */
    .mobile-header,
    .sidebar-overlay,
    .sidebar-close {
      display: none;
    }

    @media (min-width: 768px) and (max-width: 1023px) {
      .sidebar {
        width: 190px !important;
        padding: 22px 12px !important;
      }

      .main {
        margin-left: 190px !important;
        padding: 28px 22px !important;
      }

      .content {
        max-width: 100% !important;
      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }

      .form-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }

      .table-wrap,
      .invoice-scroll,
      .calendar-scroll {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }

      table {
        min-width: 820px;
      }
    }

    @media (max-width: 767px) {
      body {
        min-width: 0;
      }

      .mobile-header {
        position: sticky;
        top: 0;
        z-index: 80;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 58px;
        padding: 0 16px;
        border-bottom: 1px solid #e5e7eb;
        background: #ffffff;
        box-shadow: 0 8px 18px rgba(17, 24, 39, 0.08);
      }

      .mobile-logo {
        color: #0f2a4a;
        font-size: 17px;
        font-weight: 700;
      }

      .hamburger-button,
      .sidebar-close {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 42px;
        height: 42px;
        border: 0;
        border-radius: 8px;
        background: #eff6ff;
        color: #0f2a4a;
        cursor: pointer;
        font-size: 22px;
        font-weight: 700;
      }

      .sidebar-close {
        position: absolute;
        top: 14px;
        right: 14px;
        background: rgba(255, 255, 255, 0.12);
        color: #ffffff;
      }

      .sidebar-overlay {
        position: fixed;
        inset: 0;
        z-index: 90;
        display: block;
        visibility: hidden;
        background: rgba(15, 23, 42, 0.46);
        opacity: 0;
        transition: opacity 0.2s ease, visibility 0.2s ease;
      }

      body.sidebar-open .sidebar-overlay {
        visibility: visible;
        opacity: 1;
      }

      .layout {
        display: block !important;
        min-height: auto !important;
      }

      .sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        z-index: 100 !important;
        display: flex !important;
        flex-direction: column !important;
        width: min(82vw, 300px) !important;
        height: 100vh !important;
        padding: 24px 16px !important;
        transform: translateX(-105%);
        transition: transform 0.24s ease;
        overflow-y: auto;
      }

      body.sidebar-open .sidebar {
        transform: translateX(0);
      }

      .sidebar .logo {
        margin-right: 44px;
      }

      .nav {
        display: grid !important;
        grid-template-columns: 1fr !important;
        gap: 8px !important;
        overflow: visible !important;
      }

      .nav-link {
        justify-content: flex-start !important;
        min-width: 0 !important;
        min-height: 44px;
        padding: 12px 14px !important;
      }

      .nav-icon {
        display: grid !important;
      }

      .sidebar-account {
        margin-top: auto !important;
      }

      .logout {
        display: inline-flex !important;
        min-height: 44px;
        align-items: center;
      }

      .main {
        width: 100% !important;
        margin-left: 0 !important;
        padding: 22px 16px 32px !important;
      }

      .content {
        max-width: 100% !important;
      }

      .page-header,
      .calendar-controls,
      .toolbar,
      .filter-bar,
      .actions,
      .detail-actions,
      .invoice-actions {
        align-items: stretch !important;
        flex-direction: column !important;
        gap: 12px !important;
      }

      .page-title {
        font-size: 24px !important;
      }

      .page-lead {
        font-size: 14px !important;
      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid,
      .form-grid,
      .filters,
      .toolbar,
      .workspace,
      .invoice-grid,
      .invoice-header,
      .invoice-footer {
        grid-template-columns: 1fr !important;
      }

      .summary-card,
      .table-card,
      .form-card,
      .detail-card,
      .profile-card,
      .settings-card,
      .toolbar-card,
      .calendar-card,
      .week-card,
      .detail-panel,
      .auth-card {
        border-radius: 8px !important;
      }

      input,
      select,
      textarea,
      .button,
      .new-button,
      .primary-button,
      .secondary-button,
      .ghost-button,
      .danger-button,
      .filter-button,
      .clear-button,
      .detail-button,
      .preview-button {
        width: 100%;
        min-height: 44px;
      }

      .table-wrap,
      .invoice-scroll,
      .calendar-scroll {
        width: 100%;
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }

      table {
        min-width: 760px;
      }

      th,
      td {
        white-space: nowrap;
      }

      .item-row,
      .items-row {
        grid-template-columns: 1fr !important;
      }

      .drag-handle {
        width: 100% !important;
        min-height: 34px;
      }

      .calendar-grid {
        min-width: 680px !important;
      }

      .day-cell {
        min-height: 104px !important;
        padding: 8px !important;
      }

      .event-title {
        max-width: 100%;
      }

      .week-row {
        min-width: 720px;
      }

      .invoice-card,
      .invoice-paper {
        min-width: 720px;
      }

      @media print {
        .mobile-header,
        .sidebar-overlay,
        .sidebar-close {
          display: none !important;
        }
      }
    }

    /* Responsive print and scroll safeguards */
    @media print {
      .mobile-header,
      .sidebar-overlay,
      .sidebar-close {
        display: none !important;
      }
    }

    @media (max-width: 767px) {
      .week-card,
      .invoice-card,
      .invoice-paper {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }
    }

    /* Tablet keeps desktop-style sidebar */
    @media (min-width: 768px) and (max-width: 1023px) {
      .layout {
        display: flex !important;
        min-height: 100vh !important;
      }

      .sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        height: 100vh !important;
      }

      .nav {
        grid-template-columns: 1fr !important;
        overflow: visible !important;
      }

      .nav-link {
        justify-content: flex-start !important;
        min-width: 0 !important;
      }

      .nav-icon {
        display: grid !important;
      }

      .logout {
        display: inline-flex !important;
      }
    }

    /* Compact tablet and mobile density */
    @media (min-width: 768px) and (max-width: 1023px) {
      body {
        font-size: 13px;
      }

      .main {
        padding: 22px 18px !important;
      }

      .page-header {
        margin-bottom: 18px !important;
      }

      .page-title {
        font-size: 23px !important;
      }

      .page-lead {
        font-size: 12px !important;
        line-height: 1.55 !important;
      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid {

    function toDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatDate(dateString) {
      if (!dateString) return "未設定";
      return dateString.replaceAll("-", "/");
    }

    function parseDate(dateString) {
      if (!dateString) return null;
      const [year, month, day] = dateString.split("-").map(Number);
      if (!year || !month || !day) return null;
      return new Date(year, month - 1, day);
    }

    function getToday() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return today;
    }

    function getDaysText(deadline) {
      const deadlineDate = parseDate(deadline);
      if (!deadlineDate) return "締切未設定";

      const today = getToday();
      deadlineDate.setHours(0, 0, 0, 0);
      const diff = Math.round((deadlineDate - today) / 86400000);

      if (diff === 0) return "今日締切";
      if (diff > 0) return `残り${diff}日`;
      return "期限切れ";
    }

    function isOverdue(project) {
      const deadlineDate = parseDate(project.deadline);
      if (!deadlineDate || project.status === "完了") return false;
      deadlineDate.setHours(0, 0, 0, 0);
      return deadlineDate < getToday();
    }

    function getEventClass(project) {
      if (isOverdue(project)) return "status-overdue";
      if (project.status === "入金待ち") return "status-payment";
      if (project.status === "完了") return "status-done";
      return "";
    }

    function getStatusBadgeClass(status) {
      if (status === "入金待ち") return "status-badge is-payment";
      if (status === "完了") return "status-badge is-done";
      if (status === "相談中") return "status-badge is-consult";
      if (status === "納品済み") return "status-badge is-delivered";
      return "status-badge";
    }

    function getSelectedTags() {
      return Array.from(tagFilterList.querySelectorAll(".tag-filter:checked")).map((input) => input.value);
    }

    function getFilteredProjects() {
      const selectedStatus = statusFilter.value;
      const selectedClient = clientFilter.value;
      const selectedTags = getSelectedTags();

      return allProjects.filter((project) => {
        const tags = Array.isArray(project.tags) ? project.tags : [];
        const statusMatched = selectedStatus === "" || project.status === selectedStatus;
        const clientMatched = selectedClient === "" || project.client === selectedClient;
        const tagsMatched = selectedTags.length === 0 || selectedTags.every((tag) => tags.includes(tag));
        return project.deadline && statusMatched && clientMatched && tagsMatched;
      });
    }

    function setCurrentPeriodText() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth() + 1;

      if (currentView === "month") {
        currentPeriod.textContent = `${year}年${month}月`;
        return;
      }

      const start = getWeekStart(currentDate);
      const end = new Date(start);
      end.setDate(start.getDate() + 6);
      currentPeriod.textContent = `${formatDate(toDateKey(start))} - ${formatDate(toDateKey(end))}`;
    }

    function renderTagFilters() {
      tagFilterList.replaceChildren();

      if (allTags.length === 0) {
        const empty = document.createElement("span");
        empty.className = "card-note";
        empty.textContent = "タグがありません";
        tagFilterList.appendChild(empty);
        return;
      }

      allTags.forEach((tagName) => {
        const label = document.createElement("label");
        const input = document.createElement("input");
        const text = document.createElement("span");

        label.className = "tag-check";
        input.className = "tag-filter";
        input.type = "checkbox";
        input.value = tagName;
        text.textContent = tagName;
        label.append(input, text);
        tagFilterList.appendChild(label);
      });
    }

    function renderClientFilter() {
      const clients = [...new Set(allProjects.map((project) => project.client).filter(Boolean))].sort();
      clientFilter.replaceChildren();

      const allOption = document.createElement("option");
      allOption.value = "";
      allOption.textContent = "すべて";
      clientFilter.appendChild(allOption);

      clients.forEach((client) => {
        const option = document.createElement("option");
        option.value = client;
        option.textContent = client;
        clientFilter.appendChild(option);
      });
    }

    function createEventButton(project) {
      const button = document.createElement("button");
      const id = document.createElement("span");
      const title = document.createElement("span");
      const days = document.createElement("span");

      button.type = "button";
      button.className = `event-card ${getEventClass(project)}`;
      id.className = "event-id";
      id.textContent = project.displayId || "未設定";
      title.className = "event-title";
      title.textContent = project.title || "無題の案件";
      days.className = "event-days";
      days.textContent = getDaysText(project.deadline);
      button.append(id, title, days);
      button.addEventListener("click", () => showProjectDetail(project));
      return button;
    }

    function renderMonthCalendar(projects) {
      calendarGrid.replaceChildren();
      emptyMessage.hidden = projects.length !== 0;
      calendarSummary.textContent = `${projects.length}件`;

      weekdays.forEach((weekday) => {
        const head = document.createElement("div");
        head.className = "weekday";
        head.textContent = weekday;
        calendarGrid.appendChild(head);
      });

      const firstDate = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
      const startDate = new Date(firstDate);
      startDate.setDate(firstDate.getDate() - firstDate.getDay());

      for (let index = 0; index < 42; index += 1) {
        const date = new Date(startDate);
        date.setDate(startDate.getDate() + index);
        const dateKey = toDateKey(date);
        const dayProjects = projects.filter((project) => project.deadline === dateKey);

        const cell = document.createElement("div");
        cell.className = "day-cell";
        if (date.getMonth() !== currentDate.getMonth()) cell.classList.add("is-other-month");
        if (dateKey === toDateKey(getToday())) cell.classList.add("is-today");

        const number = document.createElement("div");
        const dateNumber = document.createElement("span");
        const dayCount = document.createElement("span");

        number.className = "day-number";
        dateNumber.textContent = String(date.getDate());
        dayCount.className = "day-count";
        dayCount.textContent = dayProjects.length ? `${dayProjects.length}件` : "";
        number.append(dateNumber, dayCount);

        const list = document.createElement("div");
        list.className = "event-list";
        dayProjects.forEach((project) => list.appendChild(createEventButton(project)));

        cell.appendChild(number);
        cell.appendChild(list);
        calendarGrid.appendChild(cell);
      }
    }

    function getWeekStart(date) {
      const start = new Date(date);
      start.setHours(0, 0, 0, 0);
      start.setDate(start.getDate() - start.getDay());
      return start;
    }

    function renderWeekList(projects) {
      weekList.replaceChildren();

      const start = getWeekStart(currentDate);
      const end = new Date(start);
      end.setDate(start.getDate() + 6);

      const weekProjects = projects
        .filter((project) => {
          const deadlineDate = parseDate(project.deadline);
          return deadlineDate && deadlineDate >= start && deadlineDate <= end;
        })
        .sort((a, b) => (a.deadline || "").localeCompare(b.deadline || ""));

      weekSummary.textContent = `${weekProjects.length}件`;
      weekEmptyMessage.hidden = weekProjects.length !== 0;

      const head = document.createElement("div");
      head.className = "week-row week-head";
      ["日付", "案件ID", "タイトル", "クライアント", "ステータス", "残り日数"].forEach((label) => {
        const item = document.createElement("span");
        item.textContent = label;
        head.appendChild(item);
      });
      weekList.appendChild(head);

      weekProjects.forEach((project) => {
        const row = document.createElement("button");
        const date = document.createElement("span");
        const displayId = document.createElement("span");
        const title = document.createElement("span");
        const client = document.createElement("span");
        const statusWrap = document.createElement("span");
        const status = document.createElement("span");
        const days = document.createElement("span");

        row.type = "button";
        row.className = "week-row";
        date.textContent = formatDate(project.deadline);
        displayId.textContent = project.displayId || "未設定";
        title.textContent = project.title || "無題の案件";
        client.textContent = project.client || "未設定";
        status.className = getStatusBadgeClass(project.status);
        status.textContent = project.status || "未設定";
        statusWrap.appendChild(status);
        days.textContent = getDaysText(project.deadline);
        row.append(date, displayId, title, client, statusWrap, days);
        row.addEventListener("click", () => showProjectDetail(project));
        weekList.appendChild(row);
      });
    }

    function appendDetailItem(list, labelText, valueNode) {
      const item = document.createElement("div");
      const label = document.createElement("dt");
      const value = document.createElement("dd");

      item.className = "detail-item";
      label.className = "detail-label";
      value.className = valueNode.className || "detail-value";
      label.textContent = labelText;

      if (typeof valueNode === "string") {
        value.textContent = valueNode;
      } else {
        value.appendChild(valueNode);
      }

      item.append(label, value);
      list.appendChild(item);
    }

    function resetDetailPanel() {
      const empty = document.createElement("p");
      empty.className = "detail-empty";
      empty.textContent = "カレンダー上の案件を選択すると、ここに詳細が表示されます。";
      detailBody.replaceChildren(empty);
    }

    function showProjectDetail(project) {
      const tags = Array.isArray(project.tags) ? project.tags : [];
      const list = document.createElement("dl");
      const status = document.createElement("span");
      const tagList = document.createElement("div");
      const actions = document.createElement("div");
      const detailLink = document.createElement("a");
      const closeButton = document.createElement("button");

      list.className = "detail-list";
      status.className = getStatusBadgeClass(project.status);
      status.textContent = project.status || "未設定";
      tagList.className = "tag-list";

      if (tags.length > 0) {
        tags.forEach((tag) => {
          const badge = document.createElement("span");
          badge.className = "tag-badge";
          badge.textContent = tag;
          tagList.appendChild(badge);
        });
      } else {
        const empty = document.createElement("span");
        empty.className = "detail-value";
        empty.textContent = "タグなし";
        tagList.appendChild(empty);
      }

      appendDetailItem(list, "案件ID", project.displayId || "未設定");
      appendDetailItem(list, "案件名", project.title || "無題の案件");
      appendDetailItem(list, "クライアント", project.client || "未設定");
      appendDetailItem(list, "ステータス", status);
      appendDetailItem(list, "締切日", `${formatDate(project.deadline)}（${getDaysText(project.deadline)}）`);
      appendDetailItem(list, "タグ", tagList);

      actions.className = "detail-actions";
      detailLink.className = "detail-button";
      detailLink.href = "./project-detail.html?id=" + encodeURIComponent(project.id);
      detailLink.textContent = "詳細ページへ";
      closeButton.className = "detail-button secondary";
      closeButton.type = "button";
      closeButton.textContent = "閉じる";
      closeButton.addEventListener("click", resetDetailPanel);
      actions.append(detailLink, closeButton);
      detailBody.replaceChildren(list, actions);
    }

    function render() {
      const projects = getFilteredProjects();
      setCurrentPeriodText();

      if (currentView === "month") {
        calendarCard.classList.remove("hidden");
        weekCard.classList.remove("active");
        renderMonthCalendar(projects);
        return;
      }

      calendarCard.classList.add("hidden");
      weekCard.classList.add("active");
      renderWeekList(projects);
    }

    async function loadAccountName() {
      const userRef = doc(db, "users", currentUser.uid);
      const userSnapshot = await getDoc(userRef);
      if (userSnapshot.exists()) {
        const user = userSnapshot.data();
        topAccountName.textContent = user.userId || currentUser.email || "user";
      } else {
        topAccountName.textContent = currentUser.email || "user";
      }
    }

    async function loadData() {
      showLoading();

      try {
        await loadAccountName();

        const projectsSnapshot = await getDocs(collection(db, "users", currentUser.uid, "projects"));
        allProjects = projectsSnapshot.docs.map((projectDoc) => ({
          id: projectDoc.id,
          ...projectDoc.data()
        }));

        const tagsSnapshot = await getDocs(collection(db, "users", currentUser.uid, "tags"));
        allTags = tagsSnapshot.docs
          .map((tagDoc) => tagDoc.data().name)
          .filter(Boolean)
          .sort();

        renderClientFilter();
        renderTagFilters();
        render();
      } catch (error) {
        console.error(error);
        calendarGrid.replaceChildren();
        emptyMessage.hidden = false;
        emptyMessage.textContent = "カレンダー情報の取得に失敗しました";
      } finally {
        hideLoading();
      }
    }

    prevButton.addEventListener("click", () => {
      if (currentView === "month") {
        currentDate.setMonth(currentDate.getMonth() - 1);
      } else {
        currentDate.setDate(currentDate.getDate() - 7);
      }
      render();
    });

    nextButton.addEventListener("click", () => {
      if (currentView === "month") {
        currentDate.setMonth(currentDate.getMonth() + 1);
      } else {
        currentDate.setDate(currentDate.getDate() + 7);
      }
      render();
    });

    todayButton.addEventListener("click", () => {
      currentDate = new Date();
      render();
    });

    monthViewButton.addEventListener("click", () => {
      currentView = "month";
      monthViewButton.classList.add("active");
      weekViewButton.classList.remove("active");
      render();
    });

    weekViewButton.addEventListener("click", () => {
      currentView = "week";
      weekViewButton.classList.add("active");
      monthViewButton.classList.remove("active");
      render();
    });

    statusFilter.addEventListener("change", render);
    clientFilter.addEventListener("change", render);
    tagFilterList.addEventListener("change", render);

    clearButton.addEventListener("click", () => {
      statusFilter.value = "";
      clientFilter.value = "";
      tagFilterList.querySelectorAll(".tag-filter").forEach((input) => {
        input.checked = false;
      });
      render();
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "./login.html";
        return;
      }

      currentUser = user;
      await loadData();
    });
  </script>
  <script src="./assets/common.js"></script>
</body>
</html>
