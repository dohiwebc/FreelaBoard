<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>請求書プレビュー | FreelaBoard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Noto Sans JP", Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      width: 220px;
      height: 100vh;
      padding: 24px 16px;
      background: #0f2a4a;
      color: #ffffff;
    }

    .logo {
      margin: 0 0 28px;
      font-size: 20px;
      font-weight: 700;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 8px;
      color: #dbeafe;
      font-size: 14px;
      font-weight: 700;
    }

    .nav-link:hover,
    .nav-link.active {
      background: #163b68;
      color: #ffffff;
    }

    .nav-icon {
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      font-size: 15px;
    }

    .nav-icon-image {
      width: 16px;
      height: 16px;
      object-fit: contain;
    }

    .logout {
      color: #dbeafe;
      font-size: 14px;
      font-weight: 700;
    }

    .sidebar-account {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: auto;
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
    }

    .sidebar-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .page {
      min-height: 100vh;
      margin-left: 220px;
      padding: 32px 16px 48px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      width: min(920px, 100%);
      margin: 0 auto 20px;
    }

    .back-link {
      color: #2563eb;
      font-size: 14px;
      font-weight: 700;
    }

    .toolbar-actions {
      display: flex;
      gap: 12px;
    }

    .no-print {
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border: none;
      border-radius: 8px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .secondary-button {
      background: #e5e7eb;
      color: #374151;
    }

    .primary-button {
      background: #123a74;
      color: #ffffff;
    }

    .invoice-card {
      width: min(920px, 100%);
      margin: 0 auto;
      padding: 48px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
    }

    .invoice-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
    }

    .invoice-title {
      margin: 0 0 36px;
      font-size: 36px;
      letter-spacing: 0;
      font-weight: 700;
      text-align: center;
    }

    .invoice-meta {
      display: grid;
      gap: 8px;
      color: #6b7280;
      font-size: 14px;
      text-align: right;
    }

    .issuer-box {
      display: grid;
      gap: 6px;
      color: #374151;
      font-size: 13px;
      line-height: 1.7;
      text-align: left;
      white-space: pre-wrap;
    }

    .issuer-name {
      color: #111827;
      font-size: 16px;
      font-weight: 700;
    }

    .invoice-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      margin-bottom: 32px;
    }

    .info-block {
      display: grid;
      gap: 12px;
    }

    .info-label {
      color: #6b7280;
      font-size: 13px;
      font-weight: 700;
    }

    .info-value {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.4;
    }

    .subject {
      font-size: 18px;
      font-weight: 700;
    }

    .invoice-table {
      width: 100%;
      margin-top: 18px;
      border-collapse: collapse;
    }

    .invoice-table th,
    .invoice-table td {
      padding: 16px;
      border: 1px solid #e5e7eb;
      text-align: left;
      font-size: 14px;
      vertical-align: middle;
    }

    .invoice-table th {
      background: #f9fafb;
      color: #374151;
      font-weight: 700;
    }

    .summary {
      width: min(320px, 100%);
      margin-left: auto;
      margin-top: 28px;
    }

    .summary-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid #e5e7eb;
      font-size: 15px;
    }

    .summary-row.total {
      font-size: 20px;
      font-weight: 700;
    }

    .payment-guide {
      margin: 0 0 12px;
      color: #374151;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.7;
    }

    .invoice-footer {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 36px;
    }

    .footer-block {
      padding: 18px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #f9fafb;
    }

    .footer-title {
      margin: 0 0 12px;
      color: #374151;
      font-size: 14px;
      font-weight: 700;
    }

    .footer-text {
      margin: 0;
      color: #4b5563;
      font-size: 13px;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .error-card {
      width: min(720px, 100%);
      margin: 0 auto;
      padding: 32px;
      border: 1px solid #fecaca;
      border-radius: 8px;
      background: #ffffff;
      color: #b91c1c;
      text-align: center;
      box-shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
    }

    .loading {
      padding: 20px 0;
      color: #6b7280;
      font-size: 14px;
      text-align: center;
    }

    .error-card h1 {
      margin: 0 0 12px;
      color: #111827;
      font-size: 26px;
    }

    .error-card p {
      margin: 0;
      line-height: 1.7;
    }

    @media (max-width: 720px) {
      .sidebar {
        position: static;
        width: 100%;
        height: auto;
        padding: 18px 16px;
      }

      .logo {
        margin-bottom: 16px;
      }

      .nav {
        grid-template-columns: repeat(10, minmax(0, 1fr));
      }

      .nav-link {
        justify-content: center;
        padding: 10px;
      }

      .nav-icon,
      .logout {
        display: none;
      }

      .page {
        margin-left: 0;
      }

      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .toolbar-actions {
        justify-content: stretch;
      }

      .toolbar-actions .button {
        flex: 1;
      }

      .invoice-card {
        padding: 28px 22px;
      }

      .invoice-header,
      .invoice-grid,
      .invoice-footer {
        grid-template-columns: 1fr;
        flex-direction: column;
      }

      .invoice-meta,
      .issuer-box {

      }

      .invoice-title {

        padding: 0;

        border-radius: 0;
        box-shadow: none;
        break-inside: avoid;

    .mobile-header,
    .sidebar-overlay,
    .sidebar-close {

      .page-header,

      .page-title {

      }

      .summary-grid,
      .stats-grid,

      .filters,

      body.sidebar-open .hamburger-button span:nth-child(2) {
        opacity: 0;
      }

      body.sidebar-open .hamburger-button span:nth-child(3) {
        transform: translateY(-6px) rotate(-45deg);
      }
    }

    /* Polished opened mobile menu */
    @media (max-width: 767px) {
      .sidebar {
        width: min(84vw, 292px) !important;
        padding: 20px 14px 18px !important;

      .sidebar .logo {
        display: flex;

        min-height: 40px;
        margin: 0 46px 18px 2px !important;

      }

      .sidebar-close {
        top: 18px !important;
        right: 14px !important;

        border: 1px solid rgba(255, 255, 255, 0.16) !important;

        font-size: 20px !important;
        line-height: 1;
      }

      .sidebar .nav {
        gap: 6px !important;
        padding: 8px 0 14px;
      }

      .sidebar .nav-link {
        min-height: 42px !important;
        padding: 10px 12px !important;
        border: 1px solid transparent;

        color: #dbeafe !important;

      }

      .sidebar .nav-link:hover,
      .sidebar .nav-link.active {
        background: rgba(255, 255, 255, 0.12) !important;

      }

      .sidebar .nav-icon {

        background: rgba(255, 255, 255, 0.10);

      }

      .sidebar .nav-link.active .nav-icon {

      .sidebar-account {

    /* Cleaner selected state in mobile menu */
    @media (max-width: 767px) {
      .sidebar .nav-link {
        position: relative;
        border-color: transparent !important;
        box-shadow: none !important;
      }

      .sidebar .nav-link.active {
        background: rgba(255, 255, 255, 0.13) !important;
        border-color: transparent !important;
        box-shadow: inset 3px 0 0 #93c5fd !important;
      }

      .sidebar .nav-link:hover {
        border-color: transparent !important;
        box-shadow: none !important;
      }

      .sidebar .nav-link.active:hover {

      }

      .sidebar .nav-link.active .nav-icon {
        background: rgba(147, 197, 253, 0.22) !important;
        color: #ffffff !important;
      }
    }

    /* Plain mobile menu icons */
    @media (max-width: 767px) {
      .sidebar .nav-icon,
      .sidebar .nav-link.active .nav-icon {
        background: transparent !important;
        border-radius: 0 !important;
        color: currentColor !important;
      }
    }

    /* Motion effects */
    @keyframes fbFadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fbPopIn {
      0% {
        opacity: 0;
        transform: scale(0.88);
      }
      70% {
        transform: scale(1.06);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fbPulseSoft {
      0%, 100% {
        transform: scale(1);
        box-shadow: none;
      }
      50% {
        transform: scale(1.03);
        box-shadow: 0 8px 18px rgba(245, 158, 11, 0.18);
      }
    }

    .summary-card,
    .chart-card,
    .recent-card,
    .table-card,
    .form-card,
    .detail-card,
    .profile-card,
    .settings-card,
    .toolbar-card,
    .calendar-card,
    .week-card,
    .detail-panel,
    .auth-card {
      animation: fbFadeUp 0.85s ease both;

    .summary-card:nth-child(2),
    .chart-card:nth-child(2),
    .form-card + .table-card {
      animation-delay: 0.06s;

    .summary-card:nth-child(3) {

    .summary-card:nth-child(4) {

    .summary-card:nth-child(5) {

    .summary-card:nth-child(6) {

    tbody tr,
    .alert-item,
    .week-row,

    tbody tr:hover,
    .alert-item:hover,
    .event-card:hover,
    .summary-card:hover,
    .chart-card:hover,
    .recent-card:hover {

    .status,

    .status:hover,
    .status-badge:hover,
    .tag-badge:hover {
      transform: translateY(-1px) scale(1.02);

    }

    .status-waiting,
    .status-overdue,
    .event-card.status-overdue,
    .event-card.status-payment {

    @media (max-width: 767px) {
      body.sidebar-open .sidebar .nav-link {

      body.sidebar-open .sidebar .nav-link:nth-child(1) { animation-delay: 0.03s; }
      body.sidebar-open .sidebar .nav-link:nth-child(2) { animation-delay: 0.06s; }
      body.sidebar-open .sidebar .nav-link:nth-child(3) { animation-delay: 0.09s; }
      body.sidebar-open .sidebar .nav-link:nth-child(4) { animation-delay: 0.12s; }
      body.sidebar-open .sidebar .nav-link:nth-child(5) { animation-delay: 0.15s; }
      body.sidebar-open .sidebar .nav-link:nth-child(6) { animation-delay: 0.18s; }
      body.sidebar-open .sidebar .nav-link:nth-child(7) { animation-delay: 0.21s; }
      body.sidebar-open .sidebar .nav-link:nth-child(8) { animation-delay: 0.24s; }
      body.sidebar-open .sidebar .nav-link:nth-child(9) { animation-delay: 0.27s; }
      body.sidebar-open .sidebar .nav-link:nth-child(10) { animation-delay: 0.30s; }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }

  </style>

</head>
<body>
  <header class="mobile-header">
    <button class="hamburger-button" type="button" aria-label="メニューを開く" aria-controls="appSidebar" aria-expanded="false"><span></span><span></span><span></span></button>
    <span class="mobile-logo">FreelaBoard</span>
  </header>
  <div class="sidebar-overlay" data-sidebar-overlay></div>
  <aside class="sidebar" id="appSidebar">
    
      <button class="sidebar-close" type="button" aria-label="メニューを閉じる">×</button>
      <h1 class="logo">FreelaBoard</h1>

    <nav class="nav" aria-label="メインメニュー">
      <a class="nav-link" href="./dashboard.html">
        <span class="nav-icon">⌂</span>
        <span>ダッシュボード</span>

      <a class="nav-link active" href="./invoices.html" aria-current="page">

      </a>
      <a class="nav-link" href="./reports.html">

      </a>
        <a class="nav-link" href="./clients.html">
          <span class="nav-icon">◇</span>
          <span>クライアント管理</span>
        </a>
        <a class="nav-link" href="./tags.html">
          <span class="nav-icon">#</span>
          <span>タグ管理</span>
        </a>
        <a class="nav-link" href="./calendar.html">
          <span class="nav-icon">□</span>
          <span>カレンダー</span>
        </a>
      <a class="nav-link" href="./profile.html">
        <span class="nav-icon"><img class="nav-icon-image" src="./assets/profile-nav-icon.png" alt=""></span>
        <span>プロフィール</span>
      </a>
      <a class="nav-link" href="./settings.html">
        <span class="nav-icon">⚙</span>
        <span>設定</span>
      </a>
    </nav>
      <div class="sidebar-account">
      <img class="sidebar-avatar" src="./assets/iconfree.jpg" alt="プロフィール画像">
      <span id="topAccountName">user</span>
    </div>
    <a class="logout" href="./login.html">ログアウト</a>
  </aside>

  <main class="page">
    <div class="loading" id="loading">Loading...</div>
    <div class="toolbar">
      <a class="back-link" id="backLink" href="./project-detail.html">← 戻る</a>
      <div class="toolbar-actions no-print">
        <button class="button secondary-button" id="backButton" type="button">戻る</button>
        <button class="button primary-button" id="printButton" type="button">PDF保存</button>
      </div>
    </div>

    <section class="invoice-card" id="invoiceCard">
      <p>読み込み中...</p>
    </section>
  </main>

  <script type="module">
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { auth, db } from "./firebase.js";

    const params = new URLSearchParams(window.location.search);
    const projectId = params.get("id");
    const loading = document.getElementById("loading");
    const invoiceCard = document.getElementById("invoiceCard");
    const backLink = document.getElementById("backLink");
    const backButton = document.getElementById("backButton");
    const printButton = document.getElementById("printButton");
    const topAccountName = document.getElementById("topAccountName");
    let currentUser = null;

    function getProjectDocRef() {
      return doc(db, "users", currentUser.uid, "projects", projectId);
    }

    function getUserDocRef() {
      return doc(db, "users", currentUser.uid);
    }

    function pickValue(project, keys, defaultValue = "-") {
      for (const key of keys) {
        if (project[key] !== undefined && project[key] !== null && project[key] !== "") {
          return project[key];
        }
      }

      return defaultValue;
    }

    function formatAmount(amount) {
      return "¥" + Number(amount || 0).toLocaleString("ja-JP");
    }

    function getProjectItems(project) {
      if (Array.isArray(project.items) && project.items.length > 0) {
        return project.items.map((item) => {
          return {
            name: item.name || "品目名未設定",
            type: item.type || "main",
            price: Number(item.price || 0)
          };
        });
      }

      return [{
        name: pickValue(project, ["title", "name", "projectName"], "案件"),
        type: "main",
        price: Number(pickValue(project, ["price", "amount", "fee"], 0))
      }];
    }

    function getProjectTotal(project) {
      if (project.totalPrice !== undefined && project.totalPrice !== null) {
        return Number(project.totalPrice || 0);
      }

      return getProjectItems(project).reduce((sum, item) => {
        return sum + Number(item.price || 0);
      }, 0);
    }

    function formatDate(value) {
      if (!value) {
        return formatDateText(new Date());
      }

      const date = typeof value.toDate === "function" ? value.toDate() : new Date(value);

      if (Number.isNaN(date.getTime())) {
        return formatDateText(new Date());
      }

      return formatDateText(date);
    }

    function formatDateText(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}/${month}/${day}`;
    }

    function addDays(date, days) {
      const result = new Date(date);
      result.setDate(result.getDate() + days);
      return result;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function buildInvoiceNumber(project, settings) {
      if (project.invoiceId) {
        return project.invoiceId;
      }

      const prefix = settings.invoiceNumberPrefix || "INV";
      const displayId = pickValue(project, ["displayId"], projectId || "001");
      return `${prefix}-${displayId}`;
    }

    function getInvoiceDisplayName(settings, user) {
      if (settings.invoiceNameType === "userId") {
        return settings.userId || settings.tradeName || settings.companyName || user.email || "";
      }

      return settings.tradeName || settings.userId || settings.companyName || user.email || "";
    }

    function buildIssuerText(settings, user) {
      const lines = [];
      const displayName = getInvoiceDisplayName(settings, user);

      if (displayName) lines.push(displayName);
      if (settings.companyName && settings.companyName !== displayName) lines.push(settings.companyName);

      if (settings.address) lines.push(settings.address);
      if (settings.phone) lines.push(`TEL: ${settings.phone}`);
      if (settings.email || user.email) lines.push(`Email: ${settings.email || user.email}`);
      if (settings.registrationNumber) lines.push(`登録番号: ${settings.registrationNumber}`);

      return lines;
    }

    function buildBankText(settings) {
      const lines = [];

      if (settings.bankName) lines.push(`銀行名: ${settings.bankName}`);
      if (settings.bankBranch) lines.push(`支店名: ${settings.bankBranch}`);
      if (settings.bankAccountType) lines.push(`口座種別: ${settings.bankAccountType}`);
      if (settings.bankAccountNumber) lines.push(`口座番号: ${settings.bankAccountNumber}`);
      if (settings.bankAccountName) lines.push(`口座名義: ${settings.bankAccountName}`);

      return lines;
    }

    function showError(message) {
      invoiceCard.outerHTML = `
        <section class="error-card">
          <h1>請求書を表示できません</h1>
          <p>${message}</p>
        </section>
      `;
    }

    function renderInvoice(project, settings = {}) {
      const displayId = pickValue(project, ["displayId"], "未設定");
      const client = pickValue(project, ["client", "clientName"]);
      const title = pickValue(project, ["title", "name", "projectName"]);
      const items = getProjectItems(project);
      const subtotal = getProjectTotal(project);
      const taxRate = Number(settings.taxRate ?? 10);
      const safeTaxRate = Number.isNaN(taxRate) ? 10 : taxRate;
      const tax = Math.floor(subtotal * (safeTaxRate / 100));
      const total = subtotal + tax;
      const today = new Date();
      const issueDate = project.invoiceIssuedAt ? formatDate(project.invoiceIssuedAt) : formatDate(today);
      const paymentDueDays = Number(settings.paymentDueDays);
      const dueDate = project.paymentDueDate
        ? formatDate(project.paymentDueDate)
        : (Number.isNaN(paymentDueDays) || paymentDueDays === 0
          ? ""
          : formatDate(addDays(today, paymentDueDays)));
      const invoiceNumber = buildInvoiceNumber(project, settings);
      const issuerLines = buildIssuerText(settings, currentUser);
      const bankLines = buildBankText(settings);
      const invoiceNote = settings.invoiceNote || "";
      const itemRows = items.map((item) => {
        return `
          <tr>
            <td>${escapeHtml(item.name)}</td>
            <td>1</td>
            <td>${formatAmount(item.price)}</td>
            <td>${formatAmount(item.price)}</td>
          </tr>
        `;
      }).join("");

      invoiceCard.innerHTML = `
        <h1 class="invoice-title">請求書</h1>

        <div class="invoice-header">
          <div class="issuer-box">
            ${issuerLines.length > 0 ? `
              <div class="issuer-name">${escapeHtml(issuerLines[0])}</div>
              ${issuerLines.slice(1).map((line) => `<div>${escapeHtml(line)}</div>`).join("")}
            ` : ""}
          </div>

          <div class="invoice-meta">
            <div>請求書番号: ${escapeHtml(invoiceNumber)}</div>
            <div>発行日: ${issueDate}</div>
            ${dueDate ? `<div>支払期限: ${dueDate}</div>` : ""}
            <div>案件ID: ${escapeHtml(displayId)}</div>
          </div>
        </div>

        <div class="invoice-grid">
          <div class="info-block">
            <div class="info-label">請求先</div>
            <div class="info-value">${escapeHtml(client)} 御中</div>
          </div>
          <div class="info-block">
            <div class="info-label">件名</div>
            <div class="subject">${escapeHtml(title)}</div>
          </div>
        </div>

        <table class="invoice-table">
          <thead>
            <tr>
              <th>品目名</th>
              <th>数量</th>
              <th>単価</th>
              <th>金額</th>
            </tr>
          </thead>
          <tbody>
            ${itemRows}
          </tbody>
        </table>

        <div class="summary">
          <div class="summary-row">
            <span>小計</span>
            <span>${formatAmount(subtotal)}</span>
          </div>
          <div class="summary-row">
            <span>消費税（${safeTaxRate}%）</span>
            <span>${formatAmount(tax)}</span>
          </div>
          <div class="summary-row total">
            <span>合計</span>
            <span>${formatAmount(total)}</span>
          </div>
        </div>

        <div class="invoice-footer">
          <div class="footer-block">
            <p class="footer-title">振込先</p>
            <p class="payment-guide">下記口座へお振込みをお願いいたします。</p>
            <p class="footer-text">${bankLines.length > 0 ? bankLines.map(escapeHtml).join("\n") : "振込先情報は設定されていません。"}</p>
          </div>
          <div class="footer-block">
            <p class="footer-title">備考</p>
            <p class="footer-text">${invoiceNote ? escapeHtml(invoiceNote) : "備考はありません。"}</p>
          </div>
        </div>
      `;
    }

    async function loadInvoice() {
      if (!projectId) {
        showError("URLに案件IDが指定されていません。");
        return;
      }

      backLink.href = "./project-detail.html?id=" + encodeURIComponent(projectId);

      try {
        loading.style.display = "block";
        const [projectSnapshot, userSnapshot] = await Promise.all([
          getDoc(getProjectDocRef()),
          getDoc(getUserDocRef())
        ]);

        if (!projectSnapshot.exists()) {
          showError("指定された案件データが見つかりません。");
          return;
        }

        const settings = userSnapshot.exists() ? userSnapshot.data() : {};
        topAccountName.textContent = settings.userId || user.email || "user";
        renderInvoice(projectSnapshot.data(), settings);
      } catch (error) {
        console.error("請求書データの取得に失敗しました:", error);
        showError("請求書データの取得に失敗しました。");
      } finally {
        loading.style.display = "none";
      }
    }

    backButton.addEventListener("click", () => {
      if (projectId) {
        window.location.href = "./project-detail.html?id=" + encodeURIComponent(projectId);
        return;
      }

      window.location.href = "./projects.html";
    });

    printButton.addEventListener("click", () => {
      window.print();
    });

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "./login.html";
        return;
      }

      currentUser = user;
      loadInvoice();
    });
  </script>
  <script src="./assets/common.js"></script>
</body>
