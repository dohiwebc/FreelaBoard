<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設定 | FreelaBoard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Noto Sans JP", Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      width: 220px;
      height: 100vh;
      padding: 24px 16px;
      background: #0f2a4a;
      color: #ffffff;
    }

    .logo {
      margin: 0 0 28px;
      font-size: 20px;
      font-weight: 700;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 8px;
      color: #dbeafe;
      font-size: 14px;
      font-weight: 700;
    }

    .nav-link:hover,
    .nav-link.active {
      background: #163b68;
      color: #ffffff;
    }

    .nav-icon {
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      font-size: 15px;
    }

    .nav-icon-image {
      width: 16px;
      height: 16px;
      object-fit: contain;
    }

    .logout {
      color: #dbeafe;
      font-size: 14px;
      font-weight: 700;
    }

    .sidebar-account {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: auto;
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
    }

    .sidebar-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .main {
      width: 100%;
      margin-left: 220px;
      padding: 40px;
    }

    .content {
      max-width: 820px;
      margin: 0 auto;
    }

    .page-header {
      margin-bottom: 24px;
    }

    .page-title {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .page-lead {
      margin: 8px 0 0;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.7;
    }

    .settings-card {
      padding: 32px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
    }

    .section-title {
      margin: 0 0 20px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .subsection-title {
      margin: 8px 0 2px;
      padding-top: 22px;
      border-top: 1px solid #e5e7eb;
      color: #111827;
      font-size: 16px;
      letter-spacing: 0;
    }

    .form-field {
      display: grid;
      gap: 8px;
    }

    .form-field.full {
      grid-column: 1 / -1;
    }

    label {
      color: #374151;
      font-size: 14px;
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 44px;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      color: #111827;
      font: inherit;
      font-size: 14px;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.7;
    }

    input[readonly] {
      background: #f9fafb;
      color: #6b7280;
      cursor: not-allowed;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #2563eb;
      outline: none;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    .field-help {
      margin: 0;
      color: #9ca3af;
      font-size: 12px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 28px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border: none;
      border-radius: 8px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary-button {
      background: #123a74;
      color: #ffffff;
    }

    .primary-button:hover {
      background: #0f3264;
    }

    .secondary-button {
      background: #f3f4f6;
      color: #374151;
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .loading,
    .message {
      color: #6b7280;
      font-size: 14px;
      text-align: center;
    }

    .loading {
      padding: 16px 0 0;
    }

    .message {
      min-height: 20px;
      margin: 18px 0 0;
      font-weight: 700;
    }

    .message.success {
      color: #16a34a;
    }

    .message.error {
      color: #dc2626;
    }

    @media (max-width: 820px) {
      .layout {
        display: block;
      }

      .sidebar {
        position: static;
        width: 100%;
        height: auto;
        padding: 18px 16px;
      }

      .logo {
        margin-bottom: 16px;
      }

      .nav {
        grid-template-columns: repeat(10, minmax(0, 1fr));
      }

      .nav-link {
        justify-content: center;
        padding: 10px;
      }

      .nav-icon,
      .logout {
        display: none;
      }

      .main {
        margin-left: 0;
        padding: 24px 16px;
      }

      .settings-card {
        padding: 24px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .actions {
        align-items: stretch;
        flex-direction: column-reverse;
      }
    }

    /* Responsive layout */
    .mobile-header,
    .sidebar-overlay,
    .sidebar-close {
      display: none;
    }

    @media (min-width: 768px) and (max-width: 1023px) {
      .sidebar {
        width: 190px !important;
        padding: 22px 12px !important;
      }

      .main {
        margin-left: 190px !important;
        padding: 28px 22px !important;
      }

      .content {
        max-width: 100% !important;
      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }

      .form-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }

      .table-wrap,
      .invoice-scroll,
      .calendar-scroll {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }

      table {
        min-width: 820px;
      }
    }

    @media (max-width: 767px) {
      body {
        min-width: 0;
      }

      .mobile-header {
        position: sticky;
        top: 0;
        z-index: 80;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 58px;
        padding: 0 16px;
        border-bottom: 1px solid #e5e7eb;
        background: #ffffff;
        box-shadow: 0 8px 18px rgba(17, 24, 39, 0.08);
      }

      .mobile-logo {
        color: #0f2a4a;
        font-size: 17px;
        font-weight: 700;
      }

      .hamburger-button,
      .sidebar-close {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 42px;
        height: 42px;
        border: 0;
        border-radius: 8px;
        background: #eff6ff;
        color: #0f2a4a;
        cursor: pointer;
        font-size: 22px;
        font-weight: 700;
      }

      .sidebar-close {
        position: absolute;
        top: 14px;
        right: 14px;
        background: rgba(255, 255, 255, 0.12);
        color: #ffffff;
      }

      .sidebar-overlay {
        position: fixed;
        inset: 0;
        z-index: 90;
        display: block;
        visibility: hidden;
        background: rgba(15, 23, 42, 0.46);
        opacity: 0;
        transition: opacity 0.2s ease, visibility 0.2s ease;
      }

      body.sidebar-open .sidebar-overlay {
        visibility: visible;
        opacity: 1;
      }

      .layout {
        display: block !important;
        min-height: auto !important;
      }

      .sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        z-index: 100 !important;
        display: flex !important;
        flex-direction: column !important;
        width: min(82vw, 300px) !important;
        height: 100vh !important;
        padding: 24px 16px !important;
        transform: translateX(-105%);
        transition: transform 0.24s ease;
        overflow-y: auto;
      }

      body.sidebar-open .sidebar {
        transform: translateX(0);
      }

      .sidebar .logo {
        margin-right: 44px;
      }

      .nav {
        display: grid !important;
        grid-template-columns: 1fr !important;
        gap: 8px !important;
        overflow: visible !important;
      }

      .nav-link {
        justify-content: flex-start !important;
        min-width: 0 !important;
        min-height: 44px;
        padding: 12px 14px !important;
      }

      .nav-icon {
        display: grid !important;
      }

      .sidebar-account {
        margin-top: auto !important;
      }

      .logout {
        display: inline-flex !important;
        min-height: 44px;
        align-items: center;
      }

      .main {
        width: 100% !important;
        margin-left: 0 !important;
        padding: 22px 16px 32px !important;
      }

      .content {
        max-width: 100% !important;
      }

      .page-header,
      .calendar-controls,
      .toolbar,
      .filter-bar,
      .actions,
      .detail-actions,
      .invoice-actions {
        align-items: stretch !important;
        flex-direction: column !important;
        gap: 12px !important;
      }

      .page-title {
        font-size: 24px !important;
      }

      .page-lead {
        font-size: 14px !important;
      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid,
      .form-grid,
      .filters,
      .toolbar,
      .workspace,
      .invoice-grid,
      .invoice-header,
      .invoice-footer {
        grid-template-columns: 1fr !important;
      }

      .summary-card,
      .table-card,
      .form-card,
      .detail-card,
      .profile-card,
      .settings-card,
      .toolbar-card,
      .calendar-card,
      .week-card,
      .detail-panel,
      .auth-card {
        border-radius: 8px !important;
      }

      input,
      select,
      textarea,
      .button,
      .new-button,
      .primary-button,
      .secondary-button,
      .ghost-button,
      .danger-button,
      .filter-button,
      .clear-button,
      .detail-button,
      .preview-button {
        width: 100%;
        min-height: 44px;
      }

      .table-wrap,
      .invoice-scroll,
      .calendar-scroll {
        width: 100%;
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }

      table {
        min-width: 760px;
      }

      th,
      td {
        white-space: nowrap;
      }

      .item-row,
      .items-row {
        grid-template-columns: 1fr !important;
      }

      .drag-handle {
        width: 100% !important;
        min-height: 34px;
      }

      .calendar-grid {
        min-width: 680px !important;
      }

      .day-cell {
        min-height: 104px !important;
        padding: 8px !important;
      }

      .event-title {
        max-width: 100%;
      }

      .week-row {
        min-width: 720px;
      }

      .invoice-card,
      .invoice-paper {
        min-width: 720px;
      }

      @media print {
        .mobile-header,
        .sidebar-overlay,
        .sidebar-close {
          display: none !important;
        }
      }
    }

    /* Responsive print and scroll safeguards */
    @media print {
      .mobile-header,
      .sidebar-overlay,
      .sidebar-close {
        display: none !important;
      }
    }

    @media (max-width: 767px) {
      .week-card,
      .invoice-card,
      .invoice-paper {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }
    }

    /* Tablet keeps desktop-style sidebar */
    @media (min-width: 768px) and (max-width: 1023px) {
      .layout {
        display: flex !important;
        min-height: 100vh !important;
      }

      .sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        height: 100vh !important;
      }

      .nav {
        grid-template-columns: 1fr !important;
        overflow: visible !important;
      }

      .nav-link {
        justify-content: flex-start !important;
        min-width: 0 !important;
      }

      .nav-icon {
        display: grid !important;
      }

      .logout {
        display: inline-flex !important;
      }
    }

    /* Compact tablet and mobile density */
    @media (min-width: 768px) and (max-width: 1023px) {
      body {
        font-size: 13px;
      }

      .main {
        padding: 22px 18px !important;
      }

      .page-header {
        margin-bottom: 18px !important;
      }

      .page-title {
        font-size: 23px !important;
      }

      .page-lead {
        font-size: 12px !important;
        line-height: 1.55 !important;
      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid {
        gap: 12px !important;
      }

      .summary-card,
      .table-card,
      .form-card,
      .detail-card,
      .profile-card,
      .settings-card,
      .toolbar-card,
      .calendar-card,
      .week-card,
      .detail-panel,
      .auth-card {
        padding: 16px !important;
      }

      .summary-label,
      .card-note,
      .summary-note,
      .detail-label,
      th {
        font-size: 11px !important;
      }

      .summary-value {
        font-size: 20px !important;
      }

      th,
      td {
        padding: 11px 12px !important;
        font-size: 12px !important;
      }

      input,
      select,
      textarea,
      .button,
      .new-button,
      .primary-button,
      .secondary-button,
      .ghost-button,
      .danger-button,
      .filter-button,
      .clear-button,
      .detail-button,
      .preview-button {
        min-height: 38px !important;
        font-size: 12px !important;
      }

      .filter-bar,
      .toolbar,
      .card-header {
        padding: 14px 16px !important;
      }

      .nav-link {
        padding: 10px 12px !important;
        font-size: 12px !important;
      }
    }

    @media (max-width: 767px) {
      body {
        font-size: 12px;
      }

      .mobile-header {
        height: 50px !important;
        padding: 0 12px !important;
      }

      .mobile-logo {
        font-size: 15px !important;
      }

      .hamburger-button,
      .sidebar-close {
        width: 36px !important;
        height: 36px !important;
        font-size: 19px !important;
      }

      .sidebar {
        width: min(78vw, 260px) !important;
        padding: 18px 12px !important;
      }

      .logo {
        font-size: 18px !important;
        margin-bottom: 18px !important;
      }

      .nav-link {
        min-height: 39px !important;
        padding: 9px 11px !important;
        font-size: 12px !important;
        gap: 8px !important;
      }

      .nav-icon {
        width: 18px !important;
        height: 18px !important;
        font-size: 13px !important;
      }

      .sidebar-account {
        padding: 8px 10px !important;
        font-size: 12px !important;
      }

      .sidebar-avatar {
        width: 28px !important;
        height: 28px !important;
      }

      .main {
        padding: 16px 12px 24px !important;
      }

      .page-header {
        margin-bottom: 16px !important;
      }

      .page-title {
        font-size: 21px !important;
      }

      .page-lead {
        font-size: 12px !important;
        line-height: 1.5 !important;
      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid,
      .form-grid,
      .filters {
        gap: 10px !important;
      }

      .summary-card,
      .table-card,
      .form-card,
      .detail-card,
      .profile-card,
      .settings-card,
      .toolbar-card,
      .calendar-card,
      .week-card,
      .detail-panel,
      .auth-card {
        padding: 13px !important;
      }

      .summary-label,
      .summary-note,
      .card-note,
      .detail-label,
      .help-text,
      th {
        font-size: 10.5px !important;
      }

      .summary-value {
        font-size: 18px !important;
      }

      .card-title,
      .form-title,
      .section-title {
        font-size: 14px !important;
      }

      th,
      td {
        padding: 9px 10px !important;
        font-size: 11.5px !important;
      }

      input,
      select,
      textarea,
      .button,
      .new-button,
      .primary-button,
      .secondary-button,
      .ghost-button,
      .danger-button,
      .filter-button,
      .clear-button,
      .detail-button,
      .preview-button {
        min-height: 38px !important;
        padding: 8px 10px !important;
        font-size: 12px !important;
      }

      .filter-bar,
      .toolbar,
      .card-header,
      .calendar-controls {
        padding: 12px !important;
        gap: 9px !important;
      }

      .status,
      .status-badge,
      .tag-badge {
        padding: 4px 8px !important;
        font-size: 10.5px !important;
      }

      .day-cell {
        min-height: 86px !important;
        padding: 6px !important;
      }

      .event-card {
        padding: 6px !important;
      }

      .event-title,
      .event-id,
      .event-days {
        font-size: 10px !important;
      }

      .auth-card {
        width: min(420px, 100%) !important;
      }
    }

    /* Center mobile header logo */
    @media (max-width: 1023px) {
      .mobile-header {
        position: sticky;
        justify-content: center !important;
      }

      .hamburger-button {
        position: absolute;
        left: 12px;
      }

      .mobile-logo {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        white-space: nowrap;
      }
    }

    /* Polished hamburger menu */
    @media (max-width: 1023px) {
      .hamburger-button {
        display: inline-flex !important;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        border: 1px solid #dbeafe !important;
        background: linear-gradient(180deg, #ffffff 0%, #eff6ff 100%) !important;
        color: #0f2a4a !important;
        box-shadow: 0 8px 18px rgba(15, 42, 74, 0.14);
      }

      .hamburger-button span {
        display: block;
        width: 17px;
        height: 2px;
        border-radius: 999px;
        background: #0f2a4a;
        transition: transform 0.2s ease, opacity 0.2s ease, width 0.2s ease;
      }

      .hamburger-button span:nth-child(2) {
        width: 13px;
      }

      .hamburger-button:hover span:nth-child(2) {
        width: 17px;
      }

      body.sidebar-open .hamburger-button span:nth-child(1) {
        transform: translateY(6px) rotate(45deg);
      }

      body.sidebar-open .hamburger-button span:nth-child(2) {
        opacity: 0;
      }

      body.sidebar-open .hamburger-button span:nth-child(3) {
        transform: translateY(-6px) rotate(-45deg);
      }
    }

    /* Polished opened mobile menu */
    @media (max-width: 767px) {
      .sidebar {
        width: min(84vw, 292px) !important;
        padding: 20px 14px 18px !important;
        background: linear-gradient(180deg, #0f2a4a 0%, #123a64 55%, #0b1f38 100%) !important;
        border-radius: 0 18px 18px 0;
        box-shadow: 18px 0 42px rgba(15, 23, 42, 0.28);
      }

      .sidebar .logo {
        display: flex;
        align-items: center;
        min-height: 40px;
        margin: 0 46px 18px 2px !important;
        color: #ffffff;
        font-size: 18px !important;
        letter-spacing: 0.01em;
      }

      .sidebar-close {
        top: 18px !important;
        right: 14px !important;
        width: 34px !important;
        height: 34px !important;
        border: 1px solid rgba(255, 255, 255, 0.16) !important;
        border-radius: 999px !important;
        background: rgba(255, 255, 255, 0.10) !important;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
        font-size: 20px !important;
        line-height: 1;
      }

      .sidebar .nav {
        gap: 6px !important;
        padding: 8px 0 14px;
      }

      .sidebar .nav-link {
        min-height: 42px !important;
        padding: 10px 12px !important;
        border: 1px solid transparent;
        border-radius: 10px !important;
        color: #dbeafe !important;
        background: transparent;
        transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
      }

      .sidebar .nav-link:hover,
      .sidebar .nav-link.active {
        background: rgba(255, 255, 255, 0.12) !important;
        border-color: rgba(255, 255, 255, 0.12);
        color: #ffffff !important;
        transform: translateX(2px);
      }

      .sidebar .nav-icon {
        width: 26px !important;
        height: 26px !important;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.10);
        color: #ffffff;
        font-size: 13px !important;
      }

      .sidebar .nav-link.active .nav-icon {
        background: #ffffff;
        color: #123a64;
      }

      .sidebar-account {
        margin-top: auto !important;
        margin-bottom: 10px !important;
        padding: 10px !important;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 12px !important;
        background: rgba(255, 255, 255, 0.10) !important;
        backdrop-filter: blur(8px);
      }

      .logout {
        justify-content: center;
        min-height: 40px !important;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.08);
        color: #dbeafe !important;
        font-size: 12px !important;
        font-weight: 700;
      }

      .sidebar-overlay {
        background: rgba(2, 6, 23, 0.54) !important;
        backdrop-filter: blur(2px);
      }
    }

    /* Cleaner selected state in mobile menu */
    @media (max-width: 767px) {
      .sidebar .nav-link {
        position: relative;
        border-color: transparent !important;
        box-shadow: none !important;
      }

      .sidebar .nav-link.active {
        background: rgba(255, 255, 255, 0.13) !important;
        border-color: transparent !important;
        box-shadow: inset 3px 0 0 #93c5fd !important;
      }

      .sidebar .nav-link:hover {
        border-color: transparent !important;
        box-shadow: none !important;
      }

      .sidebar .nav-link.active:hover {
        box-shadow: inset 3px 0 0 #93c5fd !important;
      }

      .sidebar .nav-link.active .nav-icon {
        background: rgba(147, 197, 253, 0.22) !important;
        color: #ffffff !important;
      }
    }

    /* Plain mobile menu icons */
    @media (max-width: 767px) {
      .sidebar .nav-icon,
      .sidebar .nav-link.active .nav-icon {
        background: transparent !important;
        border-radius: 0 !important;
        color: currentColor !important;
      }
    }

    /* Motion effects */
    @keyframes fbFadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fbPopIn {
      0% {
        opacity: 0;
        transform: scale(0.88);
      }
      70% {
        transform: scale(1.06);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fbPulseSoft {
      0%, 100% {
        transform: scale(1);
        box-shadow: none;
      }
      50% {
        transform: scale(1.03);
        box-shadow: 0 8px 18px rgba(245, 158, 11, 0.18);
      }
    }

    .summary-card,
    .chart-card,
    .recent-card,
    .table-card,
    .form-card,
    .detail-card,
    .profile-card,
    .settings-card,
    .toolbar-card,
    .calendar-card,
    .week-card,
    .detail-panel,
    .auth-card {
      animation: fbFadeUp 0.85s ease both;
    }

    .summary-card:nth-child(2),
    .chart-card:nth-child(2),
    .form-card + .table-card {
      animation-delay: 0.06s;
    }

    .summary-card:nth-child(3) {
      animation-delay: 0.12s;
    }

    .summary-card:nth-child(4) {
      animation-delay: 0.18s;
    }

    .summary-card:nth-child(5) {
      animation-delay: 0.24s;
    }

    .summary-card:nth-child(6) {
      animation-delay: 0.30s;
    }

    .summary-card:nth-child(7) {
      animation-delay: 0.36s;
    }

    tbody tr,
    .alert-item,
    .week-row,
    .event-card {
      animation: fbFadeUp 0.65s ease both;
    }

    tbody tr:hover,
    .alert-item:hover,
    .event-card:hover,
    .summary-card:hover,
    .chart-card:hover,
    .recent-card:hover {
      transform: translateY(-2px);
      transition: transform 0.32s ease, box-shadow 0.32s ease, background 0.32s ease;
    }

    .status,
    .status-badge,
    .tag-badge {
      transition: transform 0.32s ease, box-shadow 0.32s ease, filter 0.32s ease;
    }

    .status:hover,
    .status-badge:hover,
    .tag-badge:hover {
      transform: translateY(-1px) scale(1.02);
      filter: saturate(1.08);
    }

    .status-waiting,
    .status-overdue,
    .event-card.status-overdue,
    .event-card.status-payment {
      animation: fbPulseSoft 4.2s ease-in-out infinite;
    }

    @media (max-width: 767px) {
      body.sidebar-open .sidebar .nav-link {
        animation: fbFadeUp 0.55s ease both;
      }

      body.sidebar-open .sidebar .nav-link:nth-child(1) { animation-delay: 0.03s; }
      body.sidebar-open .sidebar .nav-link:nth-child(2) { animation-delay: 0.06s; }
      body.sidebar-open .sidebar .nav-link:nth-child(3) { animation-delay: 0.09s; }
      body.sidebar-open .sidebar .nav-link:nth-child(4) { animation-delay: 0.12s; }
      body.sidebar-open .sidebar .nav-link:nth-child(5) { animation-delay: 0.15s; }
      body.sidebar-open .sidebar .nav-link:nth-child(6) { animation-delay: 0.18s; }
      body.sidebar-open .sidebar .nav-link:nth-child(7) { animation-delay: 0.21s; }
      body.sidebar-open .sidebar .nav-link:nth-child(8) { animation-delay: 0.24s; }
      body.sidebar-open .sidebar .nav-link:nth-child(9) { animation-delay: 0.27s; }
      body.sidebar-open .sidebar .nav-link:nth-child(10) { animation-delay: 0.30s; }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }

  </style>
  <link rel="stylesheet" href="./assets/common.css">
</head>
<body>
  <header class="mobile-header">
    <button class="hamburger-button" type="button" aria-label="メニューを開く" aria-controls="appSidebar" aria-expanded="false"><span></span><span></span><span></span></button>
    <span class="mobile-logo">FreelaBoard</span>
  </header>
  <div class="sidebar-overlay" data-sidebar-overlay></div>
  <div class="layout">
    <aside class="sidebar" id="appSidebar">
      
      <button class="sidebar-close" type="button" aria-label="メニューを閉じる">×</button>
      <h1 class="logo">FreelaBoard</h1>

      <nav class="nav" aria-label="メインメニュー">
        <a class="nav-link" href="./dashboard.html">
          <span class="nav-icon">⌂</span>
          <span>ダッシュボード</span>
        </a>
        <a class="nav-link" href="./projects.html">
          <span class="nav-icon">☷</span>
          <span>案件一覧</span>
        </a>
        <a class="nav-link" href="./add-project.html">
          <span class="nav-icon">＋</span>
          <span>案件追加</span>
        </a>
        <a class="nav-link" href="./invoices.html">
          <span class="nav-icon">▤</span>
          <span>請求書一覧</span>
        </a>
        <a class="nav-link" href="./reports.html">
          <span class="nav-icon">↗</span>
          <span>レポート</span>
        </a>
        <a class="nav-link" href="./clients.html">
          <span class="nav-icon">◇</span>
          <span>クライアント管理</span>
        </a>
        <a class="nav-link" href="./tags.html">
          <span class="nav-icon">#</span>
          <span>タグ管理</span>
        </a>
        <a class="nav-link" href="./calendar.html">
          <span class="nav-icon">□</span>
          <span>カレンダー</span>
        </a>
        <a class="nav-link" href="./profile.html">
          <span class="nav-icon"><img class="nav-icon-image" src="./assets/profile-nav-icon.png" alt=""></span>
          <span>プロフィール</span>
        </a>
        <a class="nav-link active" href="./settings.html" aria-current="page">
          <span class="nav-icon">⚙</span>
          <span>設定</span>
        </a>
      </nav>
      <div class="sidebar-account">
        <img class="sidebar-avatar" src="./assets/iconfree.jpg" alt="プロフィール画像">
        <span id="topAccountName">user</span>
      </div>
      <a class="logout" href="./login.html">ログアウト</a>
    </aside>

    <main class="main">
      <div class="content">
        <header class="page-header">
          <h2 class="page-title">設定</h2>
          <p class="page-lead">プロフィールと請求書に使う基本情報を管理できます。</p>
        </header>

        <section class="settings-card" aria-label="設定フォーム">
          <h3 class="section-title">アカウント・請求書情報</h3>

          <form id="settingsForm">
            <div class="form-grid">
              <div class="form-field">
                <label for="userId">ユーザーID</label>
                <input id="userId" name="userId" type="text" placeholder="freela_taro">
              </div>

              <div class="form-field">
                <label for="email">メールアドレス</label>
                <input id="email" name="email" type="email" readonly>
              </div>

              <div class="form-field">
                <label for="taxRate">税率（%）</label>
                <input id="taxRate" name="taxRate" type="number" min="0" step="0.1" placeholder="10">
                <p class="field-help">未入力でも保存できます。未設定の場合は10%として扱います。</p>
              </div>

              <div class="form-field">
                <label for="companyName">会社名</label>
                <input id="companyName" name="companyName" type="text" placeholder="Freela Design">
              </div>

              <div class="form-field">
                <label for="tradeName">屋号</label>
                <input id="tradeName" name="tradeName" type="text" placeholder="Freela Studio">
              </div>

              <div class="form-field">
                <label for="phone">電話番号</label>
                <input id="phone" name="phone" type="tel" placeholder="090-0000-0000">
              </div>

              <div class="form-field full">
                <label for="address">住所</label>
                <textarea id="address" name="address" placeholder="東京都渋谷区..."></textarea>
              </div>

              <div class="form-field full">
                <h4 class="subsection-title">請求書設定</h4>
              </div>

              <div class="form-field">
                <label for="invoiceNameType">請求書に載せる名前</label>
                <select id="invoiceNameType" name="invoiceNameType">
                  <option value="tradeName">屋号</option>
                  <option value="userId">ユーザーID</option>
                </select>
                <p class="field-help">屋号が未入力の場合はユーザーIDを表示します。</p>
              </div>

              <div class="form-field">
                <label for="invoiceNumberPrefix">請求書番号の接頭辞</label>
                <input id="invoiceNumberPrefix" name="invoiceNumberPrefix" type="text" placeholder="INV">
                <p class="field-help">例：INV-001 のような番号に使う文字です。</p>
              </div>

              <div class="form-field">
                <label for="registrationNumber">適格請求書登録番号</label>
                <input id="registrationNumber" name="registrationNumber" type="text" placeholder="T1234567890123">
              </div>

              <div class="form-field">
                <label for="paymentDueDays">支払期限（日数）</label>
                <input id="paymentDueDays" name="paymentDueDays" type="number" min="0" step="1" placeholder="30">
                <p class="field-help">請求日から何日後を支払期限にするかを保存します。</p>
              </div>

              <div class="form-field full">
                <h4 class="subsection-title">振込先情報</h4>
              </div>

              <div class="form-field">
                <label for="bankName">銀行名</label>
                <input id="bankName" name="bankName" type="text" placeholder="〇〇銀行">
              </div>

              <div class="form-field">
                <label for="bankBranch">支店名</label>
                <input id="bankBranch" name="bankBranch" type="text" placeholder="渋谷支店">
              </div>

              <div class="form-field">
                <label for="bankAccountType">口座種別</label>
                <input id="bankAccountType" name="bankAccountType" type="text" placeholder="普通">
              </div>

              <div class="form-field">
                <label for="bankAccountNumber">口座番号</label>
                <input id="bankAccountNumber" name="bankAccountNumber" type="text" placeholder="1234567">
              </div>

              <div class="form-field">
                <label for="bankAccountName">口座名義</label>
                <input id="bankAccountName" name="bankAccountName" type="text" placeholder="フリーラ タロウ">
              </div>

              <div class="form-field full">
                <label for="invoiceNote">請求書備考</label>
                <textarea id="invoiceNote" name="invoiceNote" placeholder="お振込み手数料はご負担ください。"></textarea>
              </div>
            </div>

            <div class="actions">
              <a class="button secondary-button" href="./dashboard.html">戻る</a>
              <button class="button primary-button" id="saveButton" type="submit">保存</button>
            </div>

            <div class="loading" id="loading">Loading...</div>
            <p class="message" id="message"></p>
          </form>
        </section>
      </div>
    </main>
  </div>

  <script type="module">
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { doc, getDoc, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { auth, db } from "./firebase.js";

    const settingsForm = document.getElementById("settingsForm");
    const userIdInput = document.getElementById("userId");
    const emailInput = document.getElementById("email");
    const taxRateInput = document.getElementById("taxRate");
    const companyNameInput = document.getElementById("companyName");
    const tradeNameInput = document.getElementById("tradeName");
    const addressInput = document.getElementById("address");
    const phoneInput = document.getElementById("phone");
    const invoiceNameTypeInput = document.getElementById("invoiceNameType");
    const invoiceNumberPrefixInput = document.getElementById("invoiceNumberPrefix");
    const registrationNumberInput = document.getElementById("registrationNumber");
    const paymentDueDaysInput = document.getElementById("paymentDueDays");
    const bankNameInput = document.getElementById("bankName");
    const bankBranchInput = document.getElementById("bankBranch");
    const bankAccountTypeInput = document.getElementById("bankAccountType");
    const bankAccountNumberInput = document.getElementById("bankAccountNumber");
    const bankAccountNameInput = document.getElementById("bankAccountName");
    const invoiceNoteInput = document.getElementById("invoiceNote");
    const saveButton = document.getElementById("saveButton");
    const loading = document.getElementById("loading");
    const message = document.getElementById("message");
    const topAccountName = document.getElementById("topAccountName");

    let currentUser = null;

    function getUserDocRef() {
      return doc(db, "users", currentUser.uid);
    }

    function showMessage(text, type = "") {
      message.textContent = text;
      message.className = "message " + type;
    }

    function setLoading(isLoading) {
      loading.style.display = isLoading ? "block" : "none";
      saveButton.disabled = isLoading;
      saveButton.textContent = isLoading ? "保存中..." : "保存";
    }

    function fillForm(user, profile = {}) {
      userIdInput.value = profile.userId || "";
      emailInput.value = profile.email || user.email || "";
      taxRateInput.value = profile.taxRate ?? 10;
      companyNameInput.value = profile.companyName || "";
      tradeNameInput.value = profile.tradeName || "";
      addressInput.value = profile.address || "";
      phoneInput.value = profile.phone || "";
      invoiceNameTypeInput.value = profile.invoiceNameType || "tradeName";
      invoiceNumberPrefixInput.value = profile.invoiceNumberPrefix || "";
      registrationNumberInput.value = profile.registrationNumber || "";
      paymentDueDaysInput.value = profile.paymentDueDays ?? "";
      bankNameInput.value = profile.bankName || "";
      bankBranchInput.value = profile.bankBranch || "";
      bankAccountTypeInput.value = profile.bankAccountType || "";
      bankAccountNumberInput.value = profile.bankAccountNumber || "";
      bankAccountNameInput.value = profile.bankAccountName || "";
      invoiceNoteInput.value = profile.invoiceNote || "";
      topAccountName.textContent = profile.userId || user.email || "user";
    }

    async function loadSettings(user) {
      currentUser = user;
      setLoading(true);
      showMessage("");

      try {
        const userSnapshot = await getDoc(getUserDocRef());

        if (userSnapshot.exists()) {
          fillForm(user, userSnapshot.data());
          return;
        }

        // users/{uid} がまだない場合でも、画面は確認できる状態にします。
        fillForm(user, { email: user.email, taxRate: 10 });
        showMessage("プロフィール情報がまだありません。保存できない場合はプロフィールページで一度保存してください。", "error");
      } catch (error) {
        console.error("設定情報の取得に失敗しました:", error);
        showMessage("設定情報の取得に失敗しました", "error");
      } finally {
        setLoading(false);
      }
    }

    settingsForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!currentUser) {
        window.location.href = "./login.html";
        return;
      }

      const taxRateText = taxRateInput.value.trim();
      const taxRate = taxRateText === "" ? null : Number(taxRateText);
      const paymentDueDaysText = paymentDueDaysInput.value.trim();
      const paymentDueDays = paymentDueDaysText === "" ? null : Number(paymentDueDaysText);

      if (taxRateText !== "" && Number.isNaN(taxRate)) {
        showMessage("税率は数値で入力してください", "error");
        return;
      }

      if (paymentDueDaysText !== "" && Number.isNaN(paymentDueDays)) {
        showMessage("支払期限は数値で入力してください", "error");
        return;
      }

      setLoading(true);
      showMessage("");

      try {
        // Authenticationのメールアドレスは表示用として使い、編集はしません。
        await updateDoc(getUserDocRef(), {
          userId: userIdInput.value.trim(),
          email: currentUser.email || emailInput.value,
          taxRate,
          companyName: companyNameInput.value.trim(),
          tradeName: tradeNameInput.value.trim(),
          address: addressInput.value.trim(),
          phone: phoneInput.value.trim(),
          invoiceNameType: invoiceNameTypeInput.value,
          invoiceNumberPrefix: invoiceNumberPrefixInput.value.trim(),
          registrationNumber: registrationNumberInput.value.trim(),
          paymentDueDays,
          bankName: bankNameInput.value.trim(),
          bankBranch: bankBranchInput.value.trim(),
          bankAccountType: bankAccountTypeInput.value.trim(),
          bankAccountNumber: bankAccountNumberInput.value.trim(),
          bankAccountName: bankAccountNameInput.value.trim(),
          invoiceNote: invoiceNoteInput.value.trim(),
          updatedAt: serverTimestamp()
        });

        topAccountName.textContent = userIdInput.value.trim() || currentUser.email || "user";
        showMessage("設定を保存しました", "success");
      } catch (error) {
        console.error("設定の保存に失敗しました:", error);
        showMessage("設定の保存に失敗しました。ユーザー情報が未作成の場合は、プロフィールページで一度保存してください。", "error");
      } finally {
        setLoading(false);
      }
    });

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "./login.html";
        return;
      }

      loadSettings(user);
    });
  </script>
  <script src="./assets/common.js"></script>
</body>
