<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案件一覧 | FreelaBoard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Noto Sans JP", Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      width: 220px;
      height: 100vh;
      padding: 24px 16px;
      background: #0f2a4a;
      color: #ffffff;
    }

    .logo {
      margin: 0 0 28px;
      font-size: 20px;
      font-weight: 700;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 8px;
      color: #dbeafe;
      font-size: 14px;
      font-weight: 700;
    }

    .nav-link:hover,
    .nav-link.active {
      background: #163b68;
      color: #ffffff;
    }

    .nav-icon {
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      font-size: 15px;
    }

    .nav-icon-image {
      width: 16px;
      height: 16px;
      object-fit: contain;
    }

    .logout {
      color: #dbeafe;
      font-size: 14px;
      font-weight: 700;
    }

    .sidebar-account {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: auto;
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
    }

    .sidebar-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .main {
      width: 100%;
      margin-left: 220px;
      padding: 40px;
    }

    .content {
      max-width: 1100px;
      margin: 0 auto;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .page-title {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .new-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 8px;
      background: #123a74;
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(18, 58, 116, 0.22);
    }

    .new-button:hover {
      background: #0f3264;
    }

    .table-card {
      overflow: hidden;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
    }

    .filter-bar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 26px;
      padding: 18px 20px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .search-wrap {
      padding: 18px 20px 0;
    }

    .search-input {
      width: 100%;
      height: 42px;
      padding: 0 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      color: #111827;
      font: inherit;
      font-size: 14px;
    }

    .search-input:focus {
      border-color: #2563eb;
      outline: none;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    .filter-buttons {
      display: flex;
      flex: 1;
      gap: 26px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filter-buttons::-webkit-scrollbar {
      display: none;
    }

    .filter-button {
      position: relative;
      padding: 0 0 16px;
      border: none;
      background: transparent;
      color: #6b7280;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
    }

    .filter-button:hover,
    .filter-button.active {
      color: #2563eb;
    }

    .filter-button.active::after {
      position: absolute;
      right: 0;
      bottom: -1px;
      left: 0;
      height: 3px;
      border-radius: 999px 999px 0 0;
      background: #2563eb;
      content: "";
    }

    .sort-select {
      min-width: 128px;
      height: 38px;
      margin-top: -10px;
      padding: 0 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
      color: #374151;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 920px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 18px 20px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      background: #f9fafb;
      color: #374151;
      font-size: 13px;
      font-weight: 700;
    }

    tbody tr:hover {
      background: #f9fafb;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .project-name {
      font-weight: 700;
    }

    .amount {
      font-weight: 700;
      white-space: nowrap;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-width: 130px;
    }

    .tag-badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: #dbeafe;
      color: #2563eb;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .tag-empty {
      color: #9ca3af;
      font-size: 12px;
      font-weight: 700;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 78px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .status-consulting {
      background: #f3f4f6;
      color: #6b7280;
    }

    .status-progress {
      background: #dbeafe;
      color: #2563eb;
    }

    .status-delivered {
      background: #ede9fe;
      color: #7c3aed;
    }

    .status-waiting {
      background: #ffedd5;
      color: #f97316;
    }

    .status-done {
      background: #dcfce7;
      color: #16a34a;
    }

    .status-default {
      background: #f3f4f6;
      color: #6b7280;
    }

    .action-buttons {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .action-button,
    .delete-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 7px 12px;
      border: none;
      border-radius: 8px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .detail-button {
      background: #dbeafe;
      color: #2563eb;
    }

    .detail-button:hover {
      background: #bfdbfe;
    }

    .edit-button {
      background: #f3f4f6;
      color: #374151;
    }

    .edit-button:hover {
      background: #e5e7eb;
    }

    .delete-button {
      background: #fee2e2;
      color: #dc2626;
    }

    .delete-button:hover {
      background: #fecaca;
    }

    .delete-button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .message {
      padding: 48px 20px;
      color: #6b7280;
      text-align: center;
      font-size: 14px;
    }

    .loading,
    .empty {
      padding: 40px 20px;
      color: #6b7280;
      text-align: center;
      font-size: 14px;
    }

    .empty {
      display: none;
    }

    .table-footer {
      padding: 14px 20px;
      border-top: 1px solid #e5e7eb;
      color: #6b7280;
      font-size: 13px;
    }

    @media (max-width: 820px) {
      .layout {
        display: block;
      }

      .sidebar {
        position: static;
        width: 100%;
        height: auto;
        padding: 18px 16px;
      }

      .logo {
        margin-bottom: 16px;
      }

      .nav {
        grid-template-columns: repeat(10, minmax(0, 1fr));
      }

      .nav-link {
        justify-content: center;
        padding: 10px;
      }

      .nav-icon,
      .logout {
        display: none;
      }

      .main {
        margin-left: 0;
        padding: 24px 16px;
      }

      .page-header {
        align-items: stretch;
        flex-direction: column;
      }

      .page-title {
        font-size: 24px;
      }

      .filter-bar {
        flex-direction: column;
        gap: 14px;
        padding-bottom: 16px;
      }

      .sort-select {
        width: 100%;
        margin-top: 0;
      }

    }

    /* Responsive layout */
    .mobile-header,
    .sidebar-overlay,
    .sidebar-close {
      display: none;
    }

    @media (min-width: 768px) and (max-width: 1023px) {
      .sidebar {
        width: 190px !important;
        padding: 22px 12px !important;
      }

      .main {
        margin-left: 190px !important;
        padding: 28px 22px !important;
      }

      .content {
        max-width: 100% !important;
      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }

      .form-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }

      .table-wrap,
      .invoice-scroll,
      .calendar-scroll {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }

      table {
        min-width: 820px;
      }
    }

    @media (max-width: 767px) {
      body {
        min-width: 0;
      }

      .mobile-header {
        position: sticky;
        top: 0;
        z-index: 80;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 58px;
        padding: 0 16px;
        border-bottom: 1px solid #e5e7eb;
        background: #ffffff;
        box-shadow: 0 8px 18px rgba(17, 24, 39, 0.08);
      }

      .mobile-logo {
        color: #0f2a4a;
        font-size: 17px;
        font-weight: 700;
      }

      .hamburger-button,
      .sidebar-close {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 42px;
        height: 42px;
        border: 0;
        border-radius: 8px;
        background: #eff6ff;
        color: #0f2a4a;
        cursor: pointer;
        font-size: 22px;
        font-weight: 700;
      }

      .sidebar-close {
        position: absolute;
        top: 14px;
        right: 14px;
        background: rgba(255, 255, 255, 0.12);
        color: #ffffff;
      }

      .sidebar-overlay {
        position: fixed;
        inset: 0;
        z-index: 90;
        display: block;
        visibility: hidden;
        background: rgba(15, 23, 42, 0.46);
        opacity: 0;
        transition: opacity 0.2s ease, visibility 0.2s ease;
      }

      body.sidebar-open .sidebar-overlay {
        visibility: visible;
        opacity: 1;
      }

      .layout {
        display: block !important;
        min-height: auto !important;
      }

      .sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        z-index: 100 !important;
        display: flex !important;
        flex-direction: column !important;
        width: min(82vw, 300px) !important;
        height: 100vh !important;
        padding: 24px 16px !important;
        transform: translateX(-105%);
        transition: transform 0.24s ease;
        overflow-y: auto;
      }

      body.sidebar-open .sidebar {
        transform: translateX(0);
      }

      .sidebar .logo {
        margin-right: 44px;
      }

      .nav {
        display: grid !important;
        grid-template-columns: 1fr !important;
        gap: 8px !important;
        overflow: visible !important;
      }

      .nav-link {
        justify-content: flex-start !important;
        min-width: 0 !important;
        min-height: 44px;
        padding: 12px 14px !important;
      }

      .nav-icon {
        display: grid !important;
      }

      .sidebar-account {
        margin-top: auto !important;
      }

      .logout {
        display: inline-flex !important;
        min-height: 44px;
        align-items: center;
      }

      .main {
        width: 100% !important;
        margin-left: 0 !important;
        padding: 22px 16px 32px !important;
      }

      .content {
        max-width: 100% !important;
      }

      .page-header,
      .calendar-controls,
      .toolbar,
      .filter-bar,
      .actions,
      .detail-actions,
      .invoice-actions {
        align-items: stretch !important;
        flex-direction: column !important;
        gap: 12px !important;
      }

      .page-title {
        font-size: 24px !important;
      }

      .page-lead {
        font-size: 14px !important;
      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid,
      .form-grid,
      .filters,
      .toolbar,
      .workspace,
      .invoice-grid,
      .invoice-header,
      .invoice-footer {
        grid-template-columns: 1fr !important;
      }

      .summary-card,
      .table-card,
      .form-card,
      .detail-card,
      .profile-card,
      .settings-card,
      .toolbar-card,
      .calendar-card,
      .week-card,
      .detail-panel,
      .auth-card {
        border-radius: 8px !important;
      }

      input,
      select,
      textarea,
      .button,
      .new-button,
      .primary-button,
      .secondary-button,
      .ghost-button,
      .danger-button,
      .filter-button,
      .clear-button,
      .detail-button,
      .preview-button {
        width: 100%;
        min-height: 44px;
      }

      .table-wrap,
      .invoice-scroll,
      .calendar-scroll {
        width: 100%;
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }

      table {
        min-width: 760px;
      }

      th,
      td {
        white-space: nowrap;
      }

      .item-row,
      .items-row {
        grid-template-columns: 1fr !important;
      }

      .drag-handle {
        width: 100% !important;
        min-height: 34px;
      }

      .calendar-grid {
        min-width: 680px !important;
      }

      .day-cell {
        min-height: 104px !important;
        padding: 8px !important;
      }

      .event-title {
        max-width: 100%;
      }

      .week-row {
        min-width: 720px;
      }

      .invoice-card,
      .invoice-paper {
        min-width: 720px;
      }

      @media print {
        .mobile-header,
        .sidebar-overlay,
        .sidebar-close {
          display: none !important;
        }
      }
    }

    /* Responsive print and scroll safeguards */
    @media print {
      .mobile-header,
      .sidebar-overlay,
      .sidebar-close {
        display: none !important;
      }
    }

    @media (max-width: 767px) {
      .week-card,
      .invoice-card,
      .invoice-paper {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }
    }

    /* Tablet keeps desktop-style sidebar */
    @media (min-width: 768px) and (max-width: 1023px) {
      .layout {
        display: flex !important;
        min-height: 100vh !important;
      }

      .sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        height: 100vh !important;
      }

      .nav {
        grid-template-columns: 1fr !important;
        overflow: visible !important;
      }

      .nav-link {
        justify-content: flex-start !important;
        min-width: 0 !important;
      }

      .nav-icon {
        display: grid !important;
      }

      .logout {
        display: inline-flex !important;
      }
    }

    /* Compact tablet and mobile density */
    @media (min-width: 768px) and (max-width: 1023px) {
      body {
        font-size: 13px;
      }

      .main {
        padding: 22px 18px !important;
      }

      .page-header {
        margin-bottom: 18px !important;
      }

      .page-title {
        font-size: 23px !important;
      }

      .page-lead {
        font-size: 12px !important;
        line-height: 1.55 !important;
      }

      .summary-grid,
      .stats-grid,
      .cards-grid,
      .report-grid,
      .settings-grid,
      .dashboard-grid {
        gap: 12px !important;
      }

      .summary-card,
      .table-card,
      .form-card,
      .detail-card,
      .profile-card,
      .settings-card,
      .toolbar-card,
      .calendar-card,
      .week-card,
      .detail-panel,
      .auth-card {
        padding: 16px !important;
      }

      .summary-label,
      .card-note,
      .summary-note,
      .detail-label,
      th {
        font-size: 11px !important;
      }

      .summary-value {
        font-size: 20px !important;
      }

      th,
      td {
        padding: 11px 12px !important;
        font-size: 12px !important;
      }

      input,
      select,
      textarea,
      .button,
      .new-button,
      .primary-button,
      .secondary-button,
      .ghost-button,
      .danger-button,
      .filter-button,
      .clear-button,
      .detail-button,
      .preview-button {
        min-height: 38px !important;
        font-size: 12px !important;
      }

      .filter-bar,
      .toolbar,
      .card-header {
        padding: 14px 16px !important;
      }

      .nav-link {
        padding: 10px 12px !important;
        font-size: 12px !important;
      }
    }

    @media (max-width: 767px) {
      body {
        font-size: 12px;
      }

      .mobile-header {
        height: 50px !important;
        padding: 0 12px !important;
      }

      .mobile-logo {
        font-size: 15px !important;
      }

      .hamburger-button,
      .sidebar-close {
        width: 36px !important;
        height: 36px !important;
        font-size: 19px !important;
      }

      .sidebar {
        width: min(78vw, 260px) !important;
        padding: 18px 12px !important;
      }

      .logo {

        margin-bottom: 18px !important;
      }

      .nav-link {
        min-height: 39px !important;
        padding: 9px 11px !important;
        font-size: 12px !important;
        gap: 8px !important;
      }

      .nav-icon {
        width: 18px !important;
        height: 18px !important;
        font-size: 13px !important;
      }

      .sidebar-account {
        padding: 8px 10px !important;

      }

      .sidebar-avatar {

        height: 28px !important;
      }

      .main {
        padding: 16px 12px 24px !important;
      }

      .page-header {
        margin-bottom: 16px !important;
      }

      .page-title {
        font-size: 21px !important;
      }

      }

      .stats-grid,
      .cards-grid,

      }

      .summary-card,
      .table-card,
      .form-card,
      .detail-card,
      .profile-card,
      .settings-card,
      .toolbar-card,
      .calendar-card,
      .week-card,
      .detail-panel,
      .auth-card {
        padding: 13px !important;
      }

      .summary-label,
      .summary-note,
      .card-note,
      .detail-label,
      .help-text,
      th {
        font-size: 10.5px !important;
      }

      .summary-value {
        font-size: 18px !important;
      }

      .card-title,
      .form-title,
      .section-title {
        font-size: 14px !important;
      }

      th,
      td {
        padding: 9px 10px !important;
        font-size: 11.5px !important;
      }

      input,
      select,
      textarea,
      .button,
      .new-button,
      .primary-button,
      .secondary-button,
      .ghost-button,
      .danger-button,
      .filter-button,
      .clear-button,
      .detail-button,
      .preview-button {
        min-height: 38px !important;
        padding: 8px 10px !important;
        font-size: 12px !important;
      }

      .filter-bar,
      .toolbar,
      .card-header,
      .calendar-controls {
        padding: 12px !important;
        gap: 9px !important;
      }

      .status-badge,
      .tag-badge {
        padding: 4px 8px !important;
        font-size: 10.5px !important;
      }

      .day-cell {
        min-height: 86px !important;
        padding: 6px !important;
      }

      .event-card {
        padding: 6px !important;
      }

      .event-title,
      .event-id,
      .event-days {
        font-size: 10px !important;
      }

      .auth-card {
        width: min(420px, 100%) !important;
      }

    /* Small top-right create button */
    .page-header {
      position: relative;
      align-items: flex-start !important;
      padding-right: 132px;
    }

    .page-header .new-button {
      position: absolute;
      top: 0;
      right: 0;
      width: auto !important;
      min-height: 32px !important;
      padding: 0 12px !important;
      border-radius: 7px !important;
      font-size: 12px !important;

  <script type="module">
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { collection, deleteDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { auth, db } from "./firebase.js";

    const tableBody = document.getElementById("projectTableBody");
    const projectCount = document.getElementById("projectCount");
    const loading = document.getElementById("loading");
    const tableWrap = document.getElementById("tableWrap");
    const emptyMessage = document.getElementById("emptyMessage");
    const searchInput = document.getElementById("searchInput");
    const filterButtons = document.querySelectorAll(".filter-button");
    const sortSelect = document.getElementById("sortSelect");
    const params = new URLSearchParams(window.location.search);
    const selectedClient = params.get("client") || "";
    let allProjects = [];
    let currentStatus = "すべて";
    let currentUser = null;
    let currentKeyword = selectedClient;

    searchInput.value = selectedClient;

    function getProjectDocRef(projectId) {
      return doc(db, "users", currentUser.uid, "projects", projectId);
    }

    // Firestoreのフィールド名が少し違っても表示できるようにします。
    function pickValue(project, keys, defaultValue = "-") {
      for (const key of keys) {
        if (project[key] !== undefined && project[key] !== null && project[key] !== "") {
          return project[key];
        }
      }

      return defaultValue;
    }

    // 金額を「¥100,000」の形式に変換します。
    function formatAmount(amount) {
      const numberAmount = Number(amount || 0);
      return "¥" + numberAmount.toLocaleString("ja-JP");
    }

    // Firestore Timestamp、Date、文字列の日付を表示用に整えます。
    function formatDeadline(deadline) {
      if (!deadline) {
        return "-";
      }

      const date = typeof deadline.toDate === "function"
        ? deadline.toDate()
        : new Date(deadline);

      if (Number.isNaN(date.getTime())) {
        return String(deadline);
      }

      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}/${month}/${day}`;
    }

    function toTime(value) {
      if (!value) {
        return 0;
      }

      const date = typeof value.toDate === "function" ? value.toDate() : new Date(value);

      if (Number.isNaN(date.getTime())) {
        return 0;
      }

      return date.getTime();
    }

    function getProjectDate(project) {
      return pickValue(project, ["createdAt", "created_at", "updatedAt", "deadline", "dueDate"], "");
    }

    function getProjectTotal(project) {
      if (project.totalPrice !== undefined && project.totalPrice !== null) {
        return Number(project.totalPrice || 0);
      }

      return Number(pickValue(project, ["amount", "price", "fee"], 0));
    }

    function getProjectDeadline(project) {
      return pickValue(project, ["deadline", "dueDate", "endDate"], "");
    }

    // ステータスごとの色分けクラスを返します。
    function getStatusClass(status) {
      if (status === "相談中") {
        return "status-consulting";
      }

      if (status === "進行中") {
        return "status-progress";
      }

      if (status === "納品済み") {
        return "status-delivered";
      }

      if (status === "入金待ち") {
        return "status-waiting";
      }

      if (status === "完了") {
        return "status-done";
      }

      return "status-default";
    }

    function showMessage(message) {
      tableBody.innerHTML = "";

      const row = document.createElement("tr");
      const cell = document.createElement("td");

      cell.className = "message";
      cell.colSpan = 8;
      cell.textContent = message;

      row.appendChild(cell);
      tableBody.appendChild(row);
    }

    function addTextCell(row, text, className = "") {
      const cell = document.createElement("td");

      if (className) {
        cell.className = className;
      }

      cell.textContent = text;
      row.appendChild(cell);
    }

    function addTagsCell(row, tags) {
      const cell = document.createElement("td");
      const tagList = document.createElement("div");

      tagList.className = "tag-list";

      if (!Array.isArray(tags) || tags.length === 0) {
        const empty = document.createElement("span");
        empty.className = "tag-empty";
        empty.textContent = "タグなし";
        tagList.appendChild(empty);
      } else {
        tags.forEach((tagName) => {
          const badge = document.createElement("span");
          badge.className = "tag-badge";
          badge.textContent = tagName;
          tagList.appendChild(badge);
        });
      }

      cell.appendChild(tagList);
      row.appendChild(cell);
    }

    function createProjectRow(project) {
      const row = document.createElement("tr");
      const displayId = pickValue(project, ["displayId"], "未設定");
      const name = pickValue(project, ["name", "title", "projectName"]);
      const client = pickValue(project, ["client", "clientName"]);
      const tags = Array.isArray(project.tags) ? project.tags : [];
      const totalPrice = getProjectTotal(project);
      const status = pickValue(project, ["status"]);
      const deadline = pickValue(project, ["deadline", "dueDate", "endDate"], "");

      addTextCell(row, displayId);
      addTextCell(row, name, "project-name");
      addTextCell(row, client);
      addTagsCell(row, tags);
      addTextCell(row, formatAmount(totalPrice), "amount");

      const statusCell = document.createElement("td");
      const statusBadge = document.createElement("span");
      statusBadge.className = "status " + getStatusClass(status);
      statusBadge.textContent = status;
      statusCell.appendChild(statusBadge);
      row.appendChild(statusCell);

      addTextCell(row, formatDeadline(deadline));

      const actionCell = document.createElement("td");
      const actionButtons = document.createElement("div");
      const detailButton = document.createElement("a");
      const editButton = document.createElement("a");
      const deleteButton = document.createElement("button");
      const projectId = encodeURIComponent(project.id);

      actionButtons.className = "action-buttons";

      detailButton.className = "action-button detail-button";
      detailButton.href = "./project-detail.html?id=" + projectId;
      detailButton.textContent = "詳細";

      editButton.className = "action-button edit-button";
      editButton.href = "./edit-project.html?id=" + projectId;
      editButton.textContent = "編集";

      deleteButton.className = "delete-button";
      deleteButton.type = "button";
      deleteButton.textContent = "削除";
      deleteButton.addEventListener("click", () => {
        deleteProject(project.id, name);
      });

      actionButtons.appendChild(detailButton);
      actionButtons.appendChild(editButton);
      actionButtons.appendChild(deleteButton);
      actionCell.appendChild(actionButtons);
      row.appendChild(actionCell);

      return row;
    }

    function getProjectStatus(project) {
      return pickValue(project, ["status"]);
    }

    function renderProjects() {
      const keyword = currentKeyword.trim().toLowerCase();
      const filteredProjects = allProjects.filter((project) => {
        const statusMatched = currentStatus === "すべて" || getProjectStatus(project) === currentStatus;
        const name = String(pickValue(project, ["title", "name", "projectName"], "")).toLowerCase();
        const client = String(pickValue(project, ["client", "clientName"], "")).toLowerCase();
        const tags = Array.isArray(project.tags) ? project.tags.join(" ").toLowerCase() : "";
        const exactClientMatched = selectedClient === "" || searchInput.value.trim() !== selectedClient || client === selectedClient.toLowerCase();
        const keywordMatched = keyword === "" || name.includes(keyword) || client.includes(keyword) || tags.includes(keyword);

        return statusMatched && exactClientMatched && keywordMatched;
      });
      const sortedProjects = [...filteredProjects].sort((projectA, projectB) => {
        if (sortSelect.value === "deadlineAsc") {
          return toTime(getProjectDeadline(projectA)) - toTime(getProjectDeadline(projectB));
        }

        if (sortSelect.value === "amountDesc") {
          return getProjectTotal(projectB) - getProjectTotal(projectA);
        }

        if (sortSelect.value === "amountAsc") {
          return getProjectTotal(projectA) - getProjectTotal(projectB);
        }

        return toTime(getProjectDate(projectB)) - toTime(getProjectDate(projectA));
      });

      if (allProjects.length === 0) {
        tableWrap.style.display = "none";
        emptyMessage.style.display = "block";
        projectCount.textContent = "0件";
        return;
      }

      if (sortedProjects.length === 0) {
        tableWrap.style.display = "block";
        emptyMessage.style.display = "none";
        showMessage(currentStatus + "の案件がありません");
        projectCount.textContent = "0 / " + allProjects.length + "件";
        return;
      }

      tableWrap.style.display = "block";
      emptyMessage.style.display = "none";
      tableBody.innerHTML = "";

      sortedProjects.forEach((project) => {
        tableBody.appendChild(createProjectRow(project));
      });

      projectCount.textContent = sortedProjects.length + " / " + allProjects.length + "件";
    }

    function setActiveFilter(selectedButton) {
      filterButtons.forEach((button) => {
        button.classList.remove("active");
      });

      selectedButton.classList.add("active");
      currentStatus = selectedButton.dataset.status;
      renderProjects();
    }

    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setActiveFilter(button);
      });
    });

    sortSelect.addEventListener("change", () => {
      renderProjects();
    });

    searchInput.addEventListener("input", () => {
      currentKeyword = searchInput.value;
      renderProjects();
    });

    async function deleteProject(projectId, projectName) {
      const shouldDelete = await window.FreelaBoard.showConfirmDialog({
        title: "案件を削除",
        message: `${projectName} を削除します。この操作は元に戻せません。`,
        confirmText: "削除する",
        tone: "danger"
      });

      if (!shouldDelete) {
        return;
      }

      try {
        await deleteDoc(getProjectDocRef(projectId));
        await loadProjects();
      } catch (error) {
        console.error("案件の削除に失敗しました:", error);
        alert("案件の削除に失敗しました");
      }
    }

    async function loadProjects() {
      loading.style.display = "block";
      tableWrap.style.display = "none";
      emptyMessage.style.display = "none";

      try {
        const querySnapshot = await getDocs(collection(db, "users", currentUser.uid, "projects"));

        allProjects = querySnapshot.docs.map((projectDoc) => {
          return {
            ...projectDoc.data(),
            id: projectDoc.id
          };
        });
        renderProjects();
      } catch (error) {
        console.error("案件の取得に失敗しました:", error);
        showMessage("案件の取得に失敗しました");
        projectCount.textContent = "0件";
        tableWrap.style.display = "block";
      } finally {
        loading.style.display = "none";
      }
    }

    // ページが開かれたら案件一覧を読み込みます。
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "./login.html";
        return;
      }

      currentUser = user;
      loadProjects();
    });
  </script>
  <script type="module" src="./assets/auth-common.js"></script>
  <script src="./assets/common.js"></script>
</body>
</html>
